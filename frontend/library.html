<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Gliimu Institute</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/library.css">
</head>
<body>
    <!-- Transparent Header -->
    <header class="library-header">
        <div class="header-container">
            <div class="header-left">
                <a href="https://gliimu.com/hub" class="logo-link">
                    <img src="icons/logo.png" alt="Gliimu" class="logo-img" id="logoImg">
                </a>
            </div>
        </div>
    </header>

    <!-- Hero Section with Search -->
    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title">Be the best, Read the best</h1>
                <p class="hero-subtitle">The best readers are the best leaders</p>
                <div class="hero-search">
                    <div class="search-bar-large">
                        <input type="text" id="searchInput" placeholder="Search books, courses, or resources...">
                        <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="library-main">
        <div class="container">
            <!-- Filter Chips - Scrollable -->
            <div class="filters-wrapper">
                <div class="filters" id="filterChips"></div>
            </div>
            
            <!-- Masonry Grid -->
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading">Loading library materials...</div>
            </div>
        </div>
    </main>

    <!-- Item Detail Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
                <div id="modalDescription"></div>
            </div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/pages/library.js"></script>
</body>
</html>
