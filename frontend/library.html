<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital library with learning materials for Media Architects.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/modal.css">
  
  <style>
    /* =========================================
       LIBRARY PAGE STYLES (Inline for reliability)
       ========================================= */
    
    /* Main Layout */
    .library-main {
      background: var(--bg-body);
      min-height: 100vh;
      padding: 40px 0 80px;
      margin-top: 72px;
    }
    
    .library-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    
    /* Page Header */
    .library-header-section {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .library-header-section h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
    }
    
    .library-header-section p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    
    /* Subscription Banner */
    .subscription-banner {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      color: white;
    }
    
    .subscription-info h3 {
      font-size: 1rem;
      margin-bottom: 4px;
    }
    
    .subscription-info p {
      font-size: 0.8rem;
      opacity: 0.8;
    }
    
    .subscription-upgrade {
      background: var(--accent);
      color: #111;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .subscription-upgrade:hover {
      transform: translateY(-2px);
    }
    
    /* Tabs */
    .library-tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }
    
    .tab-btn {
      background: none;
      border: none;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }
    
    .tab-btn:hover {
      color: var(--primary);
      background: rgba(44, 47, 120, 0.05);
    }
    
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }
    
    body.dark-mode .tab-btn.active {
      background: var(--accent);
      color: #111;
    }
    
    /* Tab Content */
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Search Section */
    .library-search-section {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    
    .search-wrapper {
      position: relative;
      width: 280px;
    }
    
    .search-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    
    .search-wrapper input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border-radius: 30px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-main);
      font-size: 0.85rem;
      outline: none;
    }
    
    .search-wrapper input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(44, 47, 120, 0.1);
    }
    
    .filter-wrapper {
      display: flex;
      gap: 12px;
    }
    
    .filter-select {
      padding: 8px 16px;
      border-radius: 30px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-main);
      font-size: 0.8rem;
      cursor: pointer;
    }
    
    /* Masonry Grid */
    .masonry-grid {
      column-count: 5;
      column-gap: 20px;
    }
    
    /* Book Card */
    .book-card {
      break-inside: avoid;
      margin-bottom: 20px;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      transition: all 0.3s;
      position: relative;
    }
    
    .book-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
    }
    
    .book-cover {
      position: relative;
      aspect-ratio: 2 / 2.8;
      overflow: hidden;
      cursor: pointer;
    }
    
    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }
    
    .book-card:hover .book-cover img {
      transform: scale(1.05);
    }
    
    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    
    .book-card:hover .card-overlay {
      opacity: 1;
    }
    
    .add-to-shelf-btn, .read-btn {
      background: var(--accent);
      color: #111;
      border: none;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .add-to-shelf-btn:hover, .read-btn:hover {
      transform: scale(1.05);
    }
    
    .read-btn {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(4px);
      color: white;
    }
    
    .read-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* Bundle Card */
    .bundle-card {
      break-inside: avoid;
      margin-bottom: 20px;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border-color);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px;
    }
    
    .bundle-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: var(--shadow-soft);
    }
    
    .bundle-cover {
      width: 65px;
      height: 65px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .bundle-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .bundle-cover i {
      font-size: 1.6rem;
      color: white;
    }
    
    .bundle-info {
      flex: 1;
    }
    
    .bundle-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 4px;
      cursor: pointer;
    }
    
    .bundle-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .bundle-actions {
      display: flex;
      gap: 8px;
    }
    
    .bundle-add-btn, .bundle-read-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Shelf Grid */
    .shelf-header {
      margin-bottom: 24px;
      text-align: center;
    }
    
    .shelf-header h3 {
      font-size: 1rem;
      margin-bottom: 4px;
    }
    
    .shelf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    
    .shelf-item {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .shelf-item:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }
    
    .shelf-item-cover {
      aspect-ratio: 2 / 2.5;
      overflow: hidden;
    }
    
    .shelf-item-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
   Espesor
    .shelf-item-info {
      padding: 12px;
    }
    
    .shelf-item-title {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .remove-from-shelf {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 0.7rem;
      cursor: pointer;
      margin-top: 8px;
      padding: 4px 0;
      width: 100%;
      text-align: center;
    }
    
    /* Subscription Plans */
    .subscription-plans {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    
    .plan-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border-color);
      transition: all 0.3s;
      position: relative;
    }
    
    .plan-card.featured {
      border: 2px solid var(--accent);
      transform: scale(1.02);
    }
    
    .plan-card.featured::before {
      content: 'BEST VALUE';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #111;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    
    .plan-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .plan-price {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 12px;
    }
    
    body.dark-mode .plan-price {
      color: var(--accent);
    }
    
    .plan-price span {
      font-size: 0.8rem;
      font-weight: normal;
    }
    
    .plan-features {
      list-style: none;
      margin: 16px 0;
      text-align: left;
    }
    
    .plan-features li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .plan-features li i {
      color: var(--success);
      width: 20px;
    }
    
    .plan-btn {
      width: 100%;
      padding: 10px;
      border-radius: 30px;
      background: var(--primary);
      color: white;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    
    .current-plan {
      background: #10b981;
      cursor: default;
    }
    
    /* Reader Modal */
    .reader-modal {
      background: var(--bg-card);
      border-radius: 16px;
      max-width: 800px;
      width: 90%;
      height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    
    .reader-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.5);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 10;
    }
    
    .reader-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .reader-header h2 {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }
    
    .reader-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      line-height: 1.8;
      font-size: 1rem;
      white-space: pre-wrap;
    }
    
    /* Empty State */
    .empty-state, .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      column-span: all;
    }
    
    .empty-state i, .loading-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Responsive */
    @media (max-width: 1100px) { .masonry-grid { column-count: 4; } }
    @media (max-width: 900px) { 
      .masonry-grid { column-count: 3; }
      .subscription-plans { grid-template-columns: 1fr; max-width: 350px; }
      .library-search-section { flex-direction: column; align-items: center; }
      .search-wrapper { width: 100%; max-width: 300px; }
    }
    @media (max-width: 700px) { .masonry-grid { column-count: 2; } }
    @media (max-width: 500px) { .masonry-grid { column-count: 1; } }
  </style>
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- Global Header -->
  <div id="header-placeholder"></div>

  <!-- Library Main Content -->
  <main class="library-main">
    <div class="library-container">
      
      <!-- Page Header -->
      <div class="library-header-section">
        <h1>Digital Library</h1>
        <p>Premium learning materials for Media Architects</p>
      </div>
      
      <!-- Subscription Banner -->
      <div class="subscription-banner" id="subscriptionBanner">
        <div class="subscription-info">
          <h3><i class="fas fa-crown"></i> Loading...</h3>
          <p>Fetching your subscription details</p>
        </div>
        <button class="subscription-upgrade" onclick="switchTab('subscription')">Upgrade Plan →</button>
      </div>
      
      <!-- Tabs -->
      <div class="library-tabs">
        <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')">
          <i class="fas fa-book-open"></i> Browse
        </button>
        <button class="tab-btn" data-tab="shelf" onclick="switchTab('shelf')">
          <i class="fas fa-bookshelf"></i> My Shelf
        </button>
        <button class="tab-btn" data-tab="subscription" onclick="switchTab('subscription')">
          <i class="fas fa-crown"></i> Subscription
        </button>
      </div>
      
      <!-- Search Section -->
      <div class="library-search-section" id="searchSection">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search materials...">
        </div>
        <div class="filter-wrapper">
          <select id="categoryFilter" class="filter-select">
            <option value="all">All Categories</option>
            <option value="video">Video Production</option>
            <option value="design">Design</option>
            <option value="code">Code/Programming</option>
          </select>
          <select id="typeFilter" class="filter-select">
            <option value="all">All Types</option>
            <option value="book">Books</option>
            <option value="bundle">Bundles</option>
          </select>
        </div>
      </div>
      
      <!-- Browse Tab Content -->
      <div id="browseContent" class="tab-content active">
        <div class="masonry-grid" id="materialsGrid">
          <div class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading materials...</p>
          </div>
        </div>
      </div>
      
      <!-- Shelf Tab Content -->
      <div id="shelfContent" class="tab-content">
        <div class="shelf-header">
          <h3>My Reading List</h3>
          <p id="shelfStats"></p>
        </div>
        <div class="shelf-grid" id="shelfGrid">
          <div class="empty-state">
            <i class="fas fa-bookshelf"></i>
            <h4>Your shelf is empty</h4>
            <p>Browse the library and add books to your shelf.</p>
            <button class="btn-primary" onclick="switchTab('browse')">Browse Library →</button>
          </div>
        </div>
      </div>
      
      <!-- Subscription Tab Content -->
      <div id="subscriptionContent" class="tab-content">
        <div class="subscription-plans" id="subscriptionPlans"></div>
      </div>
      
    </div>
  </main>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- Reader Modal -->
  <div class="modal-overlay" id="readerModal">
    <div class="reader-modal">
      <button class="reader-close" onclick="closeReaderModal()">&times;</button>
      <div class="reader-header">
        <h2 id="readerTitle"></h2>
        <div class="reader-meta" id="readerMeta"></div>
      </div>
      <div class="reader-content" id="readerContent"></div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/pages/header.js"></script>
  <script src="js/pages/library.js"></script>

  <!-- Load Partials -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Load header
      fetch('partials/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Header error:', err));
      
      // Load login modal
      fetch('partials/login-modal.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('login-modal-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Modal error:', err));
    });
  </script>
</body>
</html>
