<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Glimu</title>
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/library.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header will be loaded via partials/header.js -->
    <div id="header-placeholder"></div>

    <!-- Materials Section - Direct, no hero -->
    <section class="materials-section">
        <div class="container">
            <!-- Simple Search Bar -->
            <div class="search-bar-simple">
                <input type="text" id="searchInput" placeholder="Search">
                <button id="searchBtn">Search</button>
            </div>
            
            <!-- Filter Bar -->
            <div class="filters" id="filterChips"></div>
            
            <!-- Masonry Grid -->
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading">Loading materials...</div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="../js/partials/header.js"></script>
    <script src="../js/pages/library.js"></script>
</body>
</html>
