<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Gliimu Institute</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/library.css">
</head>
<body>
    <!-- Custom Header -->
    <header class="library-header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo">
                    <img src="icons/logo.png" alt="Gliimu" class="logo-img" id="logoImg">
                </div>
            </div>
            <div class="header-right">
                <a href="dashboard.html" class="back-arrow" title="Back to Dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                </a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18">
                        <circle cx="12" cy="12" r="5" stroke="currentColor" fill="none" stroke-width="2"/>
                        <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor" stroke-width="2"/>
                        <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor" stroke-width="2"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2"/>
                        <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2"/>
                        <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none" stroke-width="2"/>
                    </svg>
                </button>
                <button class="download-app-btn" id="downloadAppBtn" title="Download App">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3v12m0 0-3-3m3 3 3-3M5 21h14"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-container">
            <h1 class="hero-title">Be the best, Read the best</h1>
            <p class="hero-subtitle">The best readers are the best leaders</p>
        </div>
    </section>

    <!-- Search Bar Under Header -->
    <div class="search-wrapper">
        <div class="search-bar-large">
            <input type="text" id="searchInput" placeholder="Search books, courses, or resources...">
            <button id="searchBtn">Search</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="library-main">
        <div class="container">
            <!-- Filter Chips - Scrollable -->
            <div class="filters-wrapper">
                <div class="filters" id="filterChips"></div>
            </div>
            
            <!-- Masonry Grid -->
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading">Loading library materials...</div>
            </div>
        </div>
    </main>

    <!-- Item Detail Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
                <p id="modalDescription"></p>
            </div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/pages/library.js"></script>
    
    <!-- Fallback script for theme and logo -->
    <script>
        // Theme toggle fallback
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('themeToggle');
            const logoImg = document.getElementById('logoImg');
            
            // Check for saved theme
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if (logoImg) logoImg.style.filter = 'brightness(0) invert(1)';
            }
            
            // Theme toggle handler
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    document.body.classList.toggle('dark-mode');
                    const isDark = document.body.classList.contains('dark-mode');
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                    if (logoImg) {
                        logoImg.style.filter = isDark ? 'brightness(0) invert(1)' : 'none';
                    }
                });
            }
            
            // Download button handler
            const downloadBtn = document.getElementById('downloadAppBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', function() {
                    alert('App download will be available soon!');
                });
            }
        });
    </script>
</body>
</html>
