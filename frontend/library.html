<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital library with learning materials, books, and bundles for Media Architects.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/library.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- Global Header -->
  <div id="header-placeholder"></div>

  <!-- Main Content -->
  <div class="library-wrapper">
    <div class="library-container">
      
      <!-- Page Header -->
      <div class="library-page-header">
        <h1>Digital Library</h1>
        <p>Access premium learning materials, books, and resource bundles</p>
      </div>
      
      <!-- Tabs -->
      <div class="library-tabs">
        <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')"><i class="fas fa-book-open"></i> Browse</button>
        <button class="tab-btn" data-tab="purchases" onclick="switchTab('purchases')"><i class="fas fa-shopping-bag"></i> My Purchases</button>
        <button class="tab-btn admin-only" data-tab="admin" onclick="switchTab('admin')" style="display: none;"><i class="fas fa-cog"></i> Admin</button>
      </div>
      
      <!-- Search and Filter Bar -->
      <div class="search-filter-bar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search materials...">
        </div>
        <div class="filter-group">
          <select id="categoryFilter" class="filter-select">
            <option value="all">All Categories</option>
            <option value="video">Video Production</option>
            <option value="design">Design</option>
            <option value="code">Code/Programming</option>
          </select>
          <select id="typeFilter" class="filter-select">
            <option value="all">All Types</option>
            <option value="book">Books</option>
            <option value="bundle">Bundles</option>
          </select>
        </div>
      </div>
      
      <!-- Materials Grid -->
      <div class="masonry-grid" id="materialsGrid">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <h4>Loading materials...</h4>
        </div>
      </div>
      
    </div>
  </div>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target === this) closeDetailModal()">
    <div class="detail-modal">
      <button class="detail-close" onclick="closeDetailModal()">&times;</button>
      <div class="detail-modal-content">
        <div class="detail-image">
          <img id="detailImage" src="" alt="">
        </div>
        <div class="detail-info">
          <h2 id="detailTitle"></h2>
          <div class="detail-price" id="detailPrice"></div>
          <p class="detail-description" id="detailDescription"></p>
          <div class="detail-meta">
            <span id="detailCategory"></span>
            <span id="detailType"></span>
          </div>
          <button class="detail-purchase-btn" onclick="purchaseFromModal()">Purchase Now</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Purchase Modal -->
  <div class="modal-overlay" id="purchaseModal" onclick="if(event.target === this) closePurchaseModal()">
    <div class="purchase-modal">
      <div class="modal-icon"><i class="fas fa-shopping-cart"></i></div>
      <h3 class="modal-title" id="modalTitle">Confirm Purchase</h3>
      <p class="modal-text" id="modalDescription"></p>
      <p class="modal-text"><strong id="modalPrice">₦0</strong></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="confirmPurchase()">Confirm Purchase</button>
        <button class="modal-btn cancel" onclick="closePurchaseModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal" onclick="if(event.target === this) closeSuccessModal()">
    <div class="purchase-modal">
      <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
      <h3 class="modal-title">Purchase Successful!</h3>
      <p class="modal-text" id="successMessage"></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="closeSuccessModal()">Continue</button>
      </div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/pages/header.js"></script>
  
  <!-- INLINE SCRIPT FOR IMMEDIATE TESTING -->
  <script>
    // Mock data directly in HTML for testing
    const testMaterials = [
      { id: '1', type: 'book', title: 'Video Production Guide', price: 3500, image: 'https://images.unsplash.com/photo-1536240474400-3f5c8c6ee9d1?w=300&h=400&fit=crop', category: 'video' },
      { id: '2', type: 'book', title: 'UI/UX Design Mastery', price: 2800, image: 'https://images.unsplash.com/photo-1586717791821-3f44a563fa4c?w=300&h=400&fit=crop', category: 'design' },
      { id: '3', type: 'bundle', title: 'Web Dev Bundle', price: 15000, image: 'https://images.unsplash.com/photo-1461749280699-6d844bd4a1c5?w=100&h=100&fit=crop', category: 'code' }
    ];
    
    let currentUser = null;
    
    function initTestLibrary() {
      console.log('initTestLibrary started');
      
      // Check if user is logged in
      const storedUser = localStorage.getItem('gliimu_user');
      console.log('Stored user:', storedUser);
      
      if (!storedUser) {
        // Create a test user for demo
        const testUser = { id: 'test_001', name: 'Test User', username: 'testuser', role: 'Student' };
        localStorage.setItem('gliimu_user', JSON.stringify(testUser));
        currentUser = testUser;
        console.log('Created test user:', currentUser);
      } else {
        currentUser = JSON.parse(storedUser);
      }
      
      // Render the grid
      renderTestGrid();
    }
    
    function renderTestGrid() {
      const container = document.getElementById('materialsGrid');
      console.log('Container found:', container);
      
      if (!container) {
        console.error('materialsGrid NOT found!');
        return;
      }
      
      let html = '';
      for (let i = 0; i < testMaterials.length; i++) {
        const m = testMaterials[i];
        if (m.type === 'book') {
          html += `
            <div class="book-card" onclick="alert('Book: ${m.title}')">
              <div class="book-cover">
                <img src="${m.image}" alt="${m.title}">
                <div class="price-tag">₦${m.price.toLocaleString()}</div>
              </div>
            </div>
          `;
        } else {
          html += `
            <div class="bundle-card" onclick="alert('Bundle: ${m.title}')">
              <div class="bundle-cover">
                <img src="${m.image}" alt="${m.title}">
              </div>
              <div class="bundle-info">
                <div class="bundle-title">${m.title}</div>
                <div class="bundle-price">₦${m.price.toLocaleString()}</div>
              </div>
            </div>
          `;
        }
      }
      
      container.innerHTML = html;
      console.log('Grid rendered with', testMaterials.length, 'items');
    }
    
    // Load header
    fetch('partials/header.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        console.log('Header loaded');
      })
      .catch(err => console.error('Header error:', err));
    
    // Load login modal
    fetch('partials/login-modal.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('login-modal-placeholder').innerHTML = html;
        console.log('Login modal loaded');
      })
      .catch(err => console.error('Modal error:', err));
    
    // Simple tab switching
    window.switchTab = function(tabId) {
      console.log('Switch tab:', tabId);
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tabId === 'browse') {
        document.getElementById('browseContent').style.display = 'block';
        document.getElementById('purchasesContent').style.display = 'none';
        document.getElementById('adminContent').style.display = 'none';
      } else if (tabId === 'purchases') {
        document.getElementById('browseContent').style.display = 'none';
        document.getElementById('purchasesContent').style.display = 'block';
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('purchasesList').innerHTML = '<div class="empty-state">No purchases yet</div>';
      } else if (tabId === 'admin') {
        document.getElementById('browseContent').style.display = 'none';
        document.getElementById('purchasesContent').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        document.getElementById('adminContent').innerHTML = '<div class="empty-state">Admin panel (coming soon)</div>';
      }
    };
    
    window.closeDetailModal = function() { document.getElementById('detailModal').classList.remove('active'); };
    window.closePurchaseModal = function() { document.getElementById('purchaseModal').classList.remove('active'); };
    window.closeSuccessModal = function() { document.getElementById('successModal').classList.remove('active'); };
    window.purchaseFromModal = function() { closeDetailModal(); alert('Purchase flow would start here'); };
    window.confirmPurchase = function() { closePurchaseModal(); document.getElementById('successModal').classList.add('active'); };
    
    // Make sure browseContent, purchasesContent, adminContent exist
    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM ready');
      
      // Create missing containers if needed
      if (!document.getElementById('browseContent')) {
        const browseDiv = document.createElement('div');
        browseDiv.id = 'browseContent';
        browseDiv.style.display = 'block';
        document.querySelector('.library-container').appendChild(browseDiv);
      }
      if (!document.getElementById('purchasesContent')) {
        const purchasesDiv = document.createElement('div');
        purchasesDiv.id = 'purchasesContent';
        purchasesDiv.style.display = 'none';
        document.querySelector('.library-container').appendChild(purchasesDiv);
        const purchasesList = document.createElement('div');
        purchasesList.id = 'purchasesList';
        purchasesDiv.appendChild(purchasesList);
      }
      if (!document.getElementById('adminContent')) {
        const adminDiv = document.createElement('div');
        adminDiv.id = 'adminContent';
        adminDiv.style.display = 'none';
        document.querySelector('.library-container').appendChild(adminDiv);
      }
      
      // Move the grid into browseContent
      const grid = document.getElementById('materialsGrid');
      const browseContent = document.getElementById('browseContent');
      if (grid && browseContent && grid.parentNode !== browseContent) {
        browseContent.appendChild(grid);
      }
      
      initTestLibrary();
    });
  </script>
</body>
</html>
