<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Glimu</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/library.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Header placeholder - header.js loads partials/header.html here -->
    <div id="header-placeholder"></div>

<!-- Hero Section --><section class="hero-section"><div class="hero-container"><h1 class="hero-title">Be the best, Read the best</h1><p class="hero-subtitle">The best readers are the best leaders</p></div></section>
    <!-- Search Bar -->
    <div class="search-wrapper">
        <div class="search-bar-large">
            <input type="text" id="searchInput" placeholder="Search library...">
            <button id="searchBtn">Search</button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="library-main">
        <div class="container">
            <div class="filters-wrapper">
                <div class="filters" id="filterChips"></div>
            </div>
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading">Loading materials...</div>
            </div>
        </div>
    </main>

    <!-- Modals (loaded from partials if needed) -->
    <div id="loginModal" class="modal"></div>

    <!-- Scripts -->
    <script src="/js/pages/header.js"></script>
    <script src="/js/pages/library.js"></script>
</body>
</html>
