<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital library with learning materials, books, and bundles for Media Architects.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/library.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- Global Header (Matches Homepage) -->
  <div id="header-placeholder"></div>

  <!-- Main Content -->
  <div class="library-wrapper">
    <div class="library-container">
      
      <!-- Page Header -->
      <div class="library-page-header">
        <h1>Digital Library</h1>
        <p>Access premium learning materials, books, and resource bundles</p>
      </div>
      
      <!-- Tabs -->
      <div class="library-tabs">
        <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')"><i class="fas fa-book-open"></i> Browse</button>
        <button class="tab-btn" data-tab="purchases" onclick="switchTab('purchases')"><i class="fas fa-shopping-bag"></i> My Purchases</button>
        <button class="tab-btn admin-only" data-tab="admin" onclick="switchTab('admin')" style="display: none;"><i class="fas fa-cog"></i> Admin</button>
      </div>
      
      <!-- Search and Filter Bar -->
      <div class="search-filter-bar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search materials...">
        </div>
        <div class="filter-group">
          <select id="categoryFilter" class="filter-select">
            <option value="all">All Categories</option>
            <option value="video">Video Production</option>
            <option value="design">Design</option>
            <option value="code">Code/Programming</option>
          </select>
          <select id="typeFilter" class="filter-select">
            <option value="all">All Types</option>
            <option value="book">Books</option>
            <option value="bundle">Bundles</option>
          </select>
        </div>
      </div>
      
      <!-- Pinterest-Style Masonry Grid -->
      <div class="masonry-grid" id="materialsGrid">
        <div class="empty-state">
          <i class="fas fa-spinner fa-spin"></i>
          <h4>Loading materials...</h4>
        </div>
      </div>
      
    </div>
  </div>

  <!-- NO FOOTER - Removed for library page -->

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target === this) closeDetailModal()">
    <div class="detail-modal">
      <button class="detail-close" onclick="closeDetailModal()">&times;</button>
      <div class="detail-modal-content">
        <div class="detail-image">
          <img id="detailImage" src="" alt="">
        </div>
        <div class="detail-info">
          <h2 id="detailTitle"></h2>
          <div class="detail-price" id="detailPrice"></div>
          <p class="detail-description" id="detailDescription"></p>
          <div class="detail-meta">
            <span id="detailCategory"></span>
            <span id="detailType"></span>
          </div>
          <button class="detail-purchase-btn" id="detailPurchaseBtn" onclick="purchaseFromModal()">Purchase Now</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Purchase Confirmation Modal -->
  <div class="modal-overlay" id="purchaseModal" onclick="if(event.target === this) closePurchaseModal()">
    <div class="purchase-modal">
      <div class="modal-icon">
        <i class="fas fa-shopping-cart"></i>
      </div>
      <h3 class="modal-title" id="modalTitle">Confirm Purchase</h3>
      <p class="modal-text" id="modalDescription"></p>
      <p class="modal-text"><strong id="modalPrice">₦0</strong></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="confirmPurchase()">Confirm Purchase</button>
        <button class="modal-btn cancel" onclick="closePurchaseModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal" onclick="if(event.target === this) closeSuccessModal()">
    <div class="purchase-modal">
      <div class="modal-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h3 class="modal-title">Purchase Successful!</h3>
      <p class="modal-text" id="successMessage"></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="closeSuccessModal()">Continue</button>
      </div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/pages/header.js"></script>
  <script src="js/pages/library.js"></script>

  <!-- Load Header and Modal Partials (No Footer) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (document.getElementById('header-placeholder')) {
        fetch('partials/header.html')
          .then(r => r.text())
          .then(html => {
            document.getElementById('header-placeholder').innerHTML = html;
            console.log('Header loaded');
          })
          .catch(err => console.error('Failed to load header:', err));
      }
      
      if (document.getElementById('login-modal-placeholder')) {
        fetch('partials/login-modal.html')
          .then(r => r.text())
          .then(html => {
            document.getElementById('login-modal-placeholder').innerHTML = html;
            console.log('Login modal loaded');
          })
          .catch(err => console.error('Failed to load login modal:', err));
      }
      
      // Show admin tab if user is admin
      const user = JSON.parse(localStorage.getItem('gliimu_user') || '{}');
      if (user.role === 'Admin') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
      }
    });
  </script>
</body>
</html>
