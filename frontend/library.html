<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Learning Materials – Gliimu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Access textbooks, module handouts, slides, and practice files for Video Production, Computing, and Design at Gliimu Institute.">
  
  <link rel="shortcut icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/library.css">
</head>
<body>

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Hero Section -->
  <section class="library-hero">
    <div class="library-hero-bg" style="background-image: url('https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop&w=2000&q=80');"></div>
    <div class="container library-hero-inner">
      <h1>Gliimu Library</h1>
      <p>Search for Textbooks & practice files. Expand your knowledge with our curated collection.</p>
      <div class="search-box-large">
        <input type="text" placeholder="Type a title, topic or file type..." id="heroSearchInput">
        <button id="heroSearchBtn"><i class="fas fa-search"></i> Search</button>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main>
    <section class="materials-section">
      <div class="ripple-bg"></div>
      <div class="container">
        <div class="section-header">
          <h2>Learning Materials</h2>
          <p>Textbooks, design assets, and downloadable resources to accelerate your learning.</p>
        </div>

        <!-- Dynamic Grid -->
        <div class="pinterest-grid" id="unifiedGrid">
          <div class="empty-state">
            <i class="fas fa-spinner fa-spin"></i>
            <h3>Loading materials...</h3>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- Book Details Modal -->
  <div class="modal-overlay" id="detailsModal">
    <div class="details-card">
      <button class="close-btn" id="closeDetailsBtn"><i class="fas fa-times"></i></button>
      <div class="details-header">
        <h2 id="detailsTitle">Book Title</h2>
      </div>
      <div class="details-price-display" id="detailsPrice">₦0.00</div>
      <div class="details-meta">Instant Digital Download</div>
      <div class="details-body" id="detailsText">
        <!-- About text goes here -->
      </div>
      <button class="buy-btn" id="buyNowBtn">
        <i class="fas fa-shopping-cart"></i> Buy Now
      </button>
    </div>
  </div>

  <!-- JS Files -->
  <!-- header.js handles header functionality -->
  <script src="js/pages/header.js"></script>
  
  <!-- Library page specific JS -->
  <script src="js/pages/library.js"></script>

  <!-- Load partials (header, footer, modal) -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (document.getElementById('header-placeholder')) {
        Promise.all([
          fetch('partials/header.html').then(function(r) { return r.text(); }),
          fetch('partials/footer.html').then(function(r) { return r.text(); }),
          fetch('partials/login-modal.html').then(function(r) { return r.text(); })
        ]).then(function(results) {
          document.getElementById('header-placeholder').innerHTML = results[0];
          document.getElementById('footer-placeholder').innerHTML = results[1];
          document.getElementById('login-modal-placeholder').innerHTML = results[2];
          console.log('Partials loaded');
        }).catch(function(err) {
          console.error('Failed to load partials:', err);
        });
      }
    });
  </script>
</body>
</html>
