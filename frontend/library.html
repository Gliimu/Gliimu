<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Gliimu Institute</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/library.css">
</head>
<body>
    <!-- Transparent Header with Search -->
    <header class="library-header" id="libraryHeader">
        <div class="header-container">
            <div class="header-left">
                <a href="https://gliimu.com/hub" class="logo-link">
                    <img src="icons/logo.png" alt="Gliimu" class="logo-img" id="logoImg">
                </a>
            </div>
            <div class="header-center">
                <div class="search-bar-header">
                    <input type="text" id="searchInput" placeholder="Search books, courses, or resources...">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
            <div class="header-right">
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="profile-btn" id="profileBtn">
                        <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User&background=2c2f78&color=fff" alt="Profile">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                        <a href="/portfolio.html"><i class="fas fa-briefcase"></i> My Portfolio</a>
                        <a href="#" id="savedItemsLink"><i class="fas fa-bookmark"></i> Saved Items</a>
                        <a href="#" id="purchasedItemsLink"><i class="fas fa-shopping-bag"></i> Purchased Items</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" id="merchandiseLink"><i class="fas fa-tshirt"></i> Merchandise</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Fixed Hero Section -->
    <section class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title">Be The Best<br><span class="highlight">Read the best</span></h1>
                <p class="hero-subtitle">The best readers are the best leaders</p>
                <div class="hero-stats">
                    <div class="hero-stat">
                        <span class="hero-stat-value" id="heroWallet">₦0</span>
                        <span class="hero-stat-label">Wallet</span>
                    </div>
                    <div class="hero-stat-divider"></div>
                    <div class="hero-stat">
                        <span class="hero-stat-value" id="heroGP">0</span>
                        <span class="hero-stat-label">GP Points</span>
                    </div>
                    <div class="hero-stat-divider"></div>
                    <div class="hero-stat">
                        <span class="hero-stat-value" id="heroLibrary">0</span>
                        <span class="hero-stat-label">My Library</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="library-main" id="libraryMain">
        <div class="container">
            <!-- Filter Chips - Fixed on scroll -->
            <div class="filters-wrapper" id="filtersWrapper">
                <div class="filters-container">
                    <div class="filters-scroll-wrapper">
                        <div class="filters" id="filterChips"></div>
                    </div>
                </div>
            </div>
            
            <!-- Masonry Grid -->
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading">Loading library materials...</div>
            </div>
        </div>
    </main>

    <!-- Item Detail Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalCloseBtn">&times;</button>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
                <div id="modalDescription"></div>
            </div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/pages/library.js"></script>
</body>
</html>
