<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital library with learning materials, books, and bundles for Media Architects.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/library.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- Global Header -->
  <div id="header-placeholder"></div>

  <!-- Library Main Content -->
  <main class="library-main">
    <div class="library-container">
      
      <!-- Page Title -->
      <div class="library-title">
        <h1>Digital Library</h1>
        <p>Premium learning materials for Media Architects</p>
      </div>
      
      <!-- Tabs -->
      <div class="library-tabs">
        <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')">
          <i class="fas fa-book-open"></i> Browse
        </button>
        <button class="tab-btn" data-tab="purchases" onclick="switchTab('purchases')">
          <i class="fas fa-shopping-bag"></i> My Purchases
        </button>
        <button class="tab-btn admin-only" data-tab="admin" onclick="switchTab('admin')" style="display: none;">
          <i class="fas fa-cog"></i> Admin
        </button>
      </div>
      
      <!-- Search Bar - Compact, aligned with logo -->
      <div class="library-search-bar">
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search materials...">
        </div>
        <div class="filter-wrapper">
          <select id="categoryFilter" class="filter-select">
            <option value="all">All Categories</option>
            <option value="video">Video Production</option>
            <option value="design">Design</option>
            <option value="code">Code/Programming</option>
          </select>
          <select id="typeFilter" class="filter-select">
            <option value="all">All Types</option>
            <option value="book">Books</option>
            <option value="bundle">Bundles</option>
          </select>
        </div>
      </div>
      
      <!-- Browse Content -->
      <div id="browseContent" class="tab-content active">
        <div class="masonry-grid" id="materialsGrid">
          <div class="loading-state">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading materials...</p>
          </div>
        </div>
      </div>
      
      <!-- Purchases Content -->
      <div id="purchasesContent" class="tab-content">
        <div id="purchasesList" class="purchases-list">
          <div class="empty-state">
            <i class="fas fa-shopping-bag"></i>
            <h4>No purchases yet</h4>
            <p>Browse the library and buy your first learning material.</p>
            <button class="btn-primary" onclick="switchTab('browse')">Browse Library →</button>
          </div>
        </div>
      </div>
      
      <!-- Admin Content -->
      <div id="adminContent" class="tab-content"></div>
      
    </div>
  </main>

  <!-- Modals -->
  <div id="login-modal-placeholder"></div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="detail-modal">
      <button class="detail-close" onclick="closeDetailModal()">&times;</button>
      <div class="detail-modal-content">
        <div class="detail-image">
          <img id="detailImage" src="" alt="">
        </div>
        <div class="detail-info">
          <h2 id="detailTitle"></h2>
          <div class="detail-price" id="detailPrice"></div>
          <p class="detail-description" id="detailDescription"></p>
          <div class="detail-meta">
            <span id="detailCategory"></span>
            <span id="detailType"></span>
          </div>
          <button class="detail-purchase-btn" onclick="purchaseFromModal()">Purchase Now</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Purchase Modal -->
  <div class="modal-overlay" id="purchaseModal">
    <div class="purchase-modal">
      <div class="modal-icon"><i class="fas fa-shopping-cart"></i></div>
      <h3 class="modal-title" id="purchaseModalTitle">Confirm Purchase</h3>
      <p class="modal-text" id="purchaseModalDesc"></p>
      <p class="modal-text"><strong id="purchaseModalPrice">₦0</strong></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="confirmPurchase()">Confirm</button>
        <button class="modal-btn cancel" onclick="closePurchaseModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal">
    <div class="purchase-modal">
      <div class="modal-icon"><i class="fas fa-check-circle"></i></div>
      <h3 class="modal-title">Purchase Successful!</h3>
      <p class="modal-text" id="successMessage"></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="closeSuccessModal()">Continue</button>
      </div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/pages/header.js"></script>
  <script src="js/pages/library.js"></script>

  <!-- Load Partials -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Load header
      fetch('partials/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Header error:', err));
      
      // Load login modal
      fetch('partials/login-modal.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('login-modal-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Modal error:', err));
      
      // Show admin tab if user is admin
      const user = JSON.parse(localStorage.getItem('gliimu_user') || '{}');
      if (user.role === 'Admin') {
        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
      }
    });
  </script>
</body>
</html>
