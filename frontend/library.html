<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Digital library with learning materials, books, and bundles for Media Architects.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/library.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- Top Bar (No Header) -->
  <div class="library-top-bar">
    <div class="container">
      <div class="top-bar-left">
        <a href="index.html" class="logo-small">
          <img src="icons/logo.png" alt="Gliimu">
        </a>
      </div>
      <div class="top-bar-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18">
            <circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"></circle>
            <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor"></line>
            <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor"></line>
            <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor"></line>
            <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none"></path>
          </svg>
        </button>
        <div class="user-mini" id="userMini">
          <img src="" alt="User" id="userAvatar" class="user-avatar-mini">
          <span id="userName">User</span>
          <i class="fas fa-chevron-down"></i>
          <div class="user-dropdown" id="userDropdown">
            <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Content (No Hero) -->
  <div class="library-wrapper">
    <div class="library-container">
      
      <!-- Tabs -->
      <div class="library-tabs">
        <button class="tab-btn active" data-tab="browse" onclick="switchTab('browse')"><i class="fas fa-book-open"></i> Browse</button>
        <button class="tab-btn" data-tab="purchases" onclick="switchTab('purchases')"><i class="fas fa-shopping-bag"></i> My Purchases</button>
        <button class="tab-btn admin-only" data-tab="admin" onclick="switchTab('admin')" style="display: none;"><i class="fas fa-cog"></i> Admin</button>
      </div>
      
      <!-- Browse Content -->
      <div id="browseContent">
        <!-- Search and Filter Bar -->
        <div class="search-filter-bar">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search materials...">
          </div>
          <div class="filter-group">
            <select id="categoryFilter" class="filter-select">
              <option value="all">All Categories</option>
              <option value="video">Video Production</option>
              <option value="design">Design</option>
              <option value="code">Code/Programming</option>
            </select>
            <select id="typeFilter" class="filter-select">
              <option value="all">All Types</option>
              <option value="book">Books</option>
              <option value="bundle">Bundles</option>
            </select>
          </div>
        </div>
        
        <!-- Materials Grid -->
        <div class="materials-grid" id="materialsGrid">
          <!-- Materials will be loaded here -->
        </div>
      </div>
      
      <!-- Purchases Content -->
      <div id="purchasesContent" style="display: none;">
        <div id="purchasesList"></div>
      </div>
      
      <!-- Admin Content -->
      <div id="adminContent" style="display: none;"></div>
      
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" onclick="if(event.target === this) closeDetailModal()">
    <div class="detail-modal">
      <button class="detail-close" onclick="closeDetailModal()">&times;</button>
      <div class="detail-modal-content">
        <div class="detail-image">
          <img id="detailImage" src="" alt="">
        </div>
        <div class="detail-info">
          <h2 id="detailTitle"></h2>
          <div class="detail-price" id="detailPrice"></div>
          <p class="detail-description" id="detailDescription"></p>
          <div class="detail-meta">
            <span id="detailCategory"></span>
            <span id="detailType"></span>
          </div>
          <button class="detail-purchase-btn" id="detailPurchaseBtn" onclick="purchaseFromModal()">Purchase Now</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Purchase Confirmation Modal -->
  <div class="modal-overlay" id="purchaseModal" onclick="if(event.target === this) closePurchaseModal()">
    <div class="purchase-modal">
      <div class="modal-icon">
        <i class="fas fa-shopping-cart"></i>
      </div>
      <h3 class="modal-title" id="modalTitle">Confirm Purchase</h3>
      <p class="modal-text" id="modalDescription"></p>
      <p class="modal-text"><strong id="modalPrice">₦0</strong></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="confirmPurchase()">Confirm Purchase</button>
        <button class="modal-btn cancel" onclick="closePurchaseModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Success Modal -->
  <div class="modal-overlay" id="successModal" onclick="if(event.target === this) closeSuccessModal()">
    <div class="purchase-modal">
      <div class="modal-icon">
        <i class="fas fa-check-circle"></i>
      </div>
      <h3 class="modal-title">Purchase Successful!</h3>
      <p class="modal-text" id="successMessage"></p>
      <div class="modal-actions">
        <button class="modal-btn confirm" onclick="closeSuccessModal()">Continue</button>
      </div>
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/pages/library.js"></script>

  <script>
    // Show admin tab if user is admin
    const user = JSON.parse(localStorage.getItem('gliimu_user') || '{}');
    if (user.role === 'Admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
    }
    
    window.logout = function() {
      if (confirm('Are you sure you want to sign out?')) {
        localStorage.removeItem('gliimu_user');
        localStorage.removeItem('token');
        window.location.href = 'index.html';
      }
    };
  </script>
</body>
</html>
