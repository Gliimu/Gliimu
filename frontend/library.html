<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Glimu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/library.css">
    <style>
        /* CSS Variables for the library theme */
        :root {
            --white: #ffffff;
            --accent: #fbb040;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-section-alt: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow-soft: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body.dark-mode {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-section-alt: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }
    </style>
</head>
<body>
    <!-- Global Header -->
    <div id="global-header"></div>

    <!-- Hero Section -->
    <section class="library-hero">
        <div class="ripple-bg"></div>
        <div class="library-hero-inner">
            <h1>Digital Library</h1>
            <p>Premium learning materials for Media Architects</p>
            <div class="search-box-large">
                <input type="text" id="heroSearchInput" placeholder="Search materials by title or description...">
                <button id="heroSearchBtn">🔍 Search</button>
            </div>
        </div>
    </section>

    <!-- Materials Section -->
    <section class="materials-section">
        <div class="container" style="max-width: 1400px; margin: 0 auto; padding: 0 20px;">
            <div class="section-header">
                <h2>All Materials</h2>
                <p>Browse our collection of books and bundles</p>
            </div>
            
            <!-- Filter Bar -->
            <div class="filters" id="filterChips" style="margin-bottom: 32px; display: flex; gap: 12px; flex-wrap: wrap;"></div>
            
            <!-- Masonry Grid -->
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading" style="text-align: center; padding: 60px;">Loading materials...</div>
            </div>
        </div>
    </section>

    <!-- Subscription Modal -->
    <div id="subscriptionModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">📚✨</div>
            <h2>Subscription Required</h2>
            <p>This premium content is only available for subscribers. Upgrade your plan to access all learning materials.</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeModal()">Maybe Later</button>
                <button class="modal-btn modal-btn-primary" onclick="alert('Redirecting to subscription plans...')">View Plans</button>
            </div>
        </div>
    </div>

    <script src="js/pages/header.js"></script>
    <script src="js/pages/library.js"></script>
</body>
</html>
