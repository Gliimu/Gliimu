<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library | Glimu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/library.css">
</head>
<body>
    <!-- Global Header will be injected here -->
    <div id="global-header"></div>

    <!-- Hero Section -->
    <section class="library-hero">
        <div class="ripple-bg"></div>
        <div class="library-hero-inner">
            <h1>Digital Library</h1>
            <p>Premium learning materials for Media Architects</p>
            <div class="search-box-large">
                <input type="text" id="heroSearchInput" placeholder="Search materials...">
                <button id="heroSearchBtn">🔍 Search</button>
            </div>
        </div>
    </section>

    <!-- Materials Section -->
    <section class="materials-section">
        <div class="container">
            <!-- Filter Bar -->
            <div class="filters" id="filterChips"></div>
            
            <!-- Masonry Grid -->
            <div id="booksContainer" class="pinterest-grid">
                <div class="loading">Loading materials...</div>
            </div>
        </div>
    </section>

    <script src="js/pages/header.js"></script>
    <script src="js/pages/library.js"></script>
</body>
</html>
