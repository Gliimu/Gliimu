<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Gliimu Institute</title>
    <link rel="stylesheet" href="/frontend/css/forgot-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <!-- Header -->
            <div class="reset-header">
                <img src="/frontend/images/logo.png" alt="Gliimu Institute" class="logo" onerror="this.style.display='none'">
                <h1>Reset Password</h1>
                <p>Verify your identity and we'll send you a reset link</p>
            </div>

            <!-- Single Form -->
            <form id="resetForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label>Your Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email to receive reset link" required>
                    <small class="hint">We'll send the password reset link to this email</small>
                </div>

                <div class="form-group">
                    <label>Recovery Phrase</label>
                    <div class="input-wrapper">
                        <input type="password" id="recoveryPhrase" placeholder="word1-word2-word3-word4-word5-word6" required>
                        <button type="button" class="toggle-btn" id="toggleRecovery">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small>Enter your 6-word recovery phrase</small>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Birth Day</label>
                        <select id="birthDay" required>
                            <option value="">Day</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Birth Month</label>
                        <select id="birthMonth" required>
                            <option value="">Month</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div class="reset-footer">
                <a href="/signin.html"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script type="module" src="/frontend/js/pages/forgot-password.js"></script>
</body>
</html>
