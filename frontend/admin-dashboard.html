<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Gliimu Institute</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/admin-dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Dynamic Header for Admin Dashboard -->
    <div class="admin-header">
        <div class="header-container">
            <div class="logo">
                <img src="/icons/logo.png" alt="Gliimu" class="logo-img">
                <span id="dashboardTitle">Admin Dashboard</span>
            </div>
            <div class="header-right">
                <div class="admin-info">
                    <span class="admin-name" id="adminName">Loading...</span>
                    <span class="admin-role" id="adminRole">Loading...</span>
                </div>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <i class="fas fa-sun icon-sun"></i>
                    <i class="fas fa-moon icon-moon"></i>
                </button>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Sign Out
                </button>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard Container -->
    <div class="admin-container">
        <!-- Sidebar - Dynamically populated -->
        <aside class="admin-sidebar">
            <nav class="admin-nav" id="sidebarNav">
                <div class="loading-nav">Loading...</div>
            </nav>
        </aside>

        <!-- Main Content - Dynamically populated -->
        <main class="admin-main" id="dashboardContent">
            <div class="loading-container">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading dashboard...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- ============================================ -->
    <!-- MODALS FOR DIFFERENT SECTIONS -->
    <!-- ============================================ -->

    <!-- Library Item Modal -->
    <div id="libraryItemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="libraryModalTitle">Add Library Item</h2>
                <button class="modal-close closeLibraryModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="libraryItemForm">
                    <input type="hidden" id="editItemId">
                    <div class="form-group"><label>Title *</label><input type="text" id="itemTitle" required></div>
                    <div class="form-group"><label>Type</label><select id="itemType"><option value="book">Book</option><option value="bundle">Bundle</option><option value="course">Course</option></select></div>
                    <div class="form-group"><label>Category</label><input type="text" id="itemCategory" placeholder="Video Production, Design, etc."></div>
                    <div class="form-group"><label>Author</label><input type="text" id="itemAuthor"></div>
                    <div class="form-group"><label>Description</label><textarea id="itemDescription" rows="3"></textarea></div>
                    <div class="form-group"><label>Cover Image URL</label><input type="url" id="itemCoverUrl"></div>
                    <div class="form-group"><label>Digital Price (₦)</label><input type="number" id="itemPrice" value="0"></div>
                    <div class="form-group"><label>Physical Price (₦)</label><input type="number" id="itemPhysicalPrice" value="0"></div>
                    <div class="form-group"><label>Stock Quantity</label><input type="number" id="itemStock" value="0"></div>
                    <div class="form-group"><label>File URL</label><input type="url" id="itemFileUrl" placeholder="PDF, EPUB, or video link"></div>
                    <div class="form-group"><label>Download URL</label><input type="url" id="itemDownloadUrl"></div>
                    <div class="form-group"><label>Level</label><select id="itemLevel"><option value="Beginner">Beginner</option><option value="Intermediate">Intermediate</option><option value="Advanced">Advanced</option></select></div>
                    <div class="form-group"><label>Status</label><select id="itemStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select></div>
                    <button type="submit" class="btn-primary">Save Item</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="productModalTitle">Add Product</h2><button class="modal-close closeProductModal">&times;</button></div>
            <div class="modal-body">
                <form id="productForm">
                    <input type="hidden" id="editProductId">
                    <div class="form-group"><label>Product Name</label><input type="text" id="productName" required></div>
                    <div class="form-group"><label>Category</label><select id="productCategory" required><option value="uniform">Uniform</option><option value="gadget">Gadget</option><option value="merchandise">Merchandise</option></select></div>
                    <div class="form-group"><label>Price (₦)</label><input type="number" id="productPrice" required></div>
                    <div class="form-group"><label>Stock Quantity</label><input type="number" id="productStock" required></div>
                    <div class="form-group"><label>Image URL</label><input type="url" id="productImage"></div>
                    <button type="submit" class="btn-primary">Save Product</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Expense Modal -->
    <div id="expenseModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Add Expense</h2><button class="modal-close closeExpenseModal">&times;</button></div>
            <div class="modal-body">
                <form id="expenseForm">
                    <div class="form-group"><label>Category</label><select id="expenseCategory" required><option value="rent">Rent</option><option value="salary">Salary</option><option value="software">Software</option><option value="marketing">Marketing</option><option value="other">Other</option></select></div>
                    <div class="form-group"><label>Amount (₦)</label><input type="number" id="expenseAmount" required></div>
                    <div class="form-group"><label>Description</label><textarea id="expenseDescription" rows="3" required></textarea></div>
                    <div class="form-group"><label>Date</label><input type="date" id="expenseDate" required></div>
                    <button type="submit" class="btn-primary">Add Expense</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Post Modal -->
    <div id="postModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="postModalTitle">Create Post</h2><button class="modal-close closePostModal">&times;</button></div>
            <div class="modal-body">
                <form id="postForm">
                    <input type="hidden" id="editPostId">
                    <div class="form-group"><label>Title</label><input type="text" id="postTitle" required></div>
                    <div class="form-group"><label>Excerpt</label><input type="text" id="postExcerpt"></div>
                    <div class="form-group"><label>Content</label><textarea id="postContent" rows="6" required></textarea></div>
                    <div class="form-group"><label>Category</label><select id="postCategory"><option value="news">News</option><option value="announcement">Announcement</option><option value="update">Update</option></select></div>
                    <div class="form-group"><label>Image URL</label><input type="url" id="postImage"></div>
                    <div class="form-group"><label><input type="checkbox" id="postPublished"> Publish immediately</label></div>
                    <button type="submit" class="btn-primary">Save Post</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Partnership Modal -->
    <div id="partnershipModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="partnershipModalTitle">Add Partnership</h2><button class="modal-close closePartnershipModal">&times;</button></div>
            <div class="modal-body">
                <form id="partnershipForm">
                    <input type="hidden" id="editPartnershipId">
                    <div class="form-group"><label>Company Name</label><input type="text" id="partnershipCompany" required></div>
                    <div class="form-group"><label>Agreement Type</label><select id="partnershipType"><option value="academic">Academic</option><option value="corporate">Corporate</option><option value="technology">Technology</option></select></div>
                    <div class="form-group"><label>Contact Person</label><input type="text" id="partnershipContact"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="partnershipEmail"></div>
                    <div class="form-group"><label>Details</label><textarea id="partnershipDetails" rows="3" required></textarea></div>
                    <div class="form-group"><label>Status</label><select id="partnershipStatus"><option value="active">Active</option><option value="pending">Pending</option><option value="expired">Expired</option></select></div>
                    <button type="submit" class="btn-primary">Save Partnership</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Work Offer Modal -->
    <div id="offerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="offerModalTitle">Create Work Offer</h2><button class="modal-close closeOfferModal">&times;</button></div>
            <div class="modal-body">
                <form id="offerForm">
                    <input type="hidden" id="editOfferId">
                    <div class="form-group"><label>Job Title</label><input type="text" id="offerTitle" required></div>
                    <div class="form-group"><label>Description</label><textarea id="offerDescription" rows="3" required></textarea></div>
                    <div class="form-group"><label>Budget (₦)</label><input type="number" id="offerBudget" required></div>
                    <div class="form-group"><label>Deadline</label><input type="date" id="offerDeadline" required></div>
                    <div class="form-group"><label>Skills Required</label><input type="text" id="offerSkills"></div>
                    <div class="form-group"><label>Status</label><select id="offerStatus"><option value="open">Open</option><option value="in-progress">In Progress</option><option value="filled">Filled</option></select></div>
                    <button type="submit" class="btn-primary">Create Offer</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="eventModalTitle">Create Event</h2><button class="modal-close closeEventModal">&times;</button></div>
            <div class="modal-body">
                <form id="eventForm">
                    <input type="hidden" id="editEventId">
                    <div class="form-group"><label>Event Title</label><input type="text" id="eventTitle" required></div>
                    <div class="form-group"><label>Description</label><textarea id="eventDescription" rows="3" required></textarea></div>
                    <div class="form-group"><label>Date & Time</label><input type="datetime-local" id="eventDateTime" required></div>
                    <div class="form-group"><label>Location</label><input type="text" id="eventLocation" required></div>
                    <div class="form-group"><label>Max Attendees</label><input type="number" id="eventMaxAttendees" value="0"></div>
                    <button type="submit" class="btn-primary">Save Event</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Add Contact</h2><button class="modal-close closeContactModal">&times;</button></div>
            <div class="modal-body">
                <form id="contactForm">
                    <div class="form-group"><label>Name</label><input type="text" id="contactName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="contactEmail" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="contactPhone"></div>
                    <div class="form-group"><label>Organization</label><input type="text" id="contactOrganization"></div>
                    <div class="form-group"><label>Type</label><select id="contactType"><option value="student">Student</option><option value="instructor">Instructor</option><option value="partner">Partner</option></select></div>
                    <button type="submit" class="btn-primary">Save Contact</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content receipt-modal">
            <div class="modal-header"><h2>Payment Receipt</h2><button class="modal-close closeReceiptModal">&times;</button></div>
            <div class="modal-body" id="receiptContent"></div>
            <div class="modal-footer"><button id="downloadReceiptBtn" class="btn-primary">Download PDF</button></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module" src="/js/pages/admin-dashboard.js"></script>
</body>
</html>
