<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Gliimu Institute</title>
    <link rel="stylesheet" href="/frontend/css/forgot-password.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <!-- Header -->
            <div class="reset-header">
                <img src="/frontend/images/logo.png" alt="Gliimu Institute" class="logo" onerror="this.style.display='none'">
                <h1>Reset Password</h1>
                <p>Verify your identity and set a new password</p>
            </div>

            <!-- Single Form -->
            <form id="resetForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label>Recovery Phrase</label>
                    <div class="input-wrapper">
                        <input type="password" id="recoveryPhrase" placeholder="word1-word2-word3-word4-word5-word6" required>
                        <button type="button" class="toggle-btn" id="toggleRecovery">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small>Enter your 6-word recovery phrase</small>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Birth Day</label>
                        <select id="birthDay" required>
                            <option value="">Day</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Birth Month</label>
                        <select id="birthMonth" required>
                            <option value="">Month</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" placeholder="Enter new password (min 8 chars)" required minlength="8">
                        <button type="button" class="toggle-btn" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                        <span class="strength-text" id="strengthText">Weak</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    <div class="match-text" id="matchText"></div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-save"></i> Reset Password
                </button>
            </form>

            <div class="reset-footer">
                <a href="/signin.html"><i class="fas fa-arrow-left"></i> Back to Sign In</a>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✅ Password Reset Successful</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <p>Your credentials have been updated. Save them securely.</p>
                
                <div class="credential">
                    <label>Username</label>
                    <span id="modalUsername"></span>
                </div>
                <div class="credential">
                    <label>New Password</label>
                    <div class="credential-row">
                        <span id="modalPassword"></span>
                        <button class="copy-btn" id="copyPassword"><i class="fas fa-copy"></i></button>
                    </div>
                </div>
                <div class="credential">
                    <label>New Recovery Phrase</label>
                    <div class="credential-row">
                        <span id="modalPhrase" class="phrase"></span>
                        <button class="copy-btn" id="copyPhrase"><i class="fas fa-copy"></i></button>
                    </div>
                </div>

                <div class="modal-actions">
                    <button class="btn-secondary" id="downloadPdf">
                        <i class="fas fa-file-pdf"></i> Download PDF
                    </button>
                    <button class="btn-primary" id="goToSignin">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script type="module" src="/frontend/js/pages/forgot-password.js"></script>
</body>
</html>
