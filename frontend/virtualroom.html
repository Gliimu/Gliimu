<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎥 Virtual Room | Gliimu Institute</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/virtualroom.css">
</head>
<body>

    <div class="virtual-room" id="app">
        
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="icon-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                <div class="room-info">
                    <div class="room-avatar">
                        <i class="fas fa-video"></i>
                        <span class="live-dot"></span>
                    </div>
                    <div>
                        <div class="room-title" id="roomTitle">Loading...</div>
                        <div class="room-meta">
                            <span id="viewerCount">0</span> watching · <span id="classTimer">00:00</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" id="shareBtn"><i class="fas fa-share-alt"></i></button>
                <button class="icon-btn" id="participantsBtn"><i class="fas fa-users"></i><span class="badge" id="participantCount">0</span></button>
                <button class="icon-btn danger" id="leaveBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="video-grid" id="videoGrid">
                <!-- Host Video -->
                <div class="video-card host-card" id="hostVideoCard">
                    <video id="hostVideo" autoplay playsinline></video>
                    <div class="video-placeholder" id="hostPlaceholder">
                        <i class="fas fa-user-circle"></i>
                        <span id="hostStatusText">Host is offline</span>
                    </div>
                    <div class="video-overlay">
                        <div class="participant-name" id="hostName">Host</div>
                        <div class="host-stats">
                            <span><i class="fas fa-star"></i> <span id="hostStars">0</span></span>
                            <span><i class="fas fa-gift"></i> <span id="hostTips">₦0</span></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loading -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <h3 id="loadingText">Connecting...</h3>
                <p id="loadingSubText">Please wait</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar">
            <div class="controls-host" id="hostControls" style="display:none;">
                <button class="control-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
                <button class="control-btn" id="camBtn"><i class="fas fa-video"></i></button>
                <button class="control-btn danger" id="endSessionBtn"><i class="fas fa-stop-circle"></i></button>
            </div>
            <div class="controls-viewer" id="viewerControls" style="display:none;">
                <button class="control-btn" id="raiseHandBtn"><i class="fas fa-hand-paper"></i></button>
                <button class="control-btn" id="tipBtn"><i class="fas fa-gift"></i></button>
                <button class="control-btn" id="starBtn"><i class="fas fa-star"></i></button>
            </div>
            <div class="controls-divider"></div>
            <button class="control-btn chat-toggle" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></button>
        </div>

        <!-- PIP Video -->
        <div class="pip-video" id="pipVideo" style="display:none;">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="pip-placeholder" id="pipPlaceholder"><i class="fas fa-user-circle"></i></div>
            <div class="pip-name">You</div>
        </div>

        <!-- Chat Sidebar (IFrame) -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="chat-sidebar-header">
                <span>💬 Live Chat</span>
                <button class="close-chat" id="closeChatBtn"><i class="fas fa-times"></i></button>
            </div>
            <iframe id="chatIframe" src="/chat.html?embedded=1" class="chat-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>

        <!-- Modals -->
        <div class="modal-overlay" id="tipModal">
            <div class="modal-content">
                <button class="modal-close" id="closeTipModal"><i class="fas fa-times"></i></button>
                <h3>Send a Tip</h3>
                <div class="tip-options">
                    <button class="tip-option" data-amount="50" data-currency="gp">50 GP</button>
                    <button class="tip-option" data-amount="100" data-currency="gp">100 GP</button>
                    <button class="tip-option wallet" data-amount="100" data-currency="wallet">₦100</button>
                    <button class="tip-option wallet" data-amount="500" data-currency="wallet">₦500</button>
                </div>
                <button id="sendCustomTip" class="primary-btn">Send</button>
            </div>
        </div>

        <div class="modal-overlay" id="starModal">
            <div class="modal-content">
                <button class="modal-close" id="closeStarModal"><i class="fas fa-times"></i></button>
                <h3>Rate This Session</h3>
                <div class="star-rating">
                    <button class="star" data-value="1">⭐</button>
                    <button class="star" data-value="2">⭐</button>
                    <button class="star" data-value="3">⭐</button>
                    <button class="star" data-value="4">⭐</button>
                    <button class="star" data-value="5">⭐</button>
                </div>
                <button id="submitStars" class="primary-btn">Submit</button>
            </div>
        </div>

        <div class="modal-overlay" id="shareModal">
            <div class="modal-content">
                <button class="modal-close" id="closeShareModal"><i class="fas fa-times"></i></button>
                <h3>Share Session</h3>
                <div class="share-code">
                    <span id="shareCodeDisplay">GLM-XXXXXX</span>
                    <button id="copyCodeBtn" class="primary-btn small">Copy</button>
                </div>
                <button class="primary-btn full" id="shareToChatBtn"><i class="fas fa-comment"></i> Send to Chat</button>
            </div>
        </div>

        <div class="session-ended-overlay" id="sessionEndedOverlay">
            <div class="session-ended-content">
                <i class="fas fa-check-circle"></i>
                <h2>Session Ended</h2>
                <button class="primary-btn" id="returnBtn">Return to Dashboard</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/pages/virtualroom.js"></script>
</body>
</html>
