<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎥 Virtual Room | Gliimu Institute</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <link rel="stylesheet" href="css/virtualroom.css">
</head>
<body>

    <div class="virtual-room" id="app">
        
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="icon-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                <div class="room-info">
                    <div class="room-title" id="roomTitle">Loading...</div>
                    <div class="room-meta">
                        <span id="viewerCount">0</span> watching · 
                        <span class="live-dot" id="liveDot"></span> 
                        <span id="liveStatus">LIVE</span> · 
                        <span id="classTimer">00:00</span>
                    </div>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" id="shareBtn"><i class="fas fa-share-alt"></i></button>
                <button class="icon-btn danger" id="leaveBtn"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            
            <!-- Video Grid -->
            <div class="video-grid" id="videoGrid">
                <!-- Host Video -->
                <div class="video-card host-card" id="hostVideoCard">
                    <video id="hostVideo" autoplay playsinline></video>
                    <div class="video-placeholder" id="hostPlaceholder">
                        <i class="fas fa-user-circle"></i>
                        <span id="hostStatusText">Waiting for host...</span>
                    </div>
                    <div class="video-overlay">
                        <div class="participant-name" id="hostName">Host</div>
                        <div class="host-stats">
                            <span><i class="fas fa-star"></i> <span id="hostStars">0</span></span>
                            <span><i class="fas fa-gift"></i> <span id="hostTips">₦0</span></span>
                        </div>
                    </div>
                    <div class="connection-status" id="connectionStatus">
                        <i class="fas fa-wifi"></i> Connecting...
                    </div>
                </div>

                <!-- Viewer Thumbnails -->
                <div class="viewer-thumbnails" id="viewerThumbnails">
                    <div class="empty-thumbnails">
                        <i class="fas fa-users"></i>
                        <span>No viewers yet</span>
                    </div>
                </div>
            </div>

            <!-- Daily.co Fallback Container (hidden by default) -->
            <div class="daily-container" id="dailyContainer" style="display:none;">
                <div id="dailyFrameContainer" style="width:100%;height:100%;"></div>
                <div class="daily-overlay" id="dailyOverlay">
                    <div class="daily-loading">
                        <i class="fas fa-video"></i>
                        <h3>Connecting to video...</h3>
                        <p>Using backup video service</p>
                    </div>
                </div>
            </div>

            <!-- Loading -->
            <div class="loading-overlay" id="loadingOverlay">
                <div class="loading-spinner"></div>
                <h3 id="loadingText">Connecting...</h3>
                <p id="loadingSubText">Please wait</p>
                <div id="loadingProgress" style="margin-top:12px;width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;display:none;">
                    <div id="loadingProgressBar" style="width:0%;height:100%;background:var(--accent);border-radius:4px;transition:width 0.3s;"></div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-bar" id="controlsBar">
            <div class="controls-host" id="hostControls" style="display:none;">
                <button class="control-btn" id="micBtn"><i class="fas fa-microphone"></i></button>
                <button class="control-btn" id="camBtn"><i class="fas fa-video"></i></button>
                <button class="control-btn" id="screenBtn"><i class="fas fa-desktop"></i></button>
                <button class="control-btn danger" id="endSessionBtn"><i class="fas fa-stop-circle"></i></button>
            </div>
            <div class="controls-viewer" id="viewerControls" style="display:none;">
                <button class="control-btn" id="raiseHandBtn"><i class="fas fa-hand-paper"></i></button>
                <button class="control-btn" id="tipBtn"><i class="fas fa-heart"></i></button>
                <button class="control-btn" id="starBtn"><i class="fas fa-star"></i></button>
                <button class="control-btn" id="hahaBtn"><i class="fas fa-laugh"></i></button>
            </div>
            <div class="controls-divider"></div>
            <button class="control-btn chat-toggle" id="chatToggleBtn"><i class="fas fa-comment-dots"></i></button>
        </div>

        <!-- PIP Video -->
        <div class="pip-video" id="pipVideo" style="display:none;">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="pip-placeholder" id="pipPlaceholder"><i class="fas fa-user-circle"></i></div>
            <div class="pip-controls">
                <button class="pip-control" id="pipMicControl"><i class="fas fa-microphone"></i></button>
                <button class="pip-control" id="pipCamControl"><i class="fas fa-video"></i></button>
            </div>
            <div class="pip-name">You</div>
        </div>

        <!-- Chat Sidebar -->
        <div class="chat-sidebar" id="chatSidebar">
            <div class="chat-sidebar-header">
                <span>💬 Live Chat</span>
                <button class="close-chat" id="closeChatBtn"><i class="fas fa-times"></i></button>
            </div>
            <iframe id="chatIframe" src="/chat.html?embedded=1" class="chat-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>

        <!-- Share Modal -->
        <div class="modal-overlay" id="shareModal">
            <div class="modal-content">
                <button class="modal-close" id="closeShareModal"><i class="fas fa-times"></i></button>
                <h3>🔗 Share Session</h3>
                <p>Copy the link below to invite others</p>
                <div class="share-link">
                    <input type="text" id="shareLinkInput" readonly value="">
                    <button id="copyLinkBtn" class="primary-btn small">Copy Link</button>
                </div>
                <button class="primary-btn full" id="shareToChatBtn">
                    <i class="fas fa-comment"></i> Send to Chat
                </button>
            </div>
        </div>

        <!-- Tip Modal -->
        <div class="modal-overlay" id="tipModal">
            <div class="modal-content">
                <button class="modal-close" id="closeTipModal"><i class="fas fa-times"></i></button>
                <h3>💝 Send a Tip</h3>
                <div class="tip-options">
                    <button class="tip-option" data-amount="200" data-currency="wallet" data-emoji="❤️">❤️ ₦200</button>
                    <button class="tip-option" data-amount="500" data-currency="wallet" data-emoji="⭐">⭐ ₦500</button>
                    <button class="tip-option" data-amount="1250" data-currency="wallet" data-emoji="😂">😂 ₦1,250</button>
                </div>
                <button id="sendCustomTip" class="primary-btn full">Custom Amount</button>
            </div>
        </div>

        <!-- Star Modal -->
        <div class="modal-overlay" id="starModal">
            <div class="modal-content">
                <button class="modal-close" id="closeStarModal"><i class="fas fa-times"></i></button>
                <h3>⭐ Rate This Session</h3>
                <div class="star-rating">
                    <button class="star" data-value="1">⭐</button>
                    <button class="star" data-value="2">⭐</button>
                    <button class="star" data-value="3">⭐</button>
                    <button class="star" data-value="4">⭐</button>
                    <button class="star" data-value="5">⭐</button>
                </div>
                <button id="submitStars" class="primary-btn full">Submit Rating</button>
            </div>
        </div>

        <!-- Session Ended -->
        <div class="session-ended-overlay" id="sessionEndedOverlay">
            <div class="session-ended-content">
                <i class="fas fa-check-circle"></i>
                <h2>Session Ended</h2>
                <button class="primary-btn" id="returnBtn">Return to Dashboard</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/pages/virtualroom.js"></script>
</body>
</html>
