<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --reader-text: #000000;
            --progress-color: var(--brand-gold);
            --progress-track: #e2e8f0;
            --canvas-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --reader-text: #e0e0e0;
            --progress-track: #2d2d44;
            --canvas-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ============================================
           HEADER
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.6rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: wrap;
            gap: 0.5rem;
            box-shadow: 0 1px 4px var(--shadow-color);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .reader-header .logo img {
            height: 32px;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .reader-header .controls button:hover {
            background: var(--border-color);
            color: var(--brand-gold);
        }

        .reader-header .controls .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 0 4px;
            border: 1px solid var(--border-color);
        }

        .reader-header .controls .zoom-controls button {
            padding: 4px 8px;
            font-size: 0.85rem;
            min-width: 28px;
        }

        .reader-header .controls .zoom-controls .zoom-level {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: center;
        }

        .reader-header .controls .close-btn {
            font-size: 1.2rem;
            color: var(--text-secondary);
        }

        .reader-header .controls .close-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PROGRESS BAR - FANCY ANIMATION
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 4px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            border-radius: 0 2px 2px 0;
        }

        .progress-bar-container .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            animation: shimmer 2s infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-bar-container .progress-tooltip {
            position: absolute;
            bottom: 12px;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-color) 0 2px 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .progress-bar-container:hover .progress-tooltip {
            opacity: 1;
        }

        /* ============================================
           PDF VIEWER CONTAINER
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: auto;
            background: var(--reader-bg);
            position: relative;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .reader-container .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: 100%;
            transition: transform 0.3s ease;
        }

        .reader-container canvas {
            box-shadow: var(--canvas-shadow);
            border-radius: 4px;
            background: var(--reader-bg);
            transition: transform 0.3s ease, filter 0.3s ease;
            max-width: 100%;
            height: auto;
            image-rendering: auto;
        }

        /* Dark mode PDF inversion using CSS filter */
        body.dark-mode .reader-container canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           ZOOM INDICATOR
           ============================================ */
        .zoom-indicator {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.5rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 100;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .zoom-indicator.show {
            opacity: 1;
        }

        /* ============================================
           FOOTER
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.9rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .reader-footer .actions button:hover {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        .reader-footer .actions button.primary:hover {
            background: var(--brand-gold-dark);
            transform: translateY(-1px);
        }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.85rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
        }

        .reader-toast.warning {
            border-left-color: #f59e0b;
        }

        .reader-toast.success {
            border-left-color: #10b981;
        }

        .reader-toast.error {
            border-left-color: #ef4444;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .reader-header {
                padding: 0.5rem 1rem;
                flex-wrap: wrap;
                gap: 0.4rem;
            }
            
            .reader-header .book-title {
                max-width: 150px;
                font-size: 0.75rem;
                order: 3;
                flex-basis: 100%;
                text-align: center;
            }
            
            .reader-footer {
                padding: 0.4rem 1rem;
                flex-wrap: wrap;
                gap: 0.4rem;
                justify-content: center;
            }
            
            .reader-header .logo span {
                font-size: 0.85rem;
            }

            .reader-header .controls button {
                padding: 4px 6px;
                font-size: 0.8rem;
            }

            .reader-header .controls .zoom-controls button {
                padding: 2px 6px;
                font-size: 0.75rem;
            }

            .reader-header .controls .zoom-controls .zoom-level {
                font-size: 0.65rem;
                min-width: 30px;
            }

            .reader-footer .actions button {
                font-size: 0.65rem;
                padding: 0.2rem 0.5rem;
            }

            .reader-container {
                padding: 10px;
            }
        }

        @media (max-width: 480px) {
            .reader-header {
                padding: 0.4rem 0.75rem;
            }
            
            .reader-header .book-title {
                max-width: 100px;
                font-size: 0.65rem;
            }
            
            .reader-header .logo img {
                height: 24px;
            }
            
            .reader-footer {
                padding: 0.3rem 0.75rem;
                font-size: 0.7rem;
            }
            
            .reader-footer .page-info {
                font-size: 0.7rem;
            }

            .reader-container {
                padding: 5px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <!-- Zoom Controls -->
            <div class="zoom-controls">
                <button onclick="zoomOut()" title="Zoom Out">
                    <i class="fas fa-minus"></i>
                </button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button onclick="zoomIn()" title="Zoom In">
                    <i class="fas fa-plus"></i>
                </button>
                <button onclick="resetZoom()" title="Reset Zoom">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="toggleFullscreen()" title="Fullscreen">
                <i class="fas fa-expand"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container" id="progressContainer" title="Reading Progress">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-tooltip" id="progressTooltip">0%</div>
    </div>

    <!-- PDF Viewer Container -->
    <div class="reader-container" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>Loading your book...</p>
        </div>
        <div class="page-wrapper" id="pageWrapper">
            <!-- Canvas will be rendered here -->
        </div>
    </div>

    <!-- Zoom Indicator -->
    <div class="zoom-indicator" id="zoomIndicator">100%</div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i> Report
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done Reading
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - PDF.js with Full Features
        // ============================================

        // ============================================
        // CONFIGURATION
        // ============================================
        const STORAGE_KEY = 'gliimu_reader_progress';
        const AUTO_SAVE_INTERVAL = 3000;
        const ZOOM_STEP = 0.1;
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 3.0;

        // ============================================
        // STATE
        // ============================================
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let autoSaveTimer = null;
        let currentItemId = null;
        let currentZoom = 1.0;
        let isRendering = false;
        let currentScale = 1.5;

        // ============================================
        // DOM REFS
        // ============================================
        const pageWrapper = document.getElementById('pageWrapper');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const progressTooltip = document.getElementById('progressTooltip');
        const progressContainer = document.getElementById('progressContainer');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const zoomLevel = document.getElementById('zoomLevel');
        const zoomIndicator = document.getElementById('zoomIndicator');
        const readerContainer = document.getElementById('readerContainer');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        // Set book title
        bookTitle.textContent = title;
        currentItemId = itemId;

        // ============================================
        // ZOOM FUNCTIONS
        // ============================================
        function updateZoomDisplay() {
            const percent = Math.round(currentZoom * 100);
            zoomLevel.textContent = percent + '%';
            
            // Show zoom indicator
            zoomIndicator.textContent = percent + '%';
            zoomIndicator.classList.add('show');
            clearTimeout(zoomIndicator._timeout);
            zoomIndicator._timeout = setTimeout(() => {
                zoomIndicator.classList.remove('show');
            }, 1500);
        }

        function applyZoom() {
            const canvas = pageWrapper.querySelector('canvas');
            if (canvas) {
                canvas.style.transform = `scale(${currentZoom})`;
                canvas.style.transformOrigin = 'top center';
                updateZoomDisplay();
            }
        }

        function zoomIn() {
            if (currentZoom < MAX_ZOOM) {
                currentZoom = Math.min(currentZoom + ZOOM_STEP, MAX_ZOOM);
                applyZoom();
                showToast(`Zoom: ${Math.round(currentZoom * 100)}%`, 'info');
            } else {
                showToast('Maximum zoom reached', 'warning');
            }
        }

        function zoomOut() {
            if (currentZoom > MIN_ZOOM) {
                currentZoom = Math.max(currentZoom - ZOOM_STEP, MIN_ZOOM);
                applyZoom();
                showToast(`Zoom: ${Math.round(currentZoom * 100)}%`, 'info');
            } else {
                showToast('Minimum zoom reached', 'warning');
            }
        }

        function resetZoom() {
            currentZoom = 1.0;
            applyZoom();
            showToast('Zoom reset to 100%', 'success');
        }

        // ============================================
        // INITIALIZE PDF.js
        // ============================================
        async function initPDF() {
            if (!pdfUrl) {
                loadingOverlay.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--brand-gold);"></i>
                    <p>No book found to read</p>
                `;
                loadingOverlay.classList.remove('hidden');
                pageInfo.textContent = '❌ No book';
                return;
            }

            try {
                // Load PDF.js
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                document.head.appendChild(script);

                await new Promise((resolve) => {
                    script.onload = resolve;
                });

                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                // Load the PDF
                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    withCredentials: false,
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = `Page 1 of ${totalPages}`;

                console.log(`📚 PDF loaded: ${totalPages} pages`);

                // Load saved progress
                await loadSavedProgress();

                // Render first page
                await renderPage(currentPage);

                // Hide loading
                loadingOverlay.classList.add('hidden');

                // Start auto-save
                startAutoSave();

                // Setup event listeners
                setupKeyboardShortcuts();

            } catch (error) {
                console.error('PDF loading error:', error);
                loadingOverlay.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--brand-gold);"></i>
                    <p>Could not load the PDF. Please try again.</p>
                    <button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1.5rem;border-radius:40px;background:var(--brand-gold);color:var(--brand-purple);border:none;font-weight:600;cursor:pointer;font-family:inherit;">
                        Retry
                    </button>
                `;
                loadingOverlay.classList.remove('hidden');
                showToast('Failed to load the book', 'error');
            }
        }

        // ============================================
        // RENDER PAGE
        // ============================================
        async function renderPage(pageNum) {
            if (!pdfDoc || isRendering) return;

            isRendering = true;

            try {
                const page = await pdfDoc.getPage(pageNum);
                
                // Calculate scale to fit width with some padding
                const containerWidth = readerContainer.clientWidth - 40;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min(
                    (containerWidth / viewport.width) * 1.0,
                    2.0
                );
                
                const scaledViewport = page.getViewport({ scale: scale });

                // Create or get canvas
                let canvas = pageWrapper.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    pageWrapper.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;

                // Clear previous content
                context.clearRect(0, 0, canvas.width, canvas.height);

                // Render page
                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                currentPage = pageNum;
                pageInfo.textContent = `Page ${pageNum} of ${totalPages}`;
                updateProgress();

                // Apply current zoom
                applyZoom();

                // Save progress when page changes
                saveProgress();

                // Scroll to top of page
                readerContainer.scrollTop = 0;

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function nextPage() {
            if (currentPage < totalPages) {
                renderPage(currentPage + 1);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        function goToPage() {
            const input = prompt(`Enter page number (1-${totalPages}):`, currentPage);
            if (input) {
                const page = parseInt(input);
                if (page >= 1 && page <= totalPages) {
                    renderPage(page);
                } else {
                    showToast(`Please enter a number between 1 and ${totalPages}`, 'warning');
                }
            }
        }

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Don't trigger if typing in input
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                // Check if modifier keys are pressed
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case '+':
                        case '=':
                            e.preventDefault();
                            zoomIn();
                            return;
                        case '-':
                            e.preventDefault();
                            zoomOut();
                            return;
                        case '0':
                            e.preventDefault();
                            resetZoom();
                            return;
                    }
                    return;
                }

                switch(e.key) {
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case ' ':
                        e.preventDefault();
                        nextPage();
                        break;
                    case 'ArrowLeft':
                    case 'ArrowUp':
                        e.preventDefault();
                        prevPage();
                        break;
                    case 'Home':
                        e.preventDefault();
                        renderPage(1);
                        break;
                    case 'End':
                        e.preventDefault();
                        renderPage(totalPages);
                        break;
                    case 'g':
                        e.preventDefault();
                        goToPage();
                        break;
                    case 't':
                        e.preventDefault();
                        toggleTheme();
                        break;
                    case 'f':
                        e.preventDefault();
                        toggleFullscreen();
                        break;
                    case 'Escape':
                        if (document.fullscreenElement) {
                            toggleFullscreen();
                        }
                        break;
                }
            });

            // Mouse wheel support with zoom
            readerContainer.addEventListener('wheel', (e) => {
                // Check if Ctrl is pressed for zoom
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    if (e.deltaY < 0) {
                        zoomIn();
                    } else {
                        zoomOut();
                    }
                    return;
                }

                // Normal scroll for page navigation (only if not over an input)
                if (e.target.closest('input') || e.target.closest('textarea')) return;
                
                // Check if we're in the reader container
                if (!e.target.closest('.reader-container')) return;
                
                // Prevent default scrolling
                e.preventDefault();
                
                // Scroll down = next page, scroll up = prev page
                if (e.deltaY > 0) {
                    nextPage();
                } else if (e.deltaY < 0) {
                    prevPage();
                }
            }, { passive: false });
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function updateProgress() {
            const progress = (currentPage / totalPages) * 100;
            progressFill.style.width = progress + '%';
            progressTooltip.textContent = Math.round(progress) + '%';

            // Update page info with fancy icon
            const icon = progress >= 90 ? '🎯' : progress >= 50 ? '📖' : '📚';
            pageInfo.innerHTML = `${icon} Page ${currentPage} of ${totalPages} (${Math.round(progress)}%)`;
        }

        // ============================================
        // SAVE PROGRESS TO LOCAL STORAGE
        // ============================================
        function saveProgress() {
            try {
                const progressData = {
                    itemId: currentItemId,
                    title: title,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    progress: (currentPage / totalPages) * 100,
                    lastRead: new Date().toISOString(),
                    url: pdfUrl
                };

                // Save to localStorage
                localStorage.setItem(`${STORAGE_KEY}_${currentItemId || title}`, JSON.stringify(progressData));

                // Also save to the global progress list
                const allProgress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                allProgress[currentItemId || title] = progressData;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allProgress));

                console.log('💾 Progress saved:', progressData.progress + '%');
            } catch (e) {
                console.warn('Could not save progress:', e);
            }
        }

        // ============================================
        // LOAD SAVED PROGRESS
        // ============================================
        async function loadSavedProgress() {
            try {
                // Try to load specific progress
                const saved = localStorage.getItem(`${STORAGE_KEY}_${currentItemId || title}`);
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        showToast(`📚 Resuming from page ${currentPage}`, 'success');
                        return;
                    }
                }

                // Check global progress
                const allProgress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                const globalData = allProgress[currentItemId || title];
                if (globalData && globalData.currentPage <= totalPages) {
                    currentPage = globalData.currentPage;
                    showToast(`📚 Resuming from page ${currentPage}`, 'success');
                    return;
                }

            } catch (e) {
                console.warn('Could not load saved progress:', e);
            }
        }

        // ============================================
        // AUTO-SAVE
        // ============================================
        function startAutoSave() {
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            autoSaveTimer = setInterval(() => {
                saveProgress();
            }, AUTO_SAVE_INTERVAL);
        }

        // ============================================
        // THEME TOGGLE WITH PDF INVERT
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            // Update icon
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            
            // Save preference
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            
            // The PDF inversion is handled by CSS filter
            // It automatically applies when dark-mode class is added

            showToast(isDarkMode ? '🌙 Dark mode activated' : '☀️ Light mode activated', 'success');
        }

        // ============================================
        // FULLSCREEN
        // ============================================
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(() => {});
                }
            }
        }

        // ============================================
        // CLOSE READER
        // ============================================
        function closeReader() {
            // Save progress before closing
            saveProgress();
            
            // Stop auto-save
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }

            // Close window or redirect
            try {
                window.close();
            } catch (e) {
                window.location.href = '/hub.html';
            }
        }

        // ============================================
        // REPORT ISSUE
        // ============================================
        function reportIssue() {
            if (confirm('Report an issue with this book? Our team will investigate.')) {
                showToast('Thank you for reporting! We\'ll look into it.', 'success');
            }
        }

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type = 'info') {
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = `reader-toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ============================================
        // PROGRESS BAR CLICK - GO TO PAGE
        // ============================================
        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            const targetPage = Math.max(1, Math.min(totalPages, Math.round(pos * totalPages)));
            renderPage(targetPage);
            showToast(`📍 Jumped to page ${targetPage}`, 'info');
        });

        // ============================================
        // WINDOW RESIZE - Re-render current page
        // ============================================
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc && currentPage) {
                    renderPage(currentPage);
                }
            }, 300);
        });

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // HANDLE WINDOW CLOSE
        // ============================================
        window.addEventListener('beforeunload', () => {
            saveProgress();
        });

        // ============================================
        // INIT
        // ============================================
        // Start the reader
        initPDF();

        // ============================================
        // EXPOSE FUNCTIONS GLOBALLY
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.goToPage = goToPage;
        window.toggleTheme = toggleTheme;
        window.toggleFullscreen = toggleFullscreen;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.zoomIn = zoomIn;
        window.zoomOut = zoomOut;
        window.resetZoom = resetZoom;

        console.log('📚 Gliimu Reader initialized');
    </script>
</body>
</html>
