<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --progress-track: #e2e8f0;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --progress-track: #2d2d44;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER - Compact
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.3rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            gap: 0.3rem;
            min-height: 44px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 22px;
            width: auto;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.6rem;
            color: var(--text-secondary);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            flex-shrink: 0;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 6px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-header .controls button:active {
            background: var(--border-color);
            transform: scale(0.92);
        }

        .reader-header .controls .close-btn {
            font-size: 0.9rem;
            padding: 3px 5px;
        }

        .reader-header .controls .close-btn:active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 3px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar-container .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            animation: shimmer 2s infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ============================================
           READER CONTAINER
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: auto;
            background: var(--reader-bg);
            position: relative;
            -webkit-overflow-scrolling: touch;
            height: 100%;
            min-height: 0;
        }

        .reader-container .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: 100%;
            padding: 8px 10px 20px;
        }

        .reader-container canvas {
            box-shadow: 0 2px 12px var(--shadow-color);
            border-radius: 4px;
            background: var(--reader-bg);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        body.dark-mode .reader-container canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.5s ease;
            padding: 2rem;
            text-align: center;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            max-width: 280px;
        }

        .loading-overlay .retry-btn {
            margin-top: 0.75rem;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            background: var(--brand-gold);
            color: var(--brand-purple);
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            touch-action: manipulation;
        }

        .loading-overlay .retry-btn:active {
            transform: scale(0.95);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.4rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.7rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning { border-left-color: #f59e0b; }
        .reader-toast.success { border-left-color: #10b981; }
        .reader-toast.error { border-left-color: #ef4444; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           FOOTER - Compact
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.25rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.6rem;
            color: var(--text-secondary);
            gap: 0.3rem;
            min-height: 34px;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.7rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.25rem;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.1rem 0.4rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.55rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .reader-header .logo span { font-size: 0.6rem; }
            .reader-header .book-title { max-width: 60px; font-size: 0.5rem; }
            .reader-header .controls button { font-size: 0.65rem; padding: 2px 4px; }
            .reader-container .page-wrapper { padding: 5px 5px 15px; }
        }

        @supports (padding: max(0px)) {
            .reader-header {
                padding-top: max(0.3rem, env(safe-area-inset-top));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
            .reader-footer {
                padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Reader Container -->
    <div class="reader-container" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
            <button class="retry-btn" id="retryBtn" style="display:none;" onclick="retryLoad()">
                <i class="fas fa-redo"></i> Retry
            </button>
        </div>
        <div class="page-wrapper" id="pageWrapper">
            <!-- Canvas will be rendered here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - iPhone Safari Optimized
        // ============================================

        // ============================================
        // DETECT iOS
        // ============================================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        console.log('📱 iOS:', isIOS);

        // ============================================
        // STATE
        // ============================================
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let autoSaveTimer = null;
        let currentItemId = null;
        let isRendering = false;
        let isLoading = false;
        let pageCache = {};

        // ============================================
        // DOM REFS
        // ============================================
        const pageWrapper = document.getElementById('pageWrapper');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const retryBtn = document.getElementById('retryBtn');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const readerContainer = document.getElementById('readerContainer');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        bookTitle.textContent = title;
        currentItemId = itemId;

        // ============================================
        // SHOW/HIDE LOADING
        // ============================================
        function showLoading(message) {
            isLoading = true;
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            loadingText.textContent = message || 'Loading...';
            retryBtn.style.display = 'none';
        }

        function hideLoading() {
            isLoading = false;
            loadingOverlay.classList.add('hidden');
        }

        function showError(message) {
            isLoading = false;
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'none';
            loadingText.textContent = message || 'Failed to load the book.';
            retryBtn.style.display = 'block';
        }

        function retryLoad() {
            showLoading('Retrying...');
            setTimeout(initPDF, 500);
        }

        // ============================================
        // LOAD PDF.JS
        // ============================================
        function loadPDFJS() {
            return new Promise(function(resolve, reject) {
                if (typeof pdfjsLib !== 'undefined' && pdfjsLib.version) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                // Use older version for better iOS compatibility
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
                script.crossOrigin = 'anonymous';
                
                script.onload = function() {
                    if (typeof pdfjsLib !== 'undefined') {
                        try {
                            // Disable workers for iOS
                            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                            pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                        } catch (e) {}
                        resolve();
                    } else {
                        reject(new Error('PDF.js failed to initialize'));
                    }
                };
                
                script.onerror = function() {
                    reject(new Error('PDF.js library could not be loaded'));
                };
                
                document.head.appendChild(script);
            });
        }

        // ============================================
        // RENDER PAGE - Simple, Reliable
        // ============================================
        async function renderPage(pageNum) {
            if (!pdfDoc || isRendering) return;

            isRendering = true;

            try {
                // Check cache
                if (pageCache[pageNum]) {
                    const canvas = pageWrapper.querySelector('canvas');
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        canvas.width = pageCache[pageNum].width;
                        canvas.height = pageCache[pageNum].height;
                        canvas.style.width = pageCache[pageNum].width + 'px';
                        canvas.style.height = pageCache[pageNum].height + 'px';
                        ctx.putImageData(pageCache[pageNum].imageData, 0, 0);
                        currentPage = pageNum;
                        updateProgress();
                        saveProgress();
                        isRendering = false;
                        return;
                    }
                }

                const page = await pdfDoc.getPage(pageNum);
                
                // Calculate scale - fit width
                const containerWidth = readerContainer.clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                
                const scaledViewport = page.getViewport({ scale: scale });

                let canvas = pageWrapper.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    pageWrapper.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                context.clearRect(0, 0, canvas.width, canvas.height);

                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                // Cache the page
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                pageCache[pageNum] = {
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData
                };

                currentPage = pageNum;
                updateProgress();
                saveProgress();
                readerContainer.scrollTop = 0;

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function nextPage() {
            if (currentPage < totalPages) {
                renderPage(currentPage + 1);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        // ============================================
        // PROGRESS
        // ============================================
        function updateProgress() {
            const progress = (currentPage / totalPages) * 100;
            progressFill.style.width = progress + '%';
            pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages;
        }

        // ============================================
        // SAVE/Load
        // ============================================
        function saveProgress() {
            try {
                const data = {
                    itemId: currentItemId,
                    title: title,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    lastRead: new Date().toISOString()
                };
                localStorage.setItem('reader_progress_' + (currentItemId || title), JSON.stringify(data));
            } catch (e) {}
        }

        function loadSavedProgress() {
            try {
                const saved = localStorage.getItem('reader_progress_' + (currentItemId || title));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        return true;
                    }
                }
            } catch (e) {}
            return false;
        }

        // ============================================
        // THEME
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            
            // Re-render for dark mode
            if (pdfDoc && currentPage) {
                // Clear cache for re-render
                pageCache = {};
                renderPage(currentPage);
            }
            
            showToast(isDarkMode ? '🌙 Dark mode' : '☀️ Light mode', 'success');
        }

        // ============================================
        // CLOSE
        // ============================================
        function closeReader() {
            saveProgress();
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            try { window.close(); } catch(e) { window.location.href = '/hub.html'; }
        }

        function reportIssue() {
            if (confirm('Report an issue with this book?')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // EVENT LISTENERS - Simple
        // ============================================
        function setupEventListeners() {
            // Keyboard
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                switch(e.key) {
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case ' ':
                        e.preventDefault();
                        nextPage();
                        break;
                    case 'ArrowLeft':
                    case 'ArrowUp':
                        e.preventDefault();
                        prevPage();
                        break;
                    case 'Home':
                        e.preventDefault();
                        renderPage(1);
                        break;
                    case 'End':
                        e.preventDefault();
                        renderPage(totalPages);
                        break;
                }
            });

            // Touch swipe
            let startX = 0, startY = 0;
            
            readerContainer.addEventListener('touchstart', function(e) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            readerContainer.addEventListener('touchend', function(e) {
                if (!startX) return;
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const diffX = startX - endX;
                const diffY = startY - endY;
                
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 40) {
                    if (diffX > 0) nextPage();
                    else prevPage();
                }
                startX = 0;
                startY = 0;
            }, { passive: true });

            // Resize
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    if (pdfDoc && currentPage) {
                        pageCache = {};
                        renderPage(currentPage);
                    }
                }, 500);
            });
        }

        // ============================================
        // MAIN INIT - SIMPLIFIED
        // ============================================
        async function initPDF() {
            if (!pdfUrl) {
                showError('No book found');
                return;
            }

            try {
                showLoading('Loading...');

                // Load PDF.js
                await loadPDFJS();

                // Load PDF - simple approach for iOS
                let pdfData;
                
                try {
                    const response = await fetch(pdfUrl);
                    pdfData = await response.arrayBuffer();
                } catch (fetchError) {
                    console.error('Fetch error:', fetchError);
                    showError('Could not download the book. Please check your connection.');
                    return;
                }

                // Load PDF document
                const loadingTask = pdfjsLib.getDocument({
                    data: pdfData,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true,
                    useWorkerFetch: false,
                    isEvalSupported: false
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = 'Page 1 of ' + totalPages;

                console.log('📚 Loaded: ' + totalPages + ' pages');

                // Load saved progress
                const hasProgress = loadSavedProgress();
                if (!hasProgress) {
                    currentPage = 1;
                }

                // Render
                await renderPage(currentPage);
                hideLoading();

                // Auto-save
                if (autoSaveTimer) clearInterval(autoSaveTimer);
                autoSaveTimer = setInterval(saveProgress, 5000);

                setupEventListeners();
                showToast('✅ Book loaded!', 'success');

            } catch (error) {
                console.error('Error:', error);
                showError('Could not load the book. Please try again.');
            }
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // START
        // ============================================
        window.addEventListener('beforeunload', saveProgress);
        
        // Small delay to ensure DOM is ready
        setTimeout(initPDF, 100);

        // ============================================
        // EXPOSE
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.retryLoad = retryLoad;

        console.log('📚 Gliimu Reader - iPhone Optimized');
    </script>
</body>
</html>
