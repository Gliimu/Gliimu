        // ✅ FIX: Wait for auth session to restore
        async function waitForAuth() {
            console.log('⏳ Waiting for auth session to restore...');
            
            return new Promise((resolve) => {
                let attempts = 0;
                const maxAttempts = 20;
                const interval = 300; // ms between attempts

                const checkAuth = async () => {
                    attempts++;
                    
                    try {
                        // Check if we have a session
                        const { data: { session }, error } = await supabaseClient.auth.getSession();
                        
                        if (error) {
                            console.warn('⚠️ Auth session error:', error);
                        }
                        
                        if (session) {
                            console.log('✅ Auth session restored!');
                            resolve(true);
                            return;
                        }
                        
                        if (attempts >= maxAttempts) {
                            console.log('⏰ Auth timeout - no session found');
                            resolve(false);
                            return;
                        }
                        
                        console.log(`⏳ Waiting for auth... (attempt ${attempts}/${maxAttempts})`);
                        setTimeout(checkAuth, interval);
                        
                    } catch (e) {
                        console.warn('⚠️ Auth check error:', e);
                        if (attempts >= maxAttempts) {
                            resolve(false);
                        } else {
                            setTimeout(checkAuth, interval);
                        }
                    }
                };

                checkAuth();
            });
        }

        // ============================================
        // CONFETTI
        // ============================================
        let confettiPieces = [];
        let confettiAnimationId = null;

        function startConfetti() {
            const ctx = confettiCanvas.getContext('2d');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;

            const colors = ['#fbb040', '#2c2f78', '#10b981', '#ef4444', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b'];
            
            for (let i = 0; i < 150; i++) {
                confettiPieces.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    speed: Math.random() * 3 + 1,
                    drift: Math.random() * 2 - 1,
                    opacity: Math.random() * 0.8 + 0.2
                });
            }

            animateConfetti();
        }

        function animateConfetti() {
            const ctx = confettiCanvas.getContext('2d');
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

            let active = false;

            for (const piece of confettiPieces) {
                piece.y += piece.speed;
                piece.x += piece.drift;
                piece.rotation += 2;

                if (piece.y < confettiCanvas.height + 20) {
                    active = true;
                }

                ctx.save();
                ctx.translate(piece.x, piece.y);
                ctx.rotate((piece.rotation * Math.PI) / 180);
                ctx.globalAlpha = piece.opacity;
                ctx.fillStyle = piece.color;
                ctx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
                ctx.restore();
            }

            if (active) {
                confettiAnimationId = requestAnimationFrame(animateConfetti);
            } else {
                confettiPieces = [];
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }

        function stopConfetti() {
            if (confettiAnimationId) {
                cancelAnimationFrame(confettiAnimationId);
                confettiAnimationId = null;
            }
            const ctx = confettiCanvas.getContext('2d');
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            confettiPieces = [];
        }

        // ============================================
        // LOAD PDF.JS
        // ============================================
        function loadPDFJS() {
            return new Promise(function(resolve, reject) {
                if (typeof pdfjsLib !== 'undefined' && pdfjsLib.version) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
                script.crossOrigin = 'anonymous';
                
                script.onload = function() {
                    if (typeof pdfjsLib !== 'undefined') {
                        try {
                            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                            pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                        } catch (e) {}
                        resolve();
                    } else {
                        reject(new Error('PDF.js failed to initialize'));
                    }
                };
                
                script.onerror = function() {
                    const fallbackScript = document.createElement('script');
                    fallbackScript.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js';
                    fallbackScript.crossOrigin = 'anonymous';
                    fallbackScript.onload = function() {
                        if (typeof pdfjsLib !== 'undefined') {
                            try {
                                pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                                pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                            } catch (e) {}
                            resolve();
                        } else {
                            reject(new Error('PDF.js failed to load from fallback'));
                        }
                    };
                    fallbackScript.onerror = function() {
                        reject(new Error('PDF.js library could not be loaded'));
                    };
                    document.head.appendChild(fallbackScript);
                };
                
                document.head.appendChild(script);
            });
        }

        // ============================================
        // RENDER PAGE
        // ============================================
        async function renderPage(pageNum) {
            if (!pdfDoc || isRendering || usingGoogleDocs) return;

            isRendering = true;

            try {
                if (pageCache[pageNum]) {
                    const canvas = pageWrapper.querySelector('canvas');
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        canvas.width = pageCache[pageNum].width;
                        canvas.height = pageCache[pageNum].height;
                        canvas.style.width = pageCache[pageNum].width + 'px';
                        canvas.style.height = pageCache[pageNum].height + 'px';
                        ctx.putImageData(pageCache[pageNum].imageData, 0, 0);
                        currentPage = pageNum;
                        updateProgress();
                        saveProgress();
                        checkIfCompleted();
                        isRendering = false;
                        return;
                    }
                }

                const page = await pdfDoc.getPage(pageNum);
                
                const containerWidth = readerContainer.clientWidth - 30;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                const scaledViewport = page.getViewport({ scale: scale });

                let canvas = pageWrapper.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    pageWrapper.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                context.clearRect(0, 0, canvas.width, canvas.height);

                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                pageCache[pageNum] = {
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData
                };

                currentPage = pageNum;
                updateProgress();
                saveProgress();
                readerContainer.scrollTop = 0;
                checkIfCompleted();

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

            if (currentPage > 1) {
                renderPage(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function updateProgress() {
            if (usingGoogleDocs) return;
            const progress = (currentPage / totalPages) * 100;
            progressFill.style.width = progress + '%';
            
            const icon = progress >= 90 ? '🎯' : progress >= 50 ? '📖' : '📚';
            pageInfo.innerHTML = icon + ' Page ' + currentPage + ' of ' + totalPages;
        }

        // ============================================
        // SAVE/LOAD PROGRESS
        // ============================================
        function saveProgress() {
            try {
                const progressData = {
                    itemId: currentItemId,
                    title: title,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    progress: (currentPage / totalPages) * 100,
                    lastRead: new Date().toISOString(),
                    usingGoogleDocs: usingGoogleDocs,
                    isCompleted: isCompleted
                };

                localStorage.setItem('reader_progress_' + (currentItemId || title), JSON.stringify(progressData));
            } catch (e) {}
        }

        function loadSavedProgress() {
            try {
                const saved = localStorage.getItem('reader_progress_' + (currentItemId || title));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        if (data.isCompleted) {
                            isCompleted = true;
                        }
                        return true;
                    }
                }
            } catch (e) {}
            return false;
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            
            if (pdfDoc && currentPage && !usingGoogleDocs) {
                pageCache = {};
                renderPage(currentPage);
            }

            showToast(isDarkMode ? '🌙 Dark mode activated' : '☀️ Light mode activated', 'success');
        }

        // ============================================
        // CLOSE READER
        // ============================================
        function closeReader() {
            saveProgress();
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            stopConfetti();
            try { window.close(); } catch (e) { window.location.href = '/hub.html'; }
        }

        function reportIssue() {
            if (confirm('Report an issue with this book? Our team will investigate.')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // MAIN INIT
        // ============================================
        async function initReader() {
            if (!fileUrl) {
                showAuthRequired('No Book Found', 'No content URL was provided. Please go back and try again.');
                return;
            }

            // 1. Check Authorization (now with cross-tab support)
            const authorized = await checkAuthorization();
            if (!authorized) return;

            // 2. Load PDF
            showLoading('Loading PDF library...');

            try {
                await loadPDFJS();

                showLoading('Opening book...', 'Loading the PDF file');

                const response = await fetch(fileUrl);
                const pdfData = await response.arrayBuffer();

                const loadingTask = pdfjsLib.getDocument({
                    data: pdfData,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true,
                    useWorkerFetch: false,
                    isEvalSupported: false
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = 'Page 1 of ' + totalPages;

                console.log('📚 PDF loaded: ' + totalPages + ' pages');

                const hasProgress = loadSavedProgress();
                if (!hasProgress) currentPage = 1;

                await renderPage(currentPage);
                hideLoading();

                if (autoSaveTimer) clearInterval(autoSaveTimer);
                autoSaveTimer = setInterval(saveProgress, 5000);

                showToast('✅ Book loaded successfully!', 'success');

                if (isCompleted) {
                    const actions = document.querySelector('.reader-footer .actions');
                    const existingBtn = actions.querySelector('.completed-btn');
                    if (!existingBtn) {
                        const btn = document.createElement('button');
                        btn.className = 'completed-btn';
                        btn.innerHTML = '<i class="fas fa-star"></i> Completed! Claim GP';
                        btn.onclick = markAsCompleted;
                        actions.appendChild(btn);
                    }
                }

            } catch (error) {
                console.error('PDF loading error:', error);
                
                if (isMobile || isSafari) {
                    showLoading('PDF.js failed, using Google Docs...', 'Opening in Google Docs viewer');
                    setTimeout(function() {
                        loadGoogleDocs();
                    }, 1000);
                } else {
                    showToast('Could not load the book. Please try again.', 'error');
                }
            }
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // START
        // ============================================
        window.addEventListener('beforeunload', saveProgress);
        window.addEventListener('resize', function() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        });

        async function start() {
            try {
                await loadSupabase();
            } catch (e) {
                console.warn('Supabase load warning:', e);
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase;
                }
            }
            
            setTimeout(initReader, 200);
        }

        start();

        // ============================================
        // EXPOSE GLOBALLY
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.goToLogin = goToLogin;
        window.goToHub = goToHub;
        window.markAsCompleted = markAsCompleted;

        console.log('📚 Gliimu Professional Reader with Cross-Tab Auth Support');
    </script>
</body>
</html>
