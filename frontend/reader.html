<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES
           ============================================ */
        :root {
            --brand-purple: #2c2f78;
            --brand-purple-light: #4a4d9e;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --reader-text: #1a1a2e;
            --progress-track: #e2e8f0;
            --success: #10b981;
            --success-dark: #059669;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --reader-text: #e0e0e0;
            --progress-track: #2d2d44;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            gap: 0.5rem;
            box-shadow: 0 1px 4px var(--shadow-color);
            min-height: 52px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 26px;
            width: auto;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-header .controls button:hover {
            background: var(--border-color);
            color: var(--brand-gold);
        }

        .reader-header .controls button:active {
            transform: scale(0.92);
        }

        .reader-header .controls .close-btn {
            font-size: 1rem;
            padding: 4px 8px;
        }

        .reader-header .controls .close-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .reader-header .controls .view-mode-btn {
            font-size: 0.7rem;
            padding: 3px 8px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
        }

        .reader-header .controls .view-mode-btn.active {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
            background: rgba(251, 176, 64, 0.1);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 4px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            touch-action: none;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-bar-container .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            animation: shimmer 2s infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ============================================
           READER CONTAINER
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: auto;
            background: var(--reader-bg);
            position: relative;
            transition: background 0.3s;
            -webkit-overflow-scrolling: touch;
            height: 100%;
            min-height: 0;
        }

        /* Scroll modes */
        .reader-container.vertical-scroll .page-wrapper {
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .reader-container.horizontal-scroll .page-wrapper {
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            overflow-x: auto;
            padding: 15px 20px 30px;
            justify-content: flex-start;
        }

        .reader-container .page-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            min-height: 100%;
            padding: 15px 20px 30px;
            transition: flex-direction 0.3s ease;
        }

        .reader-container .page-wrapper .page-item {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reader-container .page-wrapper .page-item .page-number {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: 6px;
            opacity: 0.6;
        }

        .reader-container canvas {
            box-shadow: 0 2px 16px var(--shadow-color);
            border-radius: 6px;
            background: var(--reader-bg);
            transition: filter 0.3s ease;
            max-width: 100%;
            height: auto;
            touch-action: none;
            display: block;
        }

        body.dark-mode .reader-container canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* Horizontal scroll hint */
        .reader-container.horizontal-scroll .scroll-hint {
            display: flex;
        }

        .scroll-hint {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-secondary);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.65rem;
            box-shadow: var(--shadow-color) 0 4px 12px;
            animation: pulse 2s infinite;
            z-index: 15;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        /* ============================================
           GOOGLE DOCS VIEWER (Fallback)
           ============================================ */
        .reader-container .google-docs-viewer {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--reader-bg);
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s ease;
            padding: 2rem;
            text-align: center;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            max-width: 300px;
        }

        .loading-overlay .loading-sub {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 0.25rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           COMPLETION CELEBRATION OVERLAY
           ============================================ */
        .celebration-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .celebration-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .celebration-overlay .celebration-content {
            max-width: 500px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: bounceIn 0.6s ease;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            60% { opacity: 1; transform: scale(1.05) rotate(1deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        .celebration-overlay .confetti-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .celebration-overlay .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall 3s ease-in forwards;
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(calc(100vh)) rotate(720deg) scale(0.5); }
        }

        .celebration-overlay .celebration-icon {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            animation: celebPulse 1.5s ease-in-out infinite;
        }

        @keyframes celebPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .celebration-overlay h2 {
            font-size: 1.8rem;
            color: var(--brand-gold);
            margin-bottom: 0.5rem;
        }

        .celebration-overlay .gp-reward {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--brand-gold);
            margin: 0.5rem 0;
        }

        .celebration-overlay .gp-reward span {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .celebration-overlay .message {
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0.5rem 0 1.5rem;
        }

        .celebration-overlay .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .celebration-overlay .btn-group button {
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .celebration-overlay .btn-group button:active {
            transform: scale(0.95);
        }

        .celebration-overlay .btn-group .btn-primary {
            background: var(--brand-gold);
            color: var(--brand-purple);
        }

        .celebration-overlay .btn-group .btn-primary:hover {
            background: var(--brand-gold-dark);
            transform: translateY(-2px);
        }

        .celebration-overlay .btn-group .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .celebration-overlay .btn-group .btn-secondary:hover {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
        }

        .celebration-overlay .btn-group .btn-success {
            background: var(--success);
            color: white;
        }

        .celebration-overlay .btn-group .btn-success:hover {
            background: var(--success-dark);
            transform: translateY(-2px);
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.75rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning { border-left-color: #f59e0b; }
        .reader-toast.success { border-left-color: #10b981; }
        .reader-toast.error { border-left-color: #ef4444; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           FOOTER
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.35rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.65rem;
            color: var(--text-secondary);
            gap: 0.5rem;
            min-height: 38px;
            flex-wrap: wrap;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.75rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.15rem 0.6rem;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.6rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-footer .actions button:hover {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        .reader-footer .actions button.primary:hover {
            background: var(--brand-gold-dark);
            border-color: var(--brand-gold-dark);
        }

        .reader-footer .actions button.success {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .reader-footer .actions button.success:hover {
            background: var(--success-dark);
            border-color: var(--success-dark);
        }

        .reader-footer .actions button.completed {
            background: var(--brand-purple);
            border-color: var(--brand-purple);
            color: white;
            font-weight: 600;
        }

        .reader-footer .actions button.completed:hover {
            background: var(--brand-purple-light);
            border-color: var(--brand-purple-light);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .reader-header {
                padding: 0.3rem 0.6rem;
                min-height: 44px;
            }
            
            .reader-header .logo img {
                height: 20px;
            }
            
            .reader-header .logo span {
                font-size: 0.7rem;
            }
            
            .reader-header .book-title {
                max-width: 100px;
                font-size: 0.6rem;
            }
            
            .reader-header .controls button {
                font-size: 0.7rem;
                padding: 3px 6px;
            }

            .reader-header .controls .view-mode-btn {
                font-size: 0.6rem;
                padding: 2px 6px;
            }
            
            .reader-footer {
                padding: 0.25rem 0.6rem;
                font-size: 0.55rem;
                min-height: 34px;
            }
            
            .reader-footer .actions button {
                font-size: 0.5rem;
                padding: 0.1rem 0.4rem;
            }
            
            .reader-container .page-wrapper {
                padding: 10px 12px 20px;
            }

            .reader-container.horizontal-scroll .page-wrapper {
                padding: 10px 12px 20px;
                gap: 12px;
            }

            .celebration-overlay .celebration-content {
                padding: 1.5rem 1rem;
            }

            .celebration-overlay h2 {
                font-size: 1.3rem;
            }

            .celebration-overlay .gp-reward {
                font-size: 2rem;
            }

            .celebration-overlay .btn-group button {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .reader-header {
                padding: 0.25rem 0.4rem;
                min-height: 40px;
            }
            
            .reader-header .logo img {
                height: 18px;
            }
            
            .reader-header .logo span {
                font-size: 0.6rem;
            }
            
            .reader-header .book-title {
                max-width: 70px;
                font-size: 0.5rem;
            }
            
            .reader-header .controls button {
                font-size: 0.6rem;
                padding: 2px 4px;
            }

            .reader-header .controls .view-mode-btn {
                font-size: 0.5rem;
                padding: 1px 4px;
            }
            
            .reader-footer {
                padding: 0.2rem 0.4rem;
                font-size: 0.5rem;
                min-height: 30px;
            }
            
            .reader-footer .actions button {
                font-size: 0.45rem;
                padding: 0.05rem 0.3rem;
            }
            
            .reader-container .page-wrapper {
                padding: 5px 6px 15px;
            }

            .reader-container.horizontal-scroll .page-wrapper {
                padding: 5px 6px 15px;
                gap: 8px;
            }

            .celebration-overlay .celebration-content {
                padding: 1rem 0.8rem;
            }

            .celebration-overlay h2 {
                font-size: 1.1rem;
            }

            .celebration-overlay .gp-reward {
                font-size: 1.5rem;
            }

            .celebration-overlay .message {
                font-size: 0.8rem;
            }

            .celebration-overlay .btn-group button {
                padding: 0.3rem 0.8rem;
                font-size: 0.65rem;
            }
        }

        @media (min-width: 1024px) {
            /* On larger screens, show 2 pages side by side in horizontal mode */
            .reader-container.horizontal-scroll .page-wrapper .page-item {
                max-width: 50%;
            }
            
            .reader-container.horizontal-scroll .page-wrapper .page-item canvas {
                max-width: 100%;
                height: auto;
            }
        }

        @supports (padding: max(0px)) {
            .reader-header {
                padding-top: max(0.3rem, env(safe-area-inset-top));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
            .reader-footer {
                padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <button class="view-mode-btn active" id="verticalBtn" onclick="setViewMode('vertical')" title="Vertical Scroll">
                <i class="fas fa-arrows-alt-v"></i>
            </button>
            <button class="view-mode-btn" id="horizontalBtn" onclick="setViewMode('horizontal')" title="Horizontal Scroll">
                <i class="fas fa-arrows-alt-h"></i>
            </button>
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Reader Container -->
    <div class="reader-container vertical-scroll" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
            <p class="loading-sub" id="loadingSub">This may take a moment</p>
        </div>
        <div class="page-wrapper" id="pageWrapper">
            <!-- Pages will be rendered here -->
        </div>
        <!-- Scroll hint for horizontal mode -->
        <div class="scroll-hint" id="scrollHint">
            <i class="fas fa-arrows-alt-h"></i> Scroll left/right to read
        </div>
    </div>

    <!-- Celebration Overlay -->
    <div class="celebration-overlay" id="celebrationOverlay">
        <div class="confetti-container" id="confettiContainer"></div>
        <div class="celebration-content">
            <div class="celebration-icon">🎉</div>
            <h2>Congratulations!</h2>
            <p class="message" id="celebrationMessage">You've completed reading this book!</p>
            <div class="gp-reward">
                +25 <span>GP</span>
            </div>
            <p class="message" style="font-size:0.8rem;">
                Share your thoughts with the community!
            </p>
            <div class="btn-group">
                <button class="btn-success" onclick="goToHub()">
                    <i class="fas fa-comment"></i> Go to Hub
                </button>
                <button class="btn-primary" onclick="shareCompletion()">
                    <i class="fas fa-share-alt"></i> Share
                </button>
                <button class="btn-secondary" onclick="closeCelebration()">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="success" id="markCompleteBtn" onclick="markComplete()" style="display:none;">
                <i class="fas fa-check-circle"></i> Mark Complete
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - Professional with All Features
        // ============================================

        // ============================================
        // AUTH CHECK
        // ============================================
        // Check if user is logged in - redirect to signin if not
        (function checkAuth() {
            const user = localStorage.getItem('gliimu_user');
            const session = sessionStorage.getItem('gliimu_session');
            
            if (!user && !session) {
                // Redirect to signin page
                window.location.href = '/signin.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
                return;
            }
            
            console.log('✅ User authenticated');
        })();

        // ============================================
        // DETECT DEVICE
        // ============================================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isMobile = isIOS || isAndroid || /Mobi/.test(navigator.userAgent);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        const isLargeScreen = window.innerWidth >= 1024;

        console.log('📱 Device:', isIOS ? 'iOS' : isAndroid ? 'Android' : 'Desktop');
        console.log('📐 Screen:', window.innerWidth + 'x' + window.innerHeight);

        // ============================================
        // STATE
        // ============================================
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let autoSaveTimer = null;
        let currentItemId = null;
        let currentItemTitle = '';
        let isRendering = false;
        let pageCache = {};
        let usingGoogleDocs = false;
        let viewMode = 'vertical'; // 'vertical' or 'horizontal'
        let isCompleted = false;
        let pagesPerView = 1;

        // ============================================
        // DOM REFS
        // ============================================
        const pageWrapper = document.getElementById('pageWrapper');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingSub = document.getElementById('loadingSub');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const progressContainer = document.getElementById('progressContainer');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const readerContainer = document.getElementById('readerContainer');
        const markCompleteBtn = document.getElementById('markCompleteBtn');
        const celebrationOverlay = document.getElementById('celebrationOverlay');
        const celebrationMessage = document.getElementById('celebrationMessage');
        const confettiContainer = document.getElementById('confettiContainer');
        const scrollHint = document.getElementById('scrollHint');
        const verticalBtn = document.getElementById('verticalBtn');
        const horizontalBtn = document.getElementById('horizontalBtn');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const fileUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';
        const isBundle = urlParams.get('type') === 'bundle';

        bookTitle.textContent = title;
        currentItemId = itemId;
        currentItemTitle = title;

        // ============================================
        // VIEW MODE
        // ============================================
        function setViewMode(mode) {
            viewMode = mode;
            
            // Update buttons
            verticalBtn.classList.toggle('active', mode === 'vertical');
            horizontalBtn.classList.toggle('active', mode === 'horizontal');
            
            // Update container
            readerContainer.classList.remove('vertical-scroll', 'horizontal-scroll');
            readerContainer.classList.add(mode + '-scroll');
            
            // Show/hide scroll hint
            scrollHint.style.display = mode === 'horizontal' ? 'block' : 'none';
            
            // Store preference
            localStorage.setItem('reader_view_mode', mode);
            
            // Re-render current page with new layout
            if (pdfDoc && currentPage && !usingGoogleDocs) {
                pageCache = {};
                renderPages(currentPage);
            }
            
            showToast('📖 ' + mode.charAt(0).toUpperCase() + mode.slice(1) + ' mode', 'info');
        }

        // ============================================
        // CALCULATE PAGES PER VIEW
        // ============================================
        function calculatePagesPerView() {
            if (viewMode === 'vertical') {
                pagesPerView = 1;
                return;
            }
            
            // Horizontal mode - show multiple pages based on screen width
            const width = window.innerWidth;
            if (width >= 1400) {
                pagesPerView = 3;
            } else if (width >= 1024) {
                pagesPerView = 2;
            } else if (width >= 768) {
                pagesPerView = 1;
            } else {
                pagesPerView = 1;
            }
            
            // Don't show more pages than total
            if (pagesPerView > totalPages) {
                pagesPerView = totalPages;
            }
            
            console.log('📐 Pages per view:', pagesPerView);
        }

        // ============================================
        // SHOW/HIDE LOADING
        // ============================================
        function showLoading(message, sub) {
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            loadingText.textContent = message || 'Loading...';
            loadingSub.textContent = sub || 'This may take a moment';
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        function showError(message, sub) {
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'none';
            loadingText.textContent = message || 'Failed to load the book.';
            loadingSub.textContent = sub || 'Please try again or use the fallback viewer.';
        }

        // ============================================
        // GOOGLE DOCS FALLBACK
        // ============================================
        function loadGoogleDocs() {
            usingGoogleDocs = true;
            
            pageWrapper.innerHTML = '';
            pageWrapper.style.display = 'none';
            
            const iframe = document.createElement('iframe');
            iframe.className = 'google-docs-viewer';
            const encodedUrl = encodeURIComponent(fileUrl);
            iframe.src = `https://docs.google.com/viewer?url=${encodedUrl}&embedded=true`;
            iframe.title = 'Google Docs PDF Viewer';
            iframe.loading = 'eager';
            
            readerContainer.appendChild(iframe);
            
            pageInfo.textContent = '📄 Google Docs Viewer';
            progressFill.style.width = '0%';
            hideLoading();
            
            // Hide mark complete for Google Docs
            markCompleteBtn.style.display = 'none';
            
            showToast('📄 Using Google Docs viewer', 'info');
        }

        // ============================================
        // LOAD PDF.JS
        // ============================================
        function loadPDFJS() {
            return new Promise(function(resolve, reject) {
                if (typeof pdfjsLib !== 'undefined' && pdfjsLib.version) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
                script.crossOrigin = 'anonymous';
                
                script.onload = function() {
                    if (typeof pdfjsLib !== 'undefined') {
                        try {
                            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                            pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                        } catch (e) {}
                        resolve();
                    } else {
                        reject(new Error('PDF.js failed to initialize'));
                    }
                };
                
                script.onerror = function() {
                    const fallbackScript = document.createElement('script');
                    fallbackScript.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js';
                    fallbackScript.crossOrigin = 'anonymous';
                    fallbackScript.onload = function() {
                        if (typeof pdfjsLib !== 'undefined') {
                            try {
                                pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                                pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                            } catch (e) {}
                            resolve();
                        } else {
                            reject(new Error('PDF.js failed to load from fallback'));
                        }
                    };
                    fallbackScript.onerror = function() {
                        reject(new Error('PDF.js library could not be loaded'));
                    };
                    document.head.appendChild(fallbackScript);
                };
                
                document.head.appendChild(script);
            });
        }

        // ============================================
        // RENDER PAGES (Multiple pages in view)
        // ============================================
        async function renderPages(startPage) {
            if (!pdfDoc || isRendering || usingGoogleDocs) return;
            
            isRendering = true;
            
            try {
                calculatePagesPerView();
                
                // Clear wrapper
                pageWrapper.innerHTML = '';
                
                const endPage = Math.min(startPage + pagesPerView - 1, totalPages);
                const pagesToRender = [];
                
                for (let p = startPage; p <= endPage; p++) {
                    pagesToRender.push(p);
                }
                
                // Render each page
                for (const pageNum of pagesToRender) {
                    const pageItem = document.createElement('div');
                    pageItem.className = 'page-item';
                    
                    // Check cache first
                    let canvas;
                    let cached = false;
                    
                    if (pageCache[pageNum]) {
                        canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = pageCache[pageNum].width;
                        canvas.height = pageCache[pageNum].height;
                        canvas.style.width = pageCache[pageNum].width + 'px';
                        canvas.style.height = pageCache[pageNum].height + 'px';
                        ctx.putImageData(pageCache[pageNum].imageData, 0, 0);
                        cached = true;
                    } else {
                        const page = await pdfDoc.getPage(pageNum);
                        
                        // Calculate scale - fit width
                        const containerWidth = readerContainer.clientWidth - 40;
                        const viewport = page.getViewport({ scale: 1 });
                        const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                        const scaledViewport = page.getViewport({ scale: scale });
                        
                        canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.width = scaledViewport.width;
                        canvas.height = scaledViewport.height;
                        canvas.style.width = scaledViewport.width + 'px';
                        canvas.style.height = scaledViewport.height + 'px';
                        
                        const renderContext = {
                            canvasContext: context,
                            viewport: scaledViewport,
                        };
                        
                        await page.render(renderContext).promise;
                        
                        // Cache
                        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                        pageCache[pageNum] = {
                            width: canvas.width,
                            height: canvas.height,
                            imageData: imageData
                        };
                    }
                    
                    pageItem.appendChild(canvas);
                    
                    // Page number
                    const pageNumLabel = document.createElement('span');
                    pageNumLabel.className = 'page-number';
                    pageNumLabel.textContent = 'Page ' + pageNum + ' of ' + totalPages;
                    pageItem.appendChild(pageNumLabel);
                    
                    pageWrapper.appendChild(pageItem);
                }
                
                currentPage = startPage;
                updateProgress();
                saveProgress();
                
                // Check if completed
                checkCompletion();
                
                // Scroll to top
                if (viewMode === 'vertical') {
                    readerContainer.scrollTop = 0;
                } else {
                    readerContainer.scrollLeft = 0;
                }
                
            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering pages', 'error');
            } finally {
                isRendering = false;
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function nextPage() {
            if (usingGoogleDocs) {
                showToast('Page navigation not available in Google Docs view', 'info');
                return;
            }
            
            const nextStart = currentPage + pagesPerView;
            if (nextStart <= totalPages) {
                renderPages(nextStart);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (usingGoogleDocs) {
                showToast('Page navigation not available in Google Docs view', 'info');
                return;
            }
            
            const prevStart = Math.max(1, currentPage - pagesPerView);
            if (prevStart < currentPage) {
                renderPages(prevStart);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        // ============================================
        // COMPLETION CHECK
        // ============================================
        function checkCompletion() {
            if (usingGoogleDocs) return;
            
            const lastPageStart = Math.floor((totalPages - 1) / pagesPerView) * pagesPerView + 1;
            const isLastPage = currentPage >= lastPageStart;
            
            // Also check if we're showing the last actual pages
            const endPage = Math.min(currentPage + pagesPerView - 1, totalPages);
            const isAtEnd = endPage === totalPages;
            
            if (isAtEnd && !isCompleted) {
                markCompleteBtn.style.display = 'inline-flex';
                // Auto-mark complete after a moment
                setTimeout(function() {
                    if (!isCompleted) {
                        // Don't auto-mark, let user click
                        showToast('📚 You\'ve reached the end! Click "Mark Complete" to earn GP.', 'success');
                    }
                }, 2000);
            } else {
                markCompleteBtn.style.display = 'none';
            }
        }

        // ============================================
        // MARK COMPLETE
        // ============================================
        function markComplete() {
            if (isCompleted) return;
            
            isCompleted = true;
            markCompleteBtn.style.display = 'none';
            
            // Award GP
            const gpReward = isBundle ? 50 : 25;
            awardGP(gpReward);
            
            // Show celebration
            showCelebration(gpReward);
            
            // Save completion status
            saveCompletionStatus();
        }

        function awardGP(amount) {
            // This would call your Supabase function to award GP
            // For now, we'll show it in the celebration
            console.log('🏆 Awarding ' + amount + ' GP');
            
            // Update local storage for demo
            const currentGP = parseInt(localStorage.getItem('gliimu_gp') || '0');
            localStorage.setItem('gliimu_gp', String(currentGP + amount));
        }

        function saveCompletionStatus() {
            try {
                const completed = JSON.parse(localStorage.getItem('reader_completed') || '{}');
                completed[currentItemId || currentItemTitle] = {
                    completed: true,
                    date: new Date().toISOString(),
                    title: currentItemTitle
                };
                localStorage.setItem('reader_completed', JSON.stringify(completed));
            } catch (e) {}
        }

        // ============================================
        // CELEBRATION
        // ============================================
        function showCelebration(gpAmount) {
            celebrationMessage.textContent = 
                isBundle ? 
                'You\'ve completed this bundle! Great job mastering all the content!' :
                'You\'ve completed reading this book! Keep up the great work!';
            
            // Generate confetti
            generateConfetti();
            
            celebrationOverlay.classList.add('active');
            
            // Show GP reward
            const gpSpan = celebrationOverlay.querySelector('.gp-reward');
            gpSpan.innerHTML = '+' + gpAmount + ' <span>GP</span>';
        }

        function generateConfetti() {
            confettiContainer.innerHTML = '';
            const colors = ['#fbb040', '#2c2f78', '#10b981', '#ef4444', '#3b82f6', '#8b5cf6', '#ec4899'];
            const shapes = ['■', '●', '▲', '★', '♦', '♥'];
            
            for (let i = 0; i < 80; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                piece.style.color = colors[Math.floor(Math.random() * colors.length)];
                piece.style.fontSize = (Math.random() * 20 + 10) + 'px';
                piece.style.left = (Math.random() * 100) + '%';
                piece.style.top = '-20px';
                piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
                piece.style.animationDelay = (Math.random() * 1.5) + 's';
                piece.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
                confettiContainer.appendChild(piece);
            }
        }

        function closeCelebration() {
            celebrationOverlay.classList.remove('active');
            confettiContainer.innerHTML = '';
        }

        function goToHub() {
            closeCelebration();
            window.location.href = '/hub.html';
        }

        function shareCompletion() {
            const text = isBundle ?
                '🎉 I just completed the bundle "' + currentItemTitle + '" on Gliimu! You should check it out too! 📚✨' :
                '🎉 I just finished reading "' + currentItemTitle + '" on Gliimu! What a great read! 📖✨';
            
            if (navigator.share) {
                navigator.share({
                    title: 'Gliimu - ' + currentItemTitle,
                    text: text,
                    url: window.location.origin + '/hub.html'
                }).catch(function() {});
            } else {
                // Copy to clipboard
                navigator.clipboard.writeText(text + ' ' + window.location.origin + '/hub.html').then(function() {
                    showToast('📋 Copied to clipboard! Share with your friends.', 'success');
                }).catch(function() {
                    // Fallback
                    const input = document.createElement('input');
                    input.value = text + ' ' + window.location.origin + '/hub.html';
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    showToast('📋 Copied to clipboard!', 'success');
                });
            }
            
            closeCelebration();
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function updateProgress() {
            if (usingGoogleDocs) return;
            
            const endPage = Math.min(currentPage + pagesPerView - 1, totalPages);
            const progress = (endPage / totalPages) * 100;
            progressFill.style.width = Math.min(progress, 100) + '%';
            
            const icon = progress >= 90 ? '🎯' : progress >= 50 ? '📖' : '📚';
            pageInfo.innerHTML = icon + ' Page ' + endPage + ' of ' + totalPages;
        }

        // ============================================
        // SAVE/LOAD PROGRESS
        // ============================================
        function saveProgress() {
            try {
                const progressData = {
                    itemId: currentItemId,
                    title: currentItemTitle,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    pagesPerView: pagesPerView,
                    progress: Math.min(((currentPage + pagesPerView - 1) / totalPages) * 100, 100),
                    lastRead: new Date().toISOString(),
                    usingGoogleDocs: usingGoogleDocs,
                    isCompleted: isCompleted,
                    viewMode: viewMode
                };

                localStorage.setItem('reader_progress_' + (currentItemId || currentItemTitle), JSON.stringify(progressData));

                const allProgress = JSON.parse(localStorage.getItem('reader_progress_all') || '{}');
                allProgress[currentItemId || currentItemTitle] = progressData;
                localStorage.setItem('reader_progress_all', JSON.stringify(allProgress));

            } catch (e) {
                console.warn('Could not save progress:', e);
            }
        }

        function loadSavedProgress() {
            try {
                const saved = localStorage.getItem('reader_progress_' + (currentItemId || currentItemTitle));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        isCompleted = data.isCompleted || false;
                        if (data.viewMode) {
                            viewMode = data.viewMode;
                        }
                        return true;
                    }
                }

                const allProgress = JSON.parse(localStorage.getItem('reader_progress_all') || '{}');
                const globalData = allProgress[currentItemId || currentItemTitle];
                if (globalData && globalData.currentPage <= totalPages) {
                    currentPage = globalData.currentPage;
                    isCompleted = globalData.isCompleted || false;
                    if (globalData.viewMode) {
                        viewMode = globalData.viewMode;
                    }
                    return true;
                }

            } catch (e) {
                console.warn('Could not load saved progress:', e);
            }
            return false;
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            
            // Re-render for dark mode
            if (pdfDoc && currentPage && !usingGoogleDocs) {
                pageCache = {};
                renderPages(currentPage);
            }

            showToast(isDarkMode ? '🌙 Dark mode activated' : '☀️ Light mode activated', 'success');
        }

        // ============================================
        // CLOSE READER
        // ============================================
        function closeReader() {
            saveProgress();
            
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }

            try {
                window.close();
            } catch (e) {
                window.location.href = '/hub.html';
            }
        }

        // ============================================
        // REPORT ISSUE
        // ============================================
        function reportIssue() {
            if (confirm('Report an issue with this book? Our team will investigate.')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function setupEventListeners() {
            // Progress bar click
            progressContainer.addEventListener('click', function(e) {
                if (usingGoogleDocs) {
                    showToast('Page navigation not available in Google Docs view', 'info');
                    return;
                }
                const rect = progressContainer.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                const targetPage = Math.max(1, Math.min(totalPages - pagesPerView + 1, Math.round(pos * totalPages / pagesPerView) * pagesPerView + 1));
                const startPage = Math.min(targetPage, totalPages - pagesPerView + 1);
                renderPages(Math.max(1, startPage));
            });

            // Touch swipe
            let touchStartX = 0;
            let touchStartY = 0;
            
            readerContainer.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            readerContainer.addEventListener('touchend', function(e) {
                if (!touchStartX || usingGoogleDocs) return;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const diffX = touchStartX - touchEndX;
                const diffY = touchStartY - touchEndY;
                
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 40) {
                    if (diffX > 0) {
                        nextPage();
                    } else {
                        prevPage();
                    }
                }
                
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: true });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                switch(e.key) {
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case ' ':
                        e.preventDefault();
                        nextPage();
                        break;
                    case 'ArrowLeft':
                    case 'ArrowUp':
                        e.preventDefault();
                        prevPage();
                        break;
                    case 'Home':
                        e.preventDefault();
                        if (!usingGoogleDocs) renderPages(1);
                        break;
                    case 'End':
                        e.preventDefault();
                        if (!usingGoogleDocs) {
                            const lastStart = Math.floor((totalPages - 1) / pagesPerView) * pagesPerView + 1;
                            renderPages(lastStart);
                        }
                        break;
                }
            });

            // Resize handler
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    if (pdfDoc && currentPage && !usingGoogleDocs) {
                        // Recalculate pages per view and re-render
                        pageCache = {};
                        renderPages(currentPage);
                    }
                }, 500);
            });

            // Load saved view mode
            const savedMode = localStorage.getItem('reader_view_mode');
            if (savedMode) {
                setViewMode(savedMode);
            }
        }

        // ============================================
        // MAIN INIT
        // ============================================
        async function initPDF() {
            if (!fileUrl) {
                showError('No book found to read');
                pageInfo.textContent = '❌ No book';
                return;
            }

            try {
                showLoading('Loading PDF library...');

                await loadPDFJS();

                showLoading('Opening book...', 'Loading the PDF file');

                const response = await fetch(fileUrl);
                const pdfData = await response.arrayBuffer();

                const loadingTask = pdfjsLib.getDocument({
                    data: pdfData,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true,
                    useWorkerFetch: false,
                    isEvalSupported: false
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = 'Page 1 of ' + totalPages;

                console.log('📚 PDF loaded: ' + totalPages + ' pages');

                // Load saved progress
                const hasProgress = loadSavedProgress();
                if (!hasProgress) {
                    currentPage = 1;
                }

                // If already completed, show mark complete button
                if (isCompleted) {
                    markCompleteBtn.style.display = 'none';
                }

                // Render first page(s)
                await renderPages(currentPage);
                hideLoading();

                // Start auto-save
                if (autoSaveTimer) clearInterval(autoSaveTimer);
                autoSaveTimer = setInterval(saveProgress, 5000);

                setupEventListeners();

                showToast('✅ Book loaded successfully!', 'success');

            } catch (error) {
                console.error('PDF loading error:', error);
                
                if (isMobile || isSafari) {
                    showLoading('PDF.js failed, using Google Docs...', 'Opening in Google Docs viewer');
                    setTimeout(function() {
                        loadGoogleDocs();
                    }, 1000);
                } else {
                    showError('Could not load the book. Please try again.');
                }
            }
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // HANDLE WINDOW CLOSE
        // ============================================
        window.addEventListener('beforeunload', function() {
            saveProgress();
        });

        // ============================================
        // START
        // ============================================
        setTimeout(initPDF, 200);

        // ============================================
        // EXPOSE GLOBALLY
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.setViewMode = setViewMode;
        window.markComplete = markComplete;
        window.closeCelebration = closeCelebration;
        window.goToHub = goToHub;
        window.shareCompletion = shareCompletion;
        window.renderPages = renderPages;

        console.log('📚 Gliimu Professional Reader initialized');
        console.log('📐 Pages per view:', pagesPerView);
        console.log('📖 View mode:', viewMode);
    </script>
</body>
</html>
