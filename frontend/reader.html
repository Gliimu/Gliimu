<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --progress-track: #e2e8f0;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --progress-track: #2d2d44;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.3rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            gap: 0.3rem;
            min-height: 44px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 22px;
            width: auto;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.6rem;
            color: var(--text-secondary);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            flex-shrink: 0;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 6px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-header .controls button:active {
            background: var(--border-color);
            transform: scale(0.92);
        }

        .reader-header .controls .close-btn {
            font-size: 0.9rem;
            padding: 3px 5px;
        }

        .reader-header .controls .close-btn:active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 3px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
        }

        /* ============================================
           READER CONTAINER
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: hidden;
            background: var(--reader-bg);
            position: relative;
            height: 100%;
            min-height: 0;
        }

        /* ============================================
           NATIVE PDF VIEWER (iOS/Android)
           ============================================ */
        .reader-container iframe,
        .reader-container object,
        .reader-container embed {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--reader-bg);
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ============================================
           PDF.JS VIEWER (Desktop)
           ============================================ */
        .reader-container .pdfjs-viewer {
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .reader-container .pdfjs-viewer canvas {
            box-shadow: 0 2px 12px var(--shadow-color);
            border-radius: 4px;
            background: var(--reader-bg);
            max-width: 100%;
            height: auto;
        }

        body.dark-mode .reader-container .pdfjs-viewer canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s ease;
            padding: 2rem;
            text-align: center;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            max-width: 280px;
        }

        .loading-overlay .retry-btn {
            margin-top: 0.75rem;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            background: var(--brand-gold);
            color: var(--brand-purple);
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            touch-action: manipulation;
        }

        .loading-overlay .retry-btn:active {
            transform: scale(0.95);
        }

        .loading-overlay .native-hint {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.4rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.7rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning { border-left-color: #f59e0b; }
        .reader-toast.success { border-left-color: #10b981; }
        .reader-toast.error { border-left-color: #ef4444; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           FOOTER
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.25rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.6rem;
            color: var(--text-secondary);
            gap: 0.3rem;
            min-height: 34px;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.7rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.25rem;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.1rem 0.4rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.55rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .reader-header .logo span { font-size: 0.6rem; }
            .reader-header .book-title { max-width: 60px; font-size: 0.5rem; }
            .reader-header .controls button { font-size: 0.65rem; padding: 2px 4px; }
        }

        @supports (padding: max(0px)) {
            .reader-header {
                padding-top: max(0.3rem, env(safe-area-inset-top));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
            .reader-footer {
                padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Reader Container -->
    <div class="reader-container" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
            <p id="loadingDetail" style="font-size:0.7rem;opacity:0.6;margin-top:0.2rem;"></p>
            <button class="retry-btn" id="retryBtn" style="display:none;" onclick="retryLoad()">
                <i class="fas fa-redo"></i> Retry
            </button>
        </div>
        <!-- Content will be inserted here -->
    </div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Loading...</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - Native iOS + Desktop PDF.js
        // ============================================

        // ============================================
        // DETECT DEVICE
        // ============================================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isMobile = isIOS || isAndroid || /Mobi/.test(navigator.userAgent);

        console.log('📱 Device:', isIOS ? 'iOS' : isAndroid ? 'Android' : 'Desktop');

        // ============================================
        // STATE
        // ============================================
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let currentItemId = null;
        let currentTitle = '';

        // ============================================
        // DOM REFS
        // ============================================
        const readerContainer = document.getElementById('readerContainer');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingDetail = document.getElementById('loadingDetail');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const retryBtn = document.getElementById('retryBtn');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const fileUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        bookTitle.textContent = title;
        currentItemId = itemId;
        currentTitle = title;

        // ============================================
        // SHOW/HIDE LOADING
        // ============================================
        function showLoading(message, detail) {
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            loadingText.textContent = message || 'Loading...';
            loadingDetail.textContent = detail || '';
            retryBtn.style.display = 'none';
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        function showError(message, detail) {
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'none';
            loadingText.textContent = message || 'Failed to load the book.';
            loadingDetail.textContent = detail || 'Please try again.';
            retryBtn.style.display = 'block';
        }

        function retryLoad() {
            showLoading('Retrying...');
            setTimeout(initReader, 500);
        }

        // ============================================
        // NATIVE iOS PDF VIEWER (MOST RELIABLE)
        // ============================================
        function loadNativeViewer() {
            showLoading('Opening book...', 'Using native PDF viewer');

            // Clear any existing content
            readerContainer.innerHTML = '';

            // Create a container for the native viewer
            const viewerDiv = document.createElement('div');
            viewerDiv.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;';

            // Use <object> tag for iOS native PDF rendering
            const object = document.createElement('object');
            object.type = 'application/pdf';
            object.data = fileUrl;
            object.style.cssText = 'width:100%;height:100%;border:none;display:block;';

            // Also add an iframe as fallback
            const iframe = document.createElement('iframe');
            iframe.src = fileUrl;
            iframe.style.cssText = 'width:100%;height:100%;border:none;display:none;';

            object.onerror = function() {
                console.log('Object failed, trying iframe...');
                object.style.display = 'none';
                iframe.style.display = 'block';
            };

            viewerDiv.appendChild(object);
            viewerDiv.appendChild(iframe);
            readerContainer.appendChild(viewerDiv);

            // Update UI
            pageInfo.textContent = '📄 Native Viewer';
            progressFill.style.width = '0%';
            hideLoading();

            // Show hint for users
            setTimeout(function() {
                showToast('📄 Swipe up/down to scroll', 'info');
            }, 1000);

            // Save progress
            saveProgress();
        }

        // ============================================
        // DESKTOP PDF.JS VIEWER
        // ============================================
        let pdfDoc = null;
        let pdfjsLoaded = false;
        let pageCache = {};
        let isRendering = false;

        function loadPDFJS() {
            return new Promise(function(resolve, reject) {
                if (typeof pdfjsLib !== 'undefined' && pdfjsLib.version) {
                    pdfjsLoaded = true;
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
                script.crossOrigin = 'anonymous';
                
                script.onload = function() {
                    if (typeof pdfjsLib !== 'undefined') {
                        try {
                            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                            pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                        } catch (e) {}
                        pdfjsLoaded = true;
                        resolve();
                    } else {
                        reject(new Error('PDF.js failed to initialize'));
                    }
                };
                
                script.onerror = function() {
                    reject(new Error('PDF.js library could not be loaded'));
                };
                
                document.head.appendChild(script);
            });
        }

        async function renderPDFPage(pageNum) {
            if (!pdfDoc || isRendering) return;
            isRendering = true;

            try {
                // Check cache
                if (pageCache[pageNum]) {
                    const container = document.querySelector('.pdfjs-viewer');
                    if (container) {
                        const canvas = container.querySelector('canvas');
                        if (canvas) {
                            const ctx = canvas.getContext('2d');
                            canvas.width = pageCache[pageNum].width;
                            canvas.height = pageCache[pageNum].height;
                            canvas.style.width = pageCache[pageNum].width + 'px';
                            canvas.style.height = pageCache[pageNum].height + 'px';
                            ctx.putImageData(pageCache[pageNum].imageData, 0, 0);
                            currentPage = pageNum;
                            updateProgress();
                            saveProgress();
                            isRendering = false;
                            return;
                        }
                    }
                }

                const page = await pdfDoc.getPage(pageNum);
                
                const container = document.querySelector('.pdfjs-viewer');
                if (!container) {
                    isRendering = false;
                    return;
                }

                const containerWidth = container.clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                const scaledViewport = page.getViewport({ scale: scale });

                let canvas = container.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    container.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                context.clearRect(0, 0, canvas.width, canvas.height);

                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                // Cache
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                pageCache[pageNum] = {
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData
                };

                currentPage = pageNum;
                updateProgress();
                saveProgress();

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

        function nextPage() {
            if (isIOS || isAndroid) {
                // On mobile, the native viewer handles this
                showToast('Use touch to scroll', 'info');
                return;
            }
            if (currentPage < totalPages) {
                renderPDFPage(currentPage + 1);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (isIOS || isAndroid) {
                showToast('Use touch to scroll', 'info');
                return;
            }
            if (currentPage > 1) {
                renderPDFPage(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        async function loadDesktopPDF() {
            try {
                showLoading('Loading PDF library...');

                await loadPDFJS();

                showLoading('Opening book...');

                // Load PDF
                const response = await fetch(fileUrl);
                const pdfData = await response.arrayBuffer();

                const loadingTask = pdfjsLib.getDocument({
                    data: pdfData,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true,
                    useWorkerFetch: false,
                    isEvalSupported: false
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;

                // Create viewer container
                readerContainer.innerHTML = '';
                const viewer = document.createElement('div');
                viewer.className = 'pdfjs-viewer';
                readerContainer.appendChild(viewer);

                // Load saved progress
                const saved = loadSavedProgress();
                if (saved) {
                    currentPage = saved;
                }

                pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages;
                await renderPDFPage(currentPage);
                hideLoading();

                // Auto-save
                setInterval(saveProgress, 5000);

                // Keyboard events
                document.addEventListener('keydown', function(e) {
                    if (e.target.tagName === 'INPUT') return;
                    switch(e.key) {
                        case 'ArrowRight':
                        case 'ArrowDown':
                        case ' ':
                            e.preventDefault();
                            nextPage();
                            break;
                        case 'ArrowLeft':
                        case 'ArrowUp':
                            e.preventDefault();
                            prevPage();
                            break;
                        case 'Home':
                            e.preventDefault();
                            renderPDFPage(1);
                            break;
                        case 'End':
                            e.preventDefault();
                            renderPDFPage(totalPages);
                            break;
                    }
                });

                showToast('✅ Book loaded!', 'success');

            } catch (error) {
                console.error('Desktop PDF error:', error);
                // Fallback to native viewer
                showLoading('PDF.js failed, trying native viewer...', 'Please wait');
                setTimeout(loadNativeViewer, 500);
            }
        }

        // ============================================
        // SAVE/LOAD PROGRESS
        // ============================================
        function saveProgress() {
            try {
                const data = {
                    itemId: currentItemId,
                    title: currentTitle,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    lastRead: new Date().toISOString()
                };
                localStorage.setItem('reader_progress_' + (currentItemId || currentTitle), JSON.stringify(data));
            } catch (e) {}
        }

        function loadSavedProgress() {
            try {
                const saved = localStorage.getItem('reader_progress_' + (currentItemId || currentTitle));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        return data.currentPage;
                    }
                }
            } catch (e) {}
            return null;
        }

        // ============================================
        // UPDATE UI
        // ============================================
        function updateProgress() {
            if (totalPages > 0) {
                const progress = (currentPage / totalPages) * 100;
                progressFill.style.width = progress + '%';
                pageInfo.textContent = 'Page ' + currentPage + ' of ' + totalPages;
            }
        }

        // ============================================
        // THEME
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            
            // Re-render for dark mode (desktop only)
            if (!isIOS && !isAndroid && pdfDoc && currentPage) {
                pageCache = {};
                renderPDFPage(currentPage);
            }
            
            showToast(isDarkMode ? '🌙 Dark mode' : '☀️ Light mode', 'success');
        }

        // ============================================
        // CLOSE
        // ============================================
        function closeReader() {
            saveProgress();
            try { window.close(); } catch(e) { window.location.href = '/hub.html'; }
        }

        function reportIssue() {
            if (confirm('Report an issue with this book?')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // MAIN INIT
        // ============================================
        function initReader() {
            if (!fileUrl) {
                showError('No book found');
                return;
            }

            // ----- iOS: Native Viewer (RELIABLE) -----
            if (isIOS) {
                console.log('📱 iOS detected - using native viewer');
                loadNativeViewer();
                return;
            }

            // ----- Android: Native Viewer -----
            if (isAndroid) {
                console.log('📱 Android detected - using native viewer');
                loadNativeViewer();
                return;
            }

            // ----- Desktop: PDF.js -----
            console.log('💻 Desktop detected - using PDF.js');
            loadDesktopPDF();
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // START
        // ============================================
        window.addEventListener('beforeunload', saveProgress);
        setTimeout(initReader, 100);

        // ============================================
        // EXPOSE
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.retryLoad = retryLoad;

        console.log('📚 Gliimu Reader - Native iOS + Desktop PDF.js');
    </script>
</body>
</html>
