<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --progress-track: #e2e8f0;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --progress-track: #2d2d44;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER - More compact
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: nowrap;
            gap: 0.3rem;
            box-shadow: 0 1px 4px var(--shadow-color);
            min-height: 48px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 24px;
            width: auto;
            display: block;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.75rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.65rem;
            color: var(--text-secondary);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.2rem;
            flex-shrink: 0;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .reader-header .controls button:active {
            background: var(--border-color);
            transform: scale(0.92);
        }

        .reader-header .controls .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.1rem;
            background: var(--bg-primary);
            border-radius: 6px;
            padding: 0 2px;
            border: 1px solid var(--border-color);
        }

        .reader-header .controls .zoom-controls button {
            padding: 2px 5px;
            font-size: 0.7rem;
            min-width: 22px;
        }

        .reader-header .controls .zoom-controls .zoom-level {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 28px;
            text-align: center;
        }

        .reader-header .controls .close-btn {
            font-size: 1rem;
            padding: 4px 6px;
        }

        .reader-header .controls .close-btn:active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 3px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            touch-action: none;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            border-radius: 0 2px 2px 0;
        }

        .progress-bar-container .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            animation: shimmer 2s infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ============================================
           PDF VIEWER CONTAINER - FULL HEIGHT
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: auto;
            background: var(--reader-bg);
            position: relative;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            -webkit-overflow-scrolling: touch;
            height: 100%;
            min-height: 0;
        }

        .reader-container .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: 100%;
            padding: 10px 10px 20px;
            transition: transform 0.3s ease;
        }

        .reader-container canvas {
            box-shadow: 0 2px 12px var(--shadow-color);
            border-radius: 4px;
            background: var(--reader-bg);
            transition: transform 0.3s ease, filter 0.3s ease;
            max-width: 100%;
            height: auto;
            image-rendering: auto;
            touch-action: none;
        }

        body.dark-mode .reader-container canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* ============================================
           iOS NATIVE PDF VIEWER
           ============================================ */
        .reader-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--reader-bg);
            min-height: 100%;
            display: block;
            flex: 1;
        }

        /* For iOS native viewer - object/embed approach */
        .reader-container object {
            width: 100%;
            height: 100%;
            min-height: 100%;
            display: block;
            flex: 1;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.5s ease;
            padding: 2rem;
            text-align: center;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            max-width: 280px;
        }

        .loading-overlay .error-icon {
            font-size: 2rem;
            color: var(--brand-gold);
            margin-bottom: 0.5rem;
        }

        .loading-overlay .retry-btn {
            margin-top: 0.75rem;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            background: var(--brand-gold);
            color: var(--brand-purple);
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            touch-action: manipulation;
        }

        .loading-overlay .retry-btn:active {
            transform: scale(0.95);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           ZOOM INDICATOR
           ============================================ */
        .zoom-indicator {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.3rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 100;
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .zoom-indicator.show {
            opacity: 1;
        }

        /* ============================================
           FOOTER - Compact
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.3rem 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.65rem;
            color: var(--text-secondary);
            flex-wrap: nowrap;
            gap: 0.3rem;
            min-height: 38px;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.75rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.25rem;
            flex-wrap: nowrap;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.15rem 0.5rem;
            border-radius: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.6rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.4rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.7rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning {
            border-left-color: #f59e0b;
        }

        .reader-toast.success {
            border-left-color: #10b981;
        }

        .reader-toast.error {
            border-left-color: #ef4444;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .reader-header {
                padding: 0.3rem 0.5rem;
                min-height: 42px;
            }
            
            .reader-header .logo img {
                height: 20px;
            }
            
            .reader-header .logo span {
                font-size: 0.65rem;
            }
            
            .reader-header .book-title {
                max-width: 70px;
                font-size: 0.55rem;
            }
            
            .reader-header .controls button {
                font-size: 0.7rem;
                padding: 3px 4px;
            }
            
            .reader-header .controls .zoom-controls button {
                font-size: 0.6rem;
                padding: 2px 3px;
                min-width: 18px;
            }
            
            .reader-header .controls .zoom-controls .zoom-level {
                font-size: 0.5rem;
                min-width: 24px;
            }
            
            .reader-footer {
                padding: 0.25rem 0.5rem;
                font-size: 0.55rem;
                min-height: 34px;
            }
            
            .reader-footer .actions button {
                font-size: 0.5rem;
                padding: 0.1rem 0.4rem;
            }
            
            .reader-container .page-wrapper {
                padding: 5px 5px 10px;
            }
            
            .zoom-indicator {
                bottom: 55px;
                font-size: 0.65rem;
                padding: 0.25rem 0.8rem;
            }
        }

        @media (max-width: 375px) {
            .reader-header .book-title {
                max-width: 50px;
                font-size: 0.5rem;
            }
            
            .reader-header .logo span {
                font-size: 0.55rem;
            }
            
            .reader-header .controls button {
                font-size: 0.6rem;
                padding: 2px 3px;
            }
        }

        /* iPhone Safe Area support */
        @supports (padding: max(0px)) {
            .reader-header {
                padding-top: max(0.3rem, env(safe-area-inset-top));
                padding-left: max(0.5rem, env(safe-area-inset-left));
                padding-right: max(0.5rem, env(safe-area-inset-right));
            }
            
            .reader-footer {
                padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
                padding-left: max(0.5rem, env(safe-area-inset-left));
                padding-right: max(0.5rem, env(safe-area-inset-right));
            }
            
            .reader-container .page-wrapper {
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <div class="zoom-controls">
                <button onclick="zoomOut()" title="Zoom Out">
                    <i class="fas fa-minus"></i>
                </button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button onclick="zoomIn()" title="Zoom In">
                    <i class="fas fa-plus"></i>
                </button>
                <button onclick="resetZoom()" title="Reset Zoom">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- PDF Viewer Container -->
    <div class="reader-container" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
            <button class="retry-btn" id="retryBtn" style="display:none;" onclick="retryLoad()">
                <i class="fas fa-redo"></i> Retry
            </button>
        </div>
        <div class="page-wrapper" id="pageWrapper">
            <!-- Canvas or native viewer will be rendered here -->
        </div>
    </div>

    <!-- Zoom Indicator -->
    <div class="zoom-indicator" id="zoomIndicator">100%</div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - Native iOS + Full Height
        // ============================================

        // ============================================
        // DETECT iOS
        // ============================================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        console.log('📱 Device:', isIOS ? 'iOS' : 'Not iOS');

        // ============================================
        // CONFIGURATION
        // ============================================
        const STORAGE_KEY = 'gliimu_reader_progress';
        const AUTO_SAVE_INTERVAL = 5000;
        const ZOOM_STEP = 0.15;
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 2.5;

        // ============================================
        // STATE
        // ============================================
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let autoSaveTimer = null;
        let currentItemId = null;
        let currentZoom = 1.0;
        let isRendering = false;
        let isLoading = false;
        let useNativeViewer = false;

        // ============================================
        // DOM REFS
        // ============================================
        const pageWrapper = document.getElementById('pageWrapper');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const retryBtn = document.getElementById('retryBtn');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const progressContainer = document.getElementById('progressContainer');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const zoomLevel = document.getElementById('zoomLevel');
        const zoomIndicator = document.getElementById('zoomIndicator');
        const readerContainer = document.getElementById('readerContainer');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        bookTitle.textContent = title;
        currentItemId = itemId;

        // ============================================
        // ZOOM FUNCTIONS
        // ============================================
        function updateZoomDisplay() {
            const percent = Math.round(currentZoom * 100);
            zoomLevel.textContent = percent + '%';
            
            zoomIndicator.textContent = percent + '%';
            zoomIndicator.classList.add('show');
            clearTimeout(zoomIndicator._timeout);
            zoomIndicator._timeout = setTimeout(function() {
                zoomIndicator.classList.remove('show');
            }, 1500);
        }

        function applyZoom() {
            const canvas = pageWrapper.querySelector('canvas');
            if (canvas && !useNativeViewer) {
                canvas.style.transform = 'scale(' + currentZoom + ')';
                canvas.style.transformOrigin = 'top center';
                updateZoomDisplay();
            }
        }

        function zoomIn() {
            if (useNativeViewer) {
                showToast('Zoom not available in native viewer', 'info');
                return;
            }
            if (currentZoom < MAX_ZOOM) {
                currentZoom = Math.min(currentZoom + ZOOM_STEP, MAX_ZOOM);
                applyZoom();
                showToast('Zoom: ' + Math.round(currentZoom * 100) + '%', 'info');
            }
        }

        function zoomOut() {
            if (useNativeViewer) {
                showToast('Zoom not available in native viewer', 'info');
                return;
            }
            if (currentZoom > MIN_ZOOM) {
                currentZoom = Math.max(currentZoom - ZOOM_STEP, MIN_ZOOM);
                applyZoom();
                showToast('Zoom: ' + Math.round(currentZoom * 100) + '%', 'info');
            }
        }

        function resetZoom() {
            if (useNativeViewer) {
                showToast('Zoom not available in native viewer', 'info');
                return;
            }
            currentZoom = 1.0;
            applyZoom();
            showToast('Zoom reset to 100%', 'success');
        }

        // ============================================
        // SHOW/HIDE LOADING
        // ============================================
        function showLoading(message) {
            isLoading = true;
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            loadingText.textContent = message || 'Loading...';
            retryBtn.style.display = 'none';
        }

        function hideLoading() {
            isLoading = false;
            loadingOverlay.classList.add('hidden');
        }

        function showError(message) {
            isLoading = false;
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'none';
            loadingText.textContent = message || 'Failed to load the book.';
            retryBtn.style.display = 'block';
        }

        function retryLoad() {
            showLoading('Retrying...');
            initPDF();
        }

        // ============================================
        // NATIVE iOS PDF VIEWER - BEST SOLUTION
        // ============================================
        function loadNativeiOSViewer() {
            useNativeViewer = true;
            
            // Clear any existing content
            pageWrapper.innerHTML = '';
            
            // Use <object> tag for native iOS PDF viewing
            // This uses Apple's built-in PDF renderer
            const object = document.createElement('object');
            object.type = 'application/pdf';
            object.data = pdfUrl;
            object.width = '100%';
            object.height = '100%';
            object.style.cssText = 'width:100%;height:100%;min-height:100%;display:block;flex:1;';
            
            // Also add an iframe as fallback for the object tag
            const iframe = document.createElement('iframe');
            iframe.src = pdfUrl;
            iframe.style.cssText = 'width:100%;height:100%;min-height:100%;display:block;flex:1;border:none;';
            iframe.loading = 'eager';
            
            // Try object first, fallback to iframe
            pageWrapper.appendChild(object);
            
            // Check if object loaded
            setTimeout(function() {
                // If object didn't work, try iframe
                if (!object.contentWindow && !object.contentDocument) {
                    object.style.display = 'none';
                    pageWrapper.appendChild(iframe);
                }
            }, 2000);
            
            // Update UI
            pageInfo.textContent = '📄 Native Viewer';
            progressFill.style.width = '0%';
            
            hideLoading();
            showToast('📄 Opening in native viewer', 'success');
            
            // Save progress
            saveProgress();
        }

        // ============================================
        // LOAD PDF.JS - Desktop Only
        // ============================================
        function loadPDFJS() {
            return new Promise(function(resolve, reject) {
                // Check if already loaded
                if (typeof pdfjsLib !== 'undefined' && pdfjsLib.version) {
                    console.log('PDF.js already loaded v' + pdfjsLib.version);
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
                script.crossOrigin = 'anonymous';
                
                script.onload = function() {
                    if (typeof pdfjsLib !== 'undefined') {
                        try {
                            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                            pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                        } catch (e) {}
                        resolve();
                    } else {
                        reject(new Error('PDF.js failed to initialize'));
                    }
                };
                
                script.onerror = function() {
                    // Try jsdelivr
                    const fallbackScript = document.createElement('script');
                    fallbackScript.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js';
                    fallbackScript.crossOrigin = 'anonymous';
                    fallbackScript.onload = function() {
                        if (typeof pdfjsLib !== 'undefined') {
                            try {
                                pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                                pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                            } catch (e) {}
                            resolve();
                        } else {
                            reject(new Error('PDF.js failed to load from fallback'));
                        }
                    };
                    fallbackScript.onerror = function() {
                        reject(new Error('PDF.js library could not be loaded'));
                    };
                    document.head.appendChild(fallbackScript);
                };
                
                document.head.appendChild(script);
            });
        }

        // ============================================
        // RENDER PAGE - Desktop Only
        // ============================================
        async function renderPageDesktop(pageNum) {
            if (!pdfDoc || isRendering || useNativeViewer) return;

            isRendering = true;

            try {
                const page = await pdfDoc.getPage(pageNum);
                
                const containerWidth = readerContainer.clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                
                const scaledViewport = page.getViewport({ scale: scale });

                let canvas = pageWrapper.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    pageWrapper.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                context.clearRect(0, 0, canvas.width, canvas.height);

                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                currentPage = pageNum;
                updateProgress();
                applyZoom();
                saveProgress();
                readerContainer.scrollTop = 0;

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function nextPage() {
            if (useNativeViewer) {
                showToast('Page navigation not available in native viewer', 'info');
                return;
            }
            if (currentPage < totalPages) {
                renderPageDesktop(currentPage + 1);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (useNativeViewer) {
                showToast('Page navigation not available in native viewer', 'info');
                return;
            }
            if (currentPage > 1) {
                renderPageDesktop(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function updateProgress() {
            if (useNativeViewer) return;
            const progress = (currentPage / totalPages) * 100;
            progressFill.style.width = progress + '%';
            
            const icon = progress >= 90 ? '🎯' : progress >= 50 ? '📖' : '📚';
            pageInfo.innerHTML = icon + ' Page ' + currentPage + ' of ' + totalPages;
        }

        // ============================================
        // SAVE PROGRESS
        // ============================================
        function saveProgress() {
            try {
                const progressData = {
                    itemId: currentItemId,
                    title: title,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    progress: useNativeViewer ? 0 : (currentPage / totalPages) * 100,
                    lastRead: new Date().toISOString(),
                    url: pdfUrl,
                    useNativeViewer: useNativeViewer
                };

                localStorage.setItem(STORAGE_KEY + '_' + (currentItemId || title), JSON.stringify(progressData));

                const allProgress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                allProgress[currentItemId || title] = progressData;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allProgress));

            } catch (e) {
                console.warn('Could not save progress:', e);
            }
        }

        // ============================================
        // LOAD SAVED PROGRESS
        // ============================================
        async function loadSavedProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY + '_' + (currentItemId || title));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        return;
                    }
                }

                const allProgress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                const globalData = allProgress[currentItemId || title];
                if (globalData && globalData.currentPage <= totalPages) {
                    currentPage = globalData.currentPage;
                    return;
                }

            } catch (e) {
                console.warn('Could not load saved progress:', e);
            }
        }

        // ============================================
        // AUTO-SAVE
        // ============================================
        function startAutoSave() {
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            autoSaveTimer = setInterval(function() {
                saveProgress();
            }, AUTO_SAVE_INTERVAL);
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');

            showToast(isDarkMode ? '🌙 Dark mode activated' : '☀️ Light mode activated', 'success');
        }

        // ============================================
        // CLOSE READER
        // ============================================
        function closeReader() {
            saveProgress();
            
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }

            try {
                window.close();
            } catch (e) {
                window.location.href = '/hub.html';
            }
        }

        // ============================================
        // REPORT ISSUE
        // ============================================
        function reportIssue() {
            if (confirm('Report an issue with this book?')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function setupEventListeners() {
            // Progress bar click
            progressContainer.addEventListener('click', function(e) {
                if (useNativeViewer) {
                    showToast('Page navigation not available', 'info');
                    return;
                }
                const rect = progressContainer.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                const targetPage = Math.max(1, Math.min(totalPages, Math.round(pos * totalPages)));
                renderPageDesktop(targetPage);
                showToast('📍 Jumped to page ' + targetPage, 'info');
            });

            // Keyboard
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case '+':
                        case '=':
                            e.preventDefault();
                            zoomIn();
                            return;
                        case '-':
                            e.preventDefault();
                            zoomOut();
                            return;
                        case '0':
                            e.preventDefault();
                            resetZoom();
                            return;
                    }
                    return;
                }

                switch(e.key) {
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case ' ':
                        e.preventDefault();
                        nextPage();
                        break;
                    case 'ArrowLeft':
                    case 'ArrowUp':
                        e.preventDefault();
                        prevPage();
                        break;
                    case 'Home':
                        e.preventDefault();
                        if (!useNativeViewer) renderPageDesktop(1);
                        break;
                    case 'End':
                        e.preventDefault();
                        if (!useNativeViewer) renderPageDesktop(totalPages);
                        break;
                }
            });

            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    if (pdfDoc && currentPage && !useNativeViewer) {
                        renderPageDesktop(currentPage);
                    }
                }, 500);
            });
        }

        // ============================================
        // MAIN INIT - iOS uses native viewer, Desktop uses PDF.js
        // ============================================
        async function initPDF() {
            if (!pdfUrl) {
                showError('No book found to read');
                pageInfo.textContent = '❌ No book';
                return;
            }

            // --- iOS: Use Native Viewer (NO Google Docs) ---
            if (isIOS) {
                showLoading('Loading book for iOS...');
                
                // Small delay to ensure UI updates
                await new Promise(r => setTimeout(r, 300));
                
                // Use native iOS PDF viewer
                loadNativeiOSViewer();
                return;
            }

            // --- Desktop: Use PDF.js ---
            try {
                showLoading('Loading PDF library...');
                await loadPDFJS();

                showLoading('Opening book...');

                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    withCredentials: false,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true,
                    useWorkerFetch: false,
                    isEvalSupported: false
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = 'Page 1 of ' + totalPages;

                console.log('📚 PDF loaded: ' + totalPages + ' pages');

                await loadSavedProgress();
                await renderPageDesktop(currentPage);
                hideLoading();
                startAutoSave();
                setupEventListeners();

            } catch (error) {
                console.error('PDF loading error:', error);
                showError('Could not load the book. Please try again.');
            }
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // HANDLE WINDOW CLOSE
        // ============================================
        window.addEventListener('beforeunload', function() {
            saveProgress();
        });

        // ============================================
        // INIT
        // ============================================
        initPDF();

        // ============================================
        // EXPOSE GLOBALLY
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.zoomIn = zoomIn;
        window.zoomOut = zoomOut;
        window.resetZoom = resetZoom;
        window.retryLoad = retryLoad;

        console.log('📚 Gliimu Reader initialized');
    </script>
</body>
