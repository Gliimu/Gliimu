<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================
           VARIABLES
           ============================================ */
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --reader-text: #1a1a2e;
            --progress-track: #e2e8f0;
            --watermark-color: rgba(44, 47, 120, 0.05);
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --reader-text: #e0e0e0;
            --progress-track: #2d2d44;
            --watermark-color: rgba(251, 176, 64, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: nowrap;
            gap: 0.5rem;
            box-shadow: 0 1px 4px var(--shadow-color);
            min-height: 56px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 28px;
            width: auto;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.75rem;
            color: var(--text-secondary);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-header .controls button:hover {
            background: var(--border-color);
            color: var(--brand-gold);
        }

        .reader-header .controls button:active {
            transform: scale(0.92);
        }

        .reader-header .controls .close-btn {
            font-size: 1.1rem;
            padding: 6px 10px;
        }

        .reader-header .controls .close-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 4px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
        }

        /* ============================================
           READER CONTAINER
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: auto;
            background: var(--reader-bg);
            position: relative;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0;
            -webkit-overflow-scrolling: touch;
            height: 100%;
            min-height: 0;
        }

        .reader-container .page-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            min-height: 100%;
            padding: 15px 20px 30px;
            transition: transform 0.3s ease;
        }

        .reader-container canvas {
            box-shadow: 0 2px 16px var(--shadow-color);
            border-radius: 6px;
            background: var(--reader-bg);
            transition: transform 0.3s ease, filter 0.3s ease;
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        body.dark-mode .reader-container canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* ============================================
           GOOGLE DOCS VIEWER (Fallback)
           ============================================ */
        .reader-container .google-docs-viewer {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--reader-bg);
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ============================================
           AUTH REQUIRED OVERLAY
           ============================================ */
        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            padding: 2rem;
            text-align: center;
        }

        .auth-overlay .icon {
            font-size: 4rem;
            color: var(--brand-gold);
            margin-bottom: 1rem;
        }

        .auth-overlay h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .auth-overlay p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .auth-overlay .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .auth-overlay .btn-group button {
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
        }

        .auth-overlay .btn-group button:active {
            transform: scale(0.95);
        }

        .auth-overlay .btn-group .btn-primary {
            background: var(--brand-gold);
            color: var(--brand-purple);
        }

        .auth-overlay .btn-group .btn-primary:hover {
            background: var(--brand-gold-dark);
        }

        .auth-overlay .btn-group .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .auth-overlay .btn-group .btn-secondary:hover {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s ease;
            padding: 2rem;
            text-align: center;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            max-width: 300px;
        }

        .loading-overlay .loading-sub {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 0.25rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.75rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning { border-left-color: #f59e0b; }
        .reader-toast.success { border-left-color: #10b981; }
        .reader-toast.error { border-left-color: #ef4444; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           FOOTER
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.4rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.7rem;
            color: var(--text-secondary);
            flex-wrap: nowrap;
            gap: 0.5rem;
            min-height: 40px;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.8rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.3rem;
            flex-wrap: nowrap;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.2rem 0.6rem;
            border-radius: 16px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.65rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-footer .actions button:hover {
            border-color: var(--brand-gold);
            color: var(--brand-gold);
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        .reader-footer .actions button.primary:hover {
            background: var(--brand-gold-dark);
            border-color: var(--brand-gold-dark);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            .reader-header {
                padding: 0.4rem 0.8rem;
                min-height: 48px;
            }
            
            .reader-header .logo img {
                height: 24px;
            }
            
            .reader-header .logo span {
                font-size: 0.75rem;
            }
            
            .reader-header .book-title {
                max-width: 120px;
                font-size: 0.65rem;
            }
            
            .reader-header .controls button {
                font-size: 0.8rem;
                padding: 4px 8px;
            }
            
            .reader-footer {
                padding: 0.3rem 0.8rem;
                font-size: 0.6rem;
                min-height: 36px;
            }
            
            .reader-footer .actions button {
                font-size: 0.55rem;
                padding: 0.15rem 0.5rem;
            }
            
            .reader-container .page-wrapper {
                padding: 10px 12px 20px;
            }

            .auth-overlay h2 {
                font-size: 1.1rem;
            }

            .auth-overlay p {
                font-size: 0.8rem;
            }

            .auth-overlay .icon {
                font-size: 3rem;
            }
        }

        @media (max-width: 480px) {
            .reader-header {
                padding: 0.3rem 0.6rem;
                min-height: 44px;
            }
            
            .reader-header .logo img {
                height: 20px;
            }
            
            .reader-header .logo span {
                font-size: 0.65rem;
            }
            
            .reader-header .book-title {
                max-width: 80px;
                font-size: 0.55rem;
            }
            
            .reader-header .controls button {
                font-size: 0.7rem;
                padding: 3px 6px;
            }
            
            .reader-footer {
                padding: 0.25rem 0.6rem;
                font-size: 0.55rem;
                min-height: 32px;
            }
            
            .reader-footer .actions button {
                font-size: 0.5rem;
                padding: 0.1rem 0.4rem;
            }
            
            .reader-container .page-wrapper {
                padding: 5px 8px 15px;
            }

            .auth-overlay .btn-group button {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
            }
        }

        @supports (padding: max(0px)) {
            .reader-header {
                padding-top: max(0.4rem, env(safe-area-inset-top));
                padding-left: max(0.8rem, env(safe-area-inset-left));
                padding-right: max(0.8rem, env(safe-area-inset-right));
            }
            .reader-footer {
                padding-bottom: max(0.3rem, env(safe-area-inset-bottom));
                padding-left: max(0.8rem, env(safe-area-inset-left));
                padding-right: max(0.8rem, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Reader Container -->
    <div class="reader-container" id="readerContainer">
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
            <p class="loading-sub" id="loadingSub">This may take a moment</p>
        </div>

        <!-- Auth Required Overlay -->
        <div class="auth-overlay" id="authOverlay" style="display:none;">
            <div class="icon">🔒</div>
            <h2 id="authTitle">Access Restricted</h2>
            <p id="authMessage">You need to be signed in and have purchased this content to view it.</p>
            <div class="btn-group">
                <button class="btn-primary" onclick="goToLogin()">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <button class="btn-secondary" onclick="goToHub()">
                    <i class="fas fa-home"></i> Browse Library
                </button>
            </div>
        </div>

        <!-- Page Wrapper for PDF Content -->
        <div class="page-wrapper" id="pageWrapper" style="display:none;">
            <!-- Canvas will be rendered here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - Professional PDF.js + Auth
        // ============================================

        // ============================================
        // SUPABASE CLIENT
        // ============================================
        const SUPABASE_URL = 'https://vsgvscemqtqgolrindcx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzZ3ZzY2VtcXRxZ29scmluZGN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3OTk1NDksImV4cCI6MjA5NjM3NTU0OX0.IUNvIleBOKGTIjTg-vx-v0wNLZEk9IVWGouvVIDlo40';

        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // ============================================
        // DETECT DEVICE
        // ============================================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isAndroid = /Android/.test(navigator.userAgent);
        const isMobile = isIOS || isAndroid || /Mobi/.test(navigator.userAgent);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        console.log('📱 Device:', isIOS ? 'iOS' : isAndroid ? 'Android' : 'Desktop');
        console.log('🌐 Browser:', isSafari ? 'Safari' : 'Other');

        // ============================================
        // STATE
        // ============================================
        let currentUser = null;
        let isAuthorized = false;
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let autoSaveTimer = null;
        let currentItemId = null;
        let currentZoom = 1.0;
        let isRendering = false;
        let pageCache = {};
        let usingGoogleDocs = false;
        let fileUrl = null;

        // ============================================
        // DOM REFS
        // ============================================
        const pageWrapper = document.getElementById('pageWrapper');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingSub = document.getElementById('loadingSub');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const authOverlay = document.getElementById('authOverlay');
        const authTitle = document.getElementById('authTitle');
        const authMessage = document.getElementById('authMessage');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const progressContainer = document.getElementById('progressContainer');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const readerContainer = document.getElementById('readerContainer');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        fileUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        bookTitle.textContent = title;
        currentItemId = itemId;

        console.log('📄 File URL:', fileUrl);
        console.log('📚 Item ID:', currentItemId);

        // ============================================
        // AUTHENTICATION & AUTHORIZATION
        // ============================================

        // Get current user from Supabase
        async function getCurrentUser() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                if (error) {
                    console.error('Auth error:', error);
                    return null;
                }
                return user;
            } catch (e) {
                console.error('Error getting user:', e);
                return null;
            }
        }

        // Check if user has purchased this item
        async function checkPurchase(userId, itemId) {
            if (!userId || !itemId) return false;

            try {
                // Check if user has purchased this specific item
                const { data, error } = await supabase
                    .from('user_purchases')
                    .select('id, purchase_type')
                    .eq('user_id', userId)
                    .eq('item_id', itemId)
                    .maybeSingle();

                if (error) {
                    console.error('Purchase check error:', error);
                    return false;
                }

                // Check if the item is free (no purchase needed)
                if (!data) {
                    // Check if the item is free in hub_contents
                    const { data: item, error: itemError } = await supabase
                        .from('hub_contents')
                        .select('price, physical_price, audio_price')
                        .eq('id', itemId)
                        .single();

                    if (itemError) {
                        console.error('Item fetch error:', itemError);
                        return false;
                    }

                    // If all prices are 0 or null, it's free
                    const isFree = (item.price === 0 || item.price === null) &&
                                   (item.physical_price === 0 || item.physical_price === null) &&
                                   (item.audio_price === 0 || item.audio_price === null);

                    return isFree;
                }

                return true;
            } catch (e) {
                console.error('Error checking purchase:', e);
                return false;
            }
        }

        // Main auth check
        async function checkAuthorization() {
            console.log('🔐 Checking authorization...');

            // Show loading state
            showLoading('Checking access...', 'Verifying your account');

            // 1. Check if user is signed in
            currentUser = await getCurrentUser();

            if (!currentUser) {
                console.log('❌ User not signed in');
                showAuthRequired(
                    'Sign In Required',
                    'Please sign in to access this content. You need to have purchased this book to read it.'
                );
                return false;
            }

            console.log('✅ User signed in:', currentUser.email);

            // 2. Check if user has purchased this item
            const hasPurchased = await checkPurchase(currentUser.id, currentItemId);

            if (!hasPurchased) {
                console.log('❌ User has not purchased this content');
                showAuthRequired(
                    'Purchase Required',
                    'You need to purchase this content to read it. Visit the library to buy your copy.'
                );
                return false;
            }

            console.log('✅ User has purchased this content');
            isAuthorized = true;
            return true;
        }

        // ============================================
        // AUTH OVERLAY
        // ============================================
        function showAuthRequired(title, message) {
            authOverlay.style.display = 'flex';
            authTitle.textContent = title;
            authMessage.textContent = message;
            loadingOverlay.classList.add('hidden');
            pageWrapper.style.display = 'none';
            
            // Update footer
            pageInfo.textContent = '🔒 Access Denied';
            progressFill.style.width = '0%';
        }

        function goToLogin() {
            window.location.href = '/signin.html?redirect=' + encodeURIComponent(window.location.href);
        }

        function goToHub() {
            window.location.href = '/hub.html';
        }

        // ============================================
        // SHOW/HIDE LOADING
        // ============================================
        function showLoading(message, sub) {
            loadingOverlay.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            loadingText.textContent = message || 'Loading...';
            loadingSub.textContent = sub || 'This may take a moment';
            authOverlay.style.display = 'none';
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
            pageWrapper.style.display = 'flex';
        }

        // ============================================
        // GOOGLE DOCS FALLBACK
        // ============================================
        function loadGoogleDocs() {
            usingGoogleDocs = true;
            
            pageWrapper.innerHTML = '';
            pageWrapper.style.display = 'none';
            
            const iframe = document.createElement('iframe');
            iframe.className = 'google-docs-viewer';
            const encodedUrl = encodeURIComponent(fileUrl);
            iframe.src = `https://docs.google.com/viewer?url=${encodedUrl}&embedded=true`;
            iframe.title = 'Google Docs PDF Viewer';
            iframe.loading = 'eager';
            
            readerContainer.appendChild(iframe);
            
            pageInfo.textContent = '📄 Google Docs Viewer';
            progressFill.style.width = '0%';
            hideLoading();
            
            showToast('📄 Using Google Docs viewer', 'info');
            saveProgress();
        }

        // ============================================
        // LOAD PDF.JS
        // ============================================
        function loadPDFJS() {
            return new Promise(function(resolve, reject) {
                if (typeof pdfjsLib !== 'undefined' && pdfjsLib.version) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
                script.crossOrigin = 'anonymous';
                
                script.onload = function() {
                    if (typeof pdfjsLib !== 'undefined') {
                        try {
                            pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                            pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                        } catch (e) {}
                        resolve();
                    } else {
                        reject(new Error('PDF.js failed to initialize'));
                    }
                };
                
                script.onerror = function() {
                    const fallbackScript = document.createElement('script');
                    fallbackScript.src = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js';
                    fallbackScript.crossOrigin = 'anonymous';
                    fallbackScript.onload = function() {
                        if (typeof pdfjsLib !== 'undefined') {
                            try {
                                pdfjsLib.GlobalWorkerOptions.workerSrc = null;
                                pdfjsLib.GlobalWorkerOptions.useWorkerFetch = false;
                            } catch (e) {}
                            resolve();
                        } else {
                            reject(new Error('PDF.js failed to load from fallback'));
                        }
                    };
                    fallbackScript.onerror = function() {
                        reject(new Error('PDF.js library could not be loaded'));
                    };
                    document.head.appendChild(fallbackScript);
                };
                
                document.head.appendChild(script);
            });
        }

        // ============================================
        // RENDER PAGE
        // ============================================
        async function renderPage(pageNum) {
            if (!pdfDoc || isRendering || usingGoogleDocs) return;

            isRendering = true;

            try {
                if (pageCache[pageNum]) {
                    const canvas = pageWrapper.querySelector('canvas');
                    if (canvas) {
                        const ctx = canvas.getContext('2d');
                        canvas.width = pageCache[pageNum].width;
                        canvas.height = pageCache[pageNum].height;
                        canvas.style.width = pageCache[pageNum].width + 'px';
                        canvas.style.height = pageCache[pageNum].height + 'px';
                        ctx.putImageData(pageCache[pageNum].imageData, 0, 0);
                        currentPage = pageNum;
                        updateProgress();
                        saveProgress();
                        isRendering = false;
                        return;
                    }
                }

                const page = await pdfDoc.getPage(pageNum);
                
                const containerWidth = readerContainer.clientWidth - 30;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                const scaledViewport = page.getViewport({ scale: scale });

                let canvas = pageWrapper.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    pageWrapper.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                context.clearRect(0, 0, canvas.width, canvas.height);

                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                pageCache[pageNum] = {
                    width: canvas.width,
                    height: canvas.height,
                    imageData: imageData
                };

                currentPage = pageNum;
                updateProgress();
                saveProgress();
                readerContainer.scrollTop = 0;

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function nextPage() {
            if (usingGoogleDocs) {
                showToast('Page navigation not available in Google Docs view', 'info');
                return;
            }
            if (currentPage < totalPages) {
                renderPage(currentPage + 1);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (usingGoogleDocs) {
                showToast('Page navigation not available in Google Docs view', 'info');
                return;
            }
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function updateProgress() {
            if (usingGoogleDocs) return;
            const progress = (currentPage / totalPages) * 100;
            progressFill.style.width = progress + '%';
            
            const icon = progress >= 90 ? '🎯' : progress >= 50 ? '📖' : '📚';
            pageInfo.innerHTML = icon + ' Page ' + currentPage + ' of ' + totalPages;
        }

        // ============================================
        // SAVE/LOAD PROGRESS
        // ============================================
        function saveProgress() {
            try {
                const progressData = {
                    itemId: currentItemId,
                    title: title,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    progress: (currentPage / totalPages) * 100,
                    lastRead: new Date().toISOString(),
                    usingGoogleDocs: usingGoogleDocs
                };

                localStorage.setItem('reader_progress_' + (currentItemId || title), JSON.stringify(progressData));
            } catch (e) {}
        }

        function loadSavedProgress() {
            try {
                const saved = localStorage.getItem('reader_progress_' + (currentItemId || title));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        return true;
                    }
                }
            } catch (e) {}
            return false;
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            
            if (pdfDoc && currentPage && !usingGoogleDocs) {
                pageCache = {};
                renderPage(currentPage);
            }

            showToast(isDarkMode ? '🌙 Dark mode activated' : '☀️ Light mode activated', 'success');
        }

        // ============================================
        // CLOSE READER
        // ============================================
        function closeReader() {
            saveProgress();
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            try { window.close(); } catch (e) { window.location.href = '/hub.html'; }
        }

        function reportIssue() {
            if (confirm('Report an issue with this book?')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // MAIN INIT - With Auth Check
        // ============================================
        async function initReader() {
            if (!fileUrl) {
                showAuthRequired('No Book Found', 'No content URL was provided. Please go back and try again.');
                return;
            }

            // 1. Check Authorization
            const authorized = await checkAuthorization();
            if (!authorized) return;

            // 2. Load PDF (Authorized)
            showLoading('Loading PDF library...');

            try {
                await loadPDFJS();

                showLoading('Opening book...', 'Loading the PDF file');

                const response = await fetch(fileUrl);
                const pdfData = await response.arrayBuffer();

                const loadingTask = pdfjsLib.getDocument({
                    data: pdfData,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true,
                    useWorkerFetch: false,
                    isEvalSupported: false
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = 'Page 1 of ' + totalPages;

                console.log('📚 PDF loaded: ' + totalPages + ' pages');

                const hasProgress = loadSavedProgress();
                if (!hasProgress) currentPage = 1;

                await renderPage(currentPage);
                hideLoading();

                if (autoSaveTimer) clearInterval(autoSaveTimer);
                autoSaveTimer = setInterval(saveProgress, 5000);

                showToast('✅ Book loaded successfully!', 'success');

            } catch (error) {
                console.error('PDF loading error:', error);
                
                if (isMobile || isSafari) {
                    showLoading('PDF.js failed, using Google Docs...', 'Opening in Google Docs viewer');
                    setTimeout(function() {
                        loadGoogleDocs();
                    }, 1000);
                } else {
                    showToast('Could not load the book. Please try again.', 'error');
                }
            }
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // LOAD SUPABASE SCRIPT
        // ============================================
        function loadSupabase() {
            return new Promise(function(resolve, reject) {
                if (typeof supabase !== 'undefined' && supabase) {
                    resolve();
                    return;
                }

                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js';
                script.onload = function() {
                    if (window.supabase) {
                        resolve();
                    } else {
                        reject(new Error('Supabase failed to load'));
                    }
                };
                script.onerror = function() {
                    reject(new Error('Supabase library could not be loaded'));
                };
                document.head.appendChild(script);
            });
        }

        // ============================================
        // START
        // ============================================
        window.addEventListener('beforeunload', saveProgress);

        async function start() {
            try {
                await loadSupabase();
                // Reassign supabase
                const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                window.supabase = supabaseClient;
                // Override the global supabase
                Object.assign(supabase, supabaseClient);
            } catch (e) {
                console.warn('Supabase load warning:', e);
            }
            
            // Start the reader
            setTimeout(initReader, 200);
        }

        start();

        // ============================================
        // EXPOSE GLOBALLY
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.goToLogin = goToLogin;
        window.goToHub = goToHub;

        console.log('📚 Gliimu Professional Reader with Auth');
    </script>
</body>
</html>
