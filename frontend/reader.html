<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --progress-track: #e2e8f0;
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --progress-track: #2d2d44;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER - Compact
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.3rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            gap: 0.3rem;
            min-height: 44px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 22px;
            width: auto;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.7rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.6rem;
            color: var(--text-secondary);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            flex-shrink: 0;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.75rem;
            padding: 3px 5px;
            border-radius: 6px;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-header .controls button:active {
            background: var(--border-color);
            transform: scale(0.92);
        }

        .reader-header .controls .close-btn {
            font-size: 0.9rem;
            padding: 3px 5px;
        }

        .reader-header .controls .close-btn:active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PDF IFRAME - Full Screen
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: hidden;
            background: var(--reader-bg);
            position: relative;
            height: 100%;
            min-height: 0;
        }

        .reader-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--reader-bg);
            display: block;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.5s ease;
            padding: 2rem;
            text-align: center;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.6rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            max-width: 280px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.4rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.7rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning { border-left-color: #f59e0b; }
        .reader-toast.success { border-left-color: #10b981; }
        .reader-toast.error { border-left-color: #ef4444; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           FOOTER - Compact
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.25rem 0.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.6rem;
            color: var(--text-secondary);
            gap: 0.3rem;
            min-height: 34px;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.7rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.25rem;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.1rem 0.4rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.55rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .reader-header .logo span { font-size: 0.6rem; }
            .reader-header .book-title { max-width: 60px; font-size: 0.5rem; }
            .reader-header .controls button { font-size: 0.65rem; padding: 2px 4px; }
        }

        @supports (padding: max(0px)) {
            .reader-header {
                padding-top: max(0.3rem, env(safe-area-inset-top));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
            .reader-footer {
                padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
                padding-left: max(0.6rem, env(safe-area-inset-left));
                padding-right: max(0.6rem, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Reader Container -->
    <div class="reader-container" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
        </div>
        <iframe id="pdfFrame" src=""></iframe>
    </div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">PDF Viewer</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - Simple PDF Viewer
        // ============================================

        // ============================================
        // STATE
        // ============================================
        let isDarkMode = false;
        let currentItemId = null;

        // ============================================
        // DOM REFS
        // ============================================
        const pdfFrame = document.getElementById('pdfFrame');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const pageInfo = document.getElementById('pageInfo');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const fileUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        bookTitle.textContent = title;
        currentItemId = itemId;

        // ============================================
        // LOAD PDF
        // ============================================
        function loadPDF() {
            if (!fileUrl) {
                loadingText.textContent = 'No book found to read';
                loadingSpinner.style.display = 'none';
                return;
            }

            // Add cache buster to prevent caching issues
            const urlWithCache = fileUrl + (fileUrl.includes('?') ? '&' : '?') + '_t=' + Date.now();
            
            // Load PDF in iframe
            pdfFrame.src = urlWithCache;
            
            // Hide loading after a delay or when iframe loads
            setTimeout(function() {
                loadingOverlay.classList.add('hidden');
            }, 1500);

            // Also hide when iframe loads
            pdfFrame.addEventListener('load', function() {
                loadingOverlay.classList.add('hidden');
            });

            // If iframe fails to load, still hide loading after timeout
            setTimeout(function() {
                loadingOverlay.classList.add('hidden');
            }, 3000);

            pageInfo.textContent = '📄 PDF Viewer';
        }

        // ============================================
        // THEME
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');
            showToast(isDarkMode ? '🌙 Dark mode' : '☀️ Light mode', 'success');
        }

        // ============================================
        // CLOSE
        // ============================================
        function closeReader() {
            try { window.close(); } catch(e) { window.location.href = '/hub.html'; }
        }

        function reportIssue() {
            if (confirm('Report an issue with this book?')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // START
        // ============================================
        loadPDF();

        // ============================================
        // EXPOSE
        // ============================================
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;

        console.log('📚 Gliimu PDF Viewer');
    </script>
</body>
</html>
