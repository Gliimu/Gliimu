<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-purple: #2c2f78;
            --brand-gold: #fbb040;
            --brand-gold-dark: #cc8a2a;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow-color: rgba(0,0,0,0.1);
            --reader-bg: #ffffff;
            --progress-track: #e2e8f0;
            --canvas-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --shadow-color: rgba(0,0,0,0.4);
            --reader-bg: #1a1a2e;
            --progress-track: #2d2d44;
            --canvas-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ============================================
           HEADER
           ============================================ */
        .reader-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
            flex-wrap: nowrap;
            gap: 0.4rem;
            box-shadow: 0 1px 4px var(--shadow-color);
            min-height: 56px;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-header .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .reader-header .logo img {
            height: 28px;
            width: auto;
            display: block;
        }

        .reader-header .logo span {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .reader-header .logo span .gold {
            color: var(--brand-gold);
        }

        .reader-header .book-title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            text-align: center;
        }

        .reader-header .controls {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .reader-header .controls button {
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 6px 8px;
            border-radius: 8px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .reader-header .controls button:active {
            background: var(--border-color);
            transform: scale(0.95);
        }

        .reader-header .controls .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 0 3px;
            border: 1px solid var(--border-color);
        }

        .reader-header .controls .zoom-controls button {
            padding: 3px 6px;
            font-size: 0.75rem;
            min-width: 24px;
        }

        .reader-header .controls .zoom-controls .zoom-level {
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 32px;
            text-align: center;
        }

        .reader-header .controls .close-btn {
            font-size: 1.1rem;
            padding: 6px 8px;
        }

        .reader-header .controls .close-btn:active {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* ============================================
           PROGRESS BAR
           ============================================ */
        .progress-bar-container {
            flex-shrink: 0;
            height: 3px;
            background: var(--progress-track);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            touch-action: none;
        }

        .progress-bar-container .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-purple), var(--brand-gold), var(--brand-gold-dark));
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            border-radius: 0 2px 2px 0;
        }

        .progress-bar-container .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255,255,255,0.3) 50%, 
                transparent 100%);
            animation: shimmer 2s infinite;
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ============================================
           PDF VIEWER CONTAINER
           ============================================ */
        .reader-container {
            flex: 1;
            overflow: auto;
            background: var(--reader-bg);
            position: relative;
            transition: background 0.3s;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .reader-container .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            min-height: 100%;
            transition: transform 0.3s ease;
        }

        .reader-container canvas {
            box-shadow: var(--canvas-shadow);
            border-radius: 4px;
            background: var(--reader-bg);
            transition: transform 0.3s ease, filter 0.3s ease;
            max-width: 100%;
            height: auto;
            image-rendering: auto;
            touch-action: none;
        }

        /* Dark mode PDF inversion */
        body.dark-mode .reader-container canvas {
            filter: invert(0.85) hue-rotate(180deg) brightness(1.2) contrast(1.1) !important;
        }

        /* ============================================
           LOADING OVERLAY
           ============================================ */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--reader-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--brand-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           ZOOM INDICATOR
           ============================================ */
        .zoom-indicator {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.4rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px var(--shadow-color);
            z-index: 100;
            font-size: 0.8rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .zoom-indicator.show {
            opacity: 1;
        }

        /* ============================================
           FOOTER
           ============================================ */
        .reader-footer {
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            font-size: 0.7rem;
            color: var(--text-secondary);
            flex-wrap: nowrap;
            gap: 0.5rem;
            min-height: 44px;
        }

        .reader-footer .page-info {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
        }

        .reader-footer .page-info .page-icon {
            color: var(--brand-gold);
            font-size: 0.8rem;
        }

        .reader-footer .actions {
            display: flex;
            gap: 0.3rem;
            flex-wrap: nowrap;
        }

        .reader-footer .actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 0.2rem 0.6rem;
            border-radius: 16px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.65rem;
            font-family: inherit;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .reader-footer .actions button:active {
            transform: scale(0.95);
        }

        .reader-footer .actions button.primary {
            background: var(--brand-gold);
            border-color: var(--brand-gold);
            color: var(--brand-purple);
            font-weight: 600;
        }

        /* ============================================
           TOAST
           ============================================ */
        .reader-toast {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            z-index: 999;
            font-size: 0.75rem;
            animation: slideUp 0.3s ease;
            max-width: 90%;
            border-left: 4px solid var(--brand-gold);
            font-family: 'Space Grotesk', sans-serif;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .reader-toast.warning {
            border-left-color: #f59e0b;
        }

        .reader-toast.success {
            border-left-color: #10b981;
        }

        .reader-toast.error {
            border-left-color: #ef4444;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .reader-header {
                padding: 0.4rem 0.6rem;
                min-height: 48px;
            }
            
            .reader-header .logo img {
                height: 22px;
            }
            
            .reader-header .logo span {
                font-size: 0.75rem;
            }
            
            .reader-header .book-title {
                max-width: 80px;
                font-size: 0.6rem;
            }
            
            .reader-header .controls button {
                font-size: 0.75rem;
                padding: 4px 6px;
            }
            
            .reader-header .controls .zoom-controls button {
                font-size: 0.65rem;
                padding: 2px 4px;
                min-width: 20px;
            }
            
            .reader-header .controls .zoom-controls .zoom-level {
                font-size: 0.55rem;
                min-width: 28px;
            }
            
            .reader-footer {
                padding: 0.3rem 0.6rem;
                font-size: 0.6rem;
                min-height: 38px;
            }
            
            .reader-footer .actions button {
                font-size: 0.55rem;
                padding: 0.15rem 0.4rem;
            }
            
            .reader-container {
                padding: 5px;
            }
            
            .zoom-indicator {
                bottom: 60px;
                font-size: 0.7rem;
                padding: 0.3rem 1rem;
            }
        }

        /* iPhone SE and smaller */
        @media (max-width: 375px) {
            .reader-header .book-title {
                max-width: 60px;
                font-size: 0.55rem;
            }
            
            .reader-header .logo span {
                font-size: 0.65rem;
            }
            
            .reader-header .controls button {
                font-size: 0.65rem;
                padding: 3px 5px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <div class="zoom-controls">
                <button onclick="zoomOut()" title="Zoom Out">
                    <i class="fas fa-minus"></i>
                </button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button onclick="zoomIn()" title="Zoom In">
                    <i class="fas fa-plus"></i>
                </button>
                <button onclick="resetZoom()" title="Reset Zoom">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container" id="progressContainer" title="Reading Progress">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- PDF Viewer Container -->
    <div class="reader-container" id="readerContainer">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p id="loadingText">Loading your book...</p>
        </div>
        <div class="page-wrapper" id="pageWrapper">
            <!-- Canvas will be rendered here -->
        </div>
    </div>

    <!-- Zoom Indicator -->
    <div class="zoom-indicator" id="zoomIndicator">100%</div>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script>
        // ============================================
        // GLIIMU READER - iOS Compatible
        // ============================================

        // ============================================
        // DETECT iOS
        // ============================================
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        console.log('📱 Device:', isIOS ? 'iOS' : 'Not iOS');
        console.log('🌐 Browser:', isSafari ? 'Safari' : 'Other');

        // ============================================
        // CONFIGURATION
        // ============================================
        const STORAGE_KEY = 'gliimu_reader_progress';
        const AUTO_SAVE_INTERVAL = 5000;
        const ZOOM_STEP = 0.15;
        const MIN_ZOOM = 0.5;
        const MAX_ZOOM = 2.5;

        // ============================================
        // STATE
        // ============================================
        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        let isDarkMode = false;
        let autoSaveTimer = null;
        let currentItemId = null;
        let currentZoom = 1.0;
        let isRendering = false;
        let pdfJsLoaded = false;

        // ============================================
        // DOM REFS
        // ============================================
        const pageWrapper = document.getElementById('pageWrapper');
        const bookTitle = document.getElementById('bookTitle');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const pageInfo = document.getElementById('pageInfo');
        const progressFill = document.getElementById('progressFill');
        const progressContainer = document.getElementById('progressContainer');
        const themeBtn = document.getElementById('themeBtn');
        const themeIcon = document.getElementById('themeIcon');
        const zoomLevel = document.getElementById('zoomLevel');
        const zoomIndicator = document.getElementById('zoomIndicator');
        const readerContainer = document.getElementById('readerContainer');

        // ============================================
        // GET URL PARAMETERS
        // ============================================
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('url');
        const title = urlParams.get('title') || 'Book';
        const itemId = urlParams.get('itemId') || '';

        bookTitle.textContent = title;
        currentItemId = itemId;

        // ============================================
        // ZOOM FUNCTIONS
        // ============================================
        function updateZoomDisplay() {
            const percent = Math.round(currentZoom * 100);
            zoomLevel.textContent = percent + '%';
            
            zoomIndicator.textContent = percent + '%';
            zoomIndicator.classList.add('show');
            clearTimeout(zoomIndicator._timeout);
            zoomIndicator._timeout = setTimeout(() => {
                zoomIndicator.classList.remove('show');
            }, 1500);
        }

        function applyZoom() {
            const canvas = pageWrapper.querySelector('canvas');
            if (canvas) {
                canvas.style.transform = 'scale(' + currentZoom + ')';
                canvas.style.transformOrigin = 'top center';
                updateZoomDisplay();
            }
        }

        function zoomIn() {
            if (currentZoom < MAX_ZOOM) {
                currentZoom = Math.min(currentZoom + ZOOM_STEP, MAX_ZOOM);
                applyZoom();
                showToast('Zoom: ' + Math.round(currentZoom * 100) + '%', 'info');
            }
        }

        function zoomOut() {
            if (currentZoom > MIN_ZOOM) {
                currentZoom = Math.max(currentZoom - ZOOM_STEP, MIN_ZOOM);
                applyZoom();
                showToast('Zoom: ' + Math.round(currentZoom * 100) + '%', 'info');
            }
        }

        function resetZoom() {
            currentZoom = 1.0;
            applyZoom();
            showToast('Zoom reset to 100%', 'success');
        }

        // ============================================
        // LOAD PDF.js - iOS Compatible
        // ============================================
        function loadPDFJS() {
            return new Promise((resolve, reject) => {
                if (typeof pdfjsLib !== 'undefined') {
                    pdfJsLoaded = true;
                    resolve();
                    return;
                }

                // Use CDN for PDF.js - iOS Safari compatible
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                script.onload = function() {
                    pdfJsLoaded = true;
                    resolve();
                };
                script.onerror = function() {
                    reject(new Error('Failed to load PDF.js library'));
                };
                document.head.appendChild(script);
            });
        }

        // ============================================
        // INITIALIZE PDF - iOS Compatible
        // ============================================
        async function initPDF() {
            if (!pdfUrl) {
                loadingOverlay.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--brand-gold);"></i>
                    <p>No book found to read</p>
                `;
                loadingOverlay.classList.remove('hidden');
                pageInfo.textContent = '❌ No book';
                return;
            }

            try {
                loadingText.textContent = 'Loading PDF library...';
                
                // Load PDF.js
                await loadPDFJS();
                
                // Set worker source
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                loadingText.textContent = 'Opening book...';

                // Load the PDF - iOS Safari needs specific options
                const loadingTask = pdfjsLib.getDocument({
                    url: pdfUrl,
                    withCredentials: false,
                    useSystemFonts: true,
                    disableFontFace: false,
                    disableRange: true,
                    disableStream: true,
                    disableAutoFetch: true
                });

                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                pageInfo.textContent = 'Page 1 of ' + totalPages;

                console.log('📚 PDF loaded: ' + totalPages + ' pages');

                // Load saved progress
                await loadSavedProgress();

                // Render first page
                await renderPage(currentPage);

                // Hide loading
                loadingOverlay.classList.add('hidden');

                // Start auto-save
                startAutoSave();

                // Setup event listeners
                setupEventListeners();

            } catch (error) {
                console.error('PDF loading error:', error);
                loadingOverlay.innerHTML = `
                    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:var(--brand-gold);"></i>
                    <p style="margin-top:0.5rem;">Could not load the book.</p>
                    <p style="font-size:0.7rem;opacity:0.7;margin-top:0.25rem;">${error.message || 'Please try again'}</p>
                    <button onclick="location.reload()" style="margin-top:1rem;padding:0.4rem 1.5rem;border-radius:40px;background:var(--brand-gold);color:var(--brand-purple);border:none;font-weight:600;cursor:pointer;font-family:inherit;font-size:0.8rem;">
                        Retry
                    </button>
                `;
                loadingOverlay.classList.remove('hidden');
                showToast('Failed to load the book', 'error');
            }
        }

        // ============================================
        // RENDER PAGE - iOS Compatible
        // ============================================
        async function renderPage(pageNum) {
            if (!pdfDoc || isRendering) return;

            isRendering = true;

            try {
                const page = await pdfDoc.getPage(pageNum);
                
                // Calculate scale for iOS - use lower scale for performance
                const containerWidth = readerContainer.clientWidth - 20;
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min((containerWidth / viewport.width) * 1.0, 1.5);
                
                const scaledViewport = page.getViewport({ scale: scale });

                // Create or get canvas
                let canvas = pageWrapper.querySelector('canvas');
                if (!canvas) {
                    canvas = document.createElement('canvas');
                    pageWrapper.appendChild(canvas);
                }

                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                canvas.style.width = scaledViewport.width + 'px';
                canvas.style.height = scaledViewport.height + 'px';

                // Clear previous content
                context.clearRect(0, 0, canvas.width, canvas.height);

                // Render page
                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport,
                };

                await page.render(renderContext).promise;

                currentPage = pageNum;
                updateProgress();

                // Apply current zoom
                applyZoom();

                // Save progress
                saveProgress();

                // Scroll to top
                readerContainer.scrollTop = 0;

            } catch (error) {
                console.error('Render error:', error);
                showToast('Error rendering page', 'error');
            } finally {
                isRendering = false;
            }
        }

        // ============================================
        // NAVIGATION
        // ============================================
        function nextPage() {
            if (currentPage < totalPages) {
                renderPage(currentPage + 1);
            } else {
                showToast("You're on the last page", 'info');
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                renderPage(currentPage - 1);
            } else {
                showToast("You're on the first page", 'info');
            }
        }

        // ============================================
        // PROGRESS TRACKING
        // ============================================
        function updateProgress() {
            const progress = (currentPage / totalPages) * 100;
            progressFill.style.width = progress + '%';
            
            const icon = progress >= 90 ? '🎯' : progress >= 50 ? '📖' : '📚';
            pageInfo.innerHTML = icon + ' Page ' + currentPage + ' of ' + totalPages;
        }

        // ============================================
        // SAVE PROGRESS
        // ============================================
        function saveProgress() {
            try {
                const progressData = {
                    itemId: currentItemId,
                    title: title,
                    currentPage: currentPage,
                    totalPages: totalPages,
                    progress: (currentPage / totalPages) * 100,
                    lastRead: new Date().toISOString(),
                    url: pdfUrl
                };

                localStorage.setItem(STORAGE_KEY + '_' + (currentItemId || title), JSON.stringify(progressData));

                const allProgress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                allProgress[currentItemId || title] = progressData;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(allProgress));

                console.log('💾 Progress saved: ' + progressData.progress + '%');
            } catch (e) {
                console.warn('Could not save progress:', e);
            }
        }

        // ============================================
        // LOAD SAVED PROGRESS
        // ============================================
        async function loadSavedProgress() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY + '_' + (currentItemId || title));
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.currentPage && data.currentPage <= totalPages) {
                        currentPage = data.currentPage;
                        showToast('📚 Resuming from page ' + currentPage, 'success');
                        return;
                    }
                }

                const allProgress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                const globalData = allProgress[currentItemId || title];
                if (globalData && globalData.currentPage <= totalPages) {
                    currentPage = globalData.currentPage;
                    showToast('📚 Resuming from page ' + currentPage, 'success');
                    return;
                }

            } catch (e) {
                console.warn('Could not load saved progress:', e);
            }
        }

        // ============================================
        // AUTO-SAVE
        // ============================================
        function startAutoSave() {
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            autoSaveTimer = setInterval(function() {
                saveProgress();
            }, AUTO_SAVE_INTERVAL);
        }

        // ============================================
        // THEME TOGGLE
        // ============================================
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark-mode', isDarkMode);
            
            themeIcon.className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';
            
            localStorage.setItem('reader_theme', isDarkMode ? 'dark' : 'light');

            showToast(isDarkMode ? '🌙 Dark mode activated' : '☀️ Light mode activated', 'success');
        }

        // ============================================
        // CLOSE READER
        // ============================================
        function closeReader() {
            saveProgress();
            
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }

            try {
                window.close();
            } catch (e) {
                window.location.href = '/hub.html';
            }
        }

        // ============================================
        // REPORT ISSUE
        // ============================================
        function reportIssue() {
            if (confirm('Report an issue with this book?')) {
                showToast('Thank you for reporting!', 'success');
            }
        }

        // ============================================
        // TOAST SYSTEM
        // ============================================
        function showToast(message, type) {
            type = type || 'info';
            const existing = document.querySelector('.reader-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'reader-toast ' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s ease';
                setTimeout(function() { toast.remove(); }, 300);
            }, 3000);
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        function setupEventListeners() {
            // iOS Touch support for progress bar
            progressContainer.addEventListener('click', function(e) {
                const rect = progressContainer.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                const targetPage = Math.max(1, Math.min(totalPages, Math.round(pos * totalPages)));
                renderPage(targetPage);
                showToast('📍 Jumped to page ' + targetPage, 'info');
            });

            // Touch events for swipe
            let touchStartX = 0;
            let touchStartY = 0;
            
            readerContainer.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            readerContainer.addEventListener('touchend', function(e) {
                if (!touchStartX) return;
                
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                const diffX = touchStartX - touchEndX;
                const diffY = touchStartY - touchEndY;
                
                // Only trigger if horizontal swipe is dominant
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        nextPage();
                    } else {
                        prevPage();
                    }
                }
                
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: true });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case '+':
                        case '=':
                            e.preventDefault();
                            zoomIn();
                            return;
                        case '-':
                            e.preventDefault();
                            zoomOut();
                            return;
                        case '0':
                            e.preventDefault();
                            resetZoom();
                            return;
                    }
                    return;
                }

                switch(e.key) {
                    case 'ArrowRight':
                    case 'ArrowDown':
                    case ' ':
                        e.preventDefault();
                        nextPage();
                        break;
                    case 'ArrowLeft':
                    case 'ArrowUp':
                        e.preventDefault();
                        prevPage();
                        break;
                    case 'Home':
                        e.preventDefault();
                        renderPage(1);
                        break;
                    case 'End':
                        e.preventDefault();
                        renderPage(totalPages);
                        break;
                }
            });

            // Window resize - re-render
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    if (pdfDoc && currentPage) {
                        renderPage(currentPage);
                    }
                }, 500);
            });
        }

        // ============================================
        // THEME ON LOAD
        // ============================================
        const savedTheme = localStorage.getItem('reader_theme');
        if (savedTheme === 'dark') {
            isDarkMode = true;
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        // ============================================
        // HANDLE WINDOW CLOSE
        // ============================================
        window.addEventListener('beforeunload', function() {
            saveProgress();
        });

        // ============================================
        // INIT
        // ============================================
        initPDF();

        // ============================================
        // EXPOSE GLOBALLY
        // ============================================
        window.nextPage = nextPage;
        window.prevPage = prevPage;
        window.toggleTheme = toggleTheme;
        window.closeReader = closeReader;
        window.reportIssue = reportIssue;
        window.showToast = showToast;
        window.zoomIn = zoomIn;
        window.zoomOut = zoomOut;
        window.resetZoom = resetZoom;

        console.log('📚 Gliimu Reader initialized for iOS');
    </script>
</body>
</html>
