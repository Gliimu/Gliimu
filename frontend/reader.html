<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gliimu Reader</title>
    <link rel="stylesheet" href="/css/reader.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header -->
    <header class="reader-header">
        <div class="logo">
            <img src="/icons/logo.png" alt="Gliimu" onerror="this.style.display='none'">
            <span>Gliimu <span class="gold">Reader</span></span>
        </div>
        <div class="book-title" id="bookTitle">Loading...</div>
        <div class="controls">
            <button onclick="toggleTheme()" title="Toggle Theme" id="themeBtn">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button onclick="closeReader()" class="close-btn" title="Close Reader">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Reader Container -->
    <div class="reader-container" id="readerContainer">
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner" id="loadingSpinner"></div>
            <p id="loadingText">Loading your book...</p>
            <p class="loading-sub" id="loadingSub">This may take a moment</p>
        </div>

        <!-- Auth Required Overlay -->
        <div class="auth-overlay" id="authOverlay">
            <div class="icon">🔒</div>
            <h2 id="authTitle">Access Restricted</h2>
            <p id="authMessage">You need to be signed in to view this content.</p>
            <div class="btn-group">
                <button class="btn-primary" onclick="goToLogin()">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <button class="btn-secondary" onclick="goToHub()">
                    <i class="fas fa-home"></i> Explore Hub
                </button>
            </div>
        </div>

        <!-- Completed Overlay -->
        <div class="completed-overlay" id="completedOverlay">
            <div class="icon">🎉</div>
            <h2>Congratulations!</h2>
            <p id="completedMessage">You've completed reading this book!</p>
            <div class="gp-reward" id="gpRewardDisplay">+5 GP</div>
            <div class="btn-group">
                <button class="btn-primary" onclick="closeReader()">
                    <i class="fas fa-check"></i> Done
                </button>
                <button class="btn-secondary" onclick="goToHub()">
                    <i class="fas fa-home"></i> Browse More
                </button>
            </div>
        </div>

        <!-- Page Wrapper for PDF Content -->
        <div class="page-wrapper" id="pageWrapper" style="display:none;">
            <!-- Canvas will be rendered here -->
        </div>

        <!-- Navigation overlays for mobile -->
        <div class="nav-overlay left" id="navLeft" onclick="prevPage()">
            <div class="nav-hint"><i class="fas fa-chevron-left"></i></div>
        </div>
        <div class="nav-overlay right" id="navRight" onclick="nextPage()">
            <div class="nav-hint"><i class="fas fa-chevron-right"></i></div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confettiCanvas"></canvas>

    <!-- Footer -->
    <footer class="reader-footer">
        <span class="page-info">
            <span class="page-icon">📖</span>
            <span id="pageInfo">Page 0 of 0</span>
        </span>
        <div class="actions">
            <button onclick="reportIssue()">
                <i class="fas fa-flag"></i>
            </button>
            <button class="primary" onclick="closeReader()">
                <i class="fas fa-check"></i> Done
            </button>
        </div>
    </footer>

    <script type="module" src="/js/pages/reader.js"></script>
</body>
</html>
