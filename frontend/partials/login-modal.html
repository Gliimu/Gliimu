<div class="modal-overlay" id="loginModal">
  <div class="login-card">
    <button class="close-btn" id="closeLoginBtn"><i class="fas fa-times"></i></button>
    <div class="login-header">
      <h2>Sign In</h2>
      <p style="font-size:0.9rem; color:var(--text-muted);">Access your Dashboard</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label for="loginUsername">Email or Username</label>
        <input type="text" id="loginUsername" class="input-field" placeholder="e.g. you@mail.com" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">PassCode</label>
        <input type="password" id="loginPassword" class="input-field" placeholder="•••••••" required>
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
      <div class="login-links">
        <p>I need technical <a href="contact.html">Support</a></p>
        <p style="margin-top:8px;"><a href="application.html">Apply Now</a></p>
      </div>
    </form>
  </div>
</div>
