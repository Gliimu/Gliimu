<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub | Gliimu Institute</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/library.css">
</head>
<body>
    <!-- Header -->
    <header class="library-header" id="libraryHeader">
        <div class="header-container">
            <div class="header-left">
                <a href="/hub.html" class="logo-link">
                    <img src="icons/logo.png" alt="Gliimu" class="logo-img" id="logoImg">
                </a>
            </div>
            <div class="header-center">
                <div class="gp-display" id="gpDisplay">
                    <span class="gp-icon">⭐</span>
                    <span class="gp-value" id="headerGP">0</span>
                    <span class="gp-label">GP</span>
                </div>
                <button class="search-trigger" id="searchTrigger">
                    <i class="fas fa-search"></i>
                    <span>Search</span>
                </button>
            </div>
            <div class="header-right">
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="profile-btn" id="profileBtn">
                        <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User&background=2c2f78&color=fff" alt="Profile">
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                        <a href="/portfolio.html"><i class="fas fa-briefcase"></i> My Portfolio</a>
                        <a href="#" id="savedItemsLink"><i class="fas fa-bookmark"></i> Saved Items</a>
                        <a href="#" id="purchasedItemsLink"><i class="fas fa-shopping-bag"></i> Purchased Items</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" id="merchandiseLink"><i class="fas fa-tshirt"></i> Merchandise</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="library-main" id="libraryMain">
        <div class="container">
            <!-- Content Grid -->
            <div id="booksContainer" class="content-grid">
                <div class="loading">Loading content...</div>
            </div>
        </div>
    </main>

    <!-- Search Modal -->
    <div id="searchModal" class="search-modal">
        <div class="search-modal-overlay"></div>
        <div class="search-modal-content">
            <div class="search-modal-header">
                <h2>Search</h2>
                <button class="search-modal-close" id="searchModalClose">&times;</button>
            </div>
            <div class="search-modal-body">
                <div class="search-modal-input-wrapper">
                    <i class="fas fa-search search-modal-icon"></i>
                    <input type="text" id="searchModalInput" placeholder="Search books, talks, resources...">
                    <button id="searchModalBtn"><i class="fas fa-arrow-right"></i></button>
                </div>
                <div class="search-modal-results" id="searchModalResults">
                    <p class="search-hint">Type to start searching...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Item Detail Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <div class="modal-header-actions">
                    <button class="modal-save-btn" id="modalSaveBtn" title="Save for later">
                        <i class="fas fa-bookmark"></i>
                    </button>
                    <button class="modal-close" id="modalCloseBtn">&times;</button>
                </div>
            </div>
            <div class="modal-body">
                <img id="modalImage" src="" alt="">
                <div id="modalDescription"></div>
            </div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/pages/library.js"></script>
</body>
</html>
