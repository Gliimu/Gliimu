<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hub – Community Feed | Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connect with the Gliimu community. Share your journey, discover insights, and engage with fellow creatives.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/hub.css">
</head>
<body>

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Hub Section -->
  <section class="hub-section">
    <div class="container">
      
      <!-- Hero Banner -->
      <div class="hub-hero">
        <h1>Community Feed</h1>
        <p>Share your journey, celebrate wins, and grow with fellow creatives</p>
      </div>
      
      <!-- Create Post Card (Sticky) -->
      <div class="create-post-card" id="createPostCard">
        <div class="create-post-avatar">
          <i class="fas fa-user-circle"></i>
        </div>
        <div class="create-post-input">
          <input type="text" id="createPostInput" placeholder="Share something with the community...">
        </div>
        <div class="create-post-actions">
          <button class="create-post-trigger" id="createPostTriggerBtn">
            <i class="fas fa-plus-circle"></i> Create Post
          </button>
        </div>
      </div>
      
      <!-- Feed Filter Bar -->
      <div class="feed-filters">
        <button class="filter-btn active" data-filter="all">
          <i class="fas fa-fire"></i> For You
        </button>
        <button class="filter-btn" data-filter="insight">
          <i class="fas fa-lightbulb"></i> Insights
        </button>
        <button class="filter-btn" data-filter="video">
          <i class="fas fa-video"></i> Videos
        </button>
        <button class="filter-btn" data-filter="event">
          <i class="fas fa-calendar-alt"></i> Events
        </button>
        <button class="filter-btn" data-filter="support">
          <i class="fas fa-heart"></i> Support
        </button>
      </div>
      
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <i class="fas fa-users"></i>
          <span id="statPosts">0</span>
          <span>Posts</span>
        </div>
        <div class="stat-item">
          <i class="fas fa-heart"></i>
          <span id="statLikes">0</span>
          <span>Likes</span>
        </div>
        <div class="stat-item">
          <i class="fas fa-comment"></i>
          <span id="statComments">0</span>
          <span>Comments</span>
        </div>
      </div>
      
      <!-- Feed Container -->
      <div class="feed-container" id="feedContainer">
        <!-- Posts will be loaded here dynamically -->
        <div class="loading-spinner">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading feed...</p>
        </div>
      </div>
      
    </div>
  </section>

  <!-- Create Post Modal -->
  <div class="modal-overlay" id="createPostModal">
    <div class="generic-modal modal-create">
      <div class="modal-header">
        <h3><i class="fas fa-pen-alt"></i> Create New Post</h3>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>
      
      <form id="postForm">
        <div class="form-group">
          <label>Post Type</label>
          <div class="post-type-selector">
            <button type="button" class="type-option active" data-type="insight">
              <i class="fas fa-lightbulb"></i> Insight
            </button>
            <button type="button" class="type-option" data-type="video">
              <i class="fas fa-video"></i> Video
            </button>
            <button type="button" class="type-option" data-type="event">
              <i class="fas fa-calendar-alt"></i> Event
            </button>
            <button type="button" class="type-option" data-type="support">
              <i class="fas fa-hand-holding-heart"></i> Support
            </button>
          </div>
          <input type="hidden" id="postType" value="insight">
        </div>
        
        <div class="form-group">
          <input type="text" id="postTitle" placeholder="What's the title?" class="title-input" required>
        </div>
        
        <div class="form-group">
          <textarea id="postDescription" rows="5" placeholder="Share your story, insights, or experience..." required></textarea>
        </div>
        
        <div class="form-group">
          <label class="image-upload-label">
            <i class="fas fa-image"></i> Add Image (optional)
            <input type="file" id="postImage" accept="image/*" style="display: none;">
          </label>
          <div class="image-preview" id="imagePreview" style="display: none;">
            <img id="previewImg" src="" alt="Preview">
            <button type="button" class="remove-image" onclick="removeImage()">
              <i class="fas fa-times-circle"></i>
            </button>
          </div>
        </div>
        
        <div class="modal-footer">
          <button type="button" class="btn-secondary" onclick="closeCreatePostModal()">Cancel</button>
          <button type="button" class="btn-primary" onclick="submitPost()">
            <i class="fas fa-paper-plane"></i> Publish
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Post Detail Modal (for expanded view) -->
  <div class="modal-overlay" id="postDetailModal">
    <div class="generic-modal modal-detail">
      <div class="modal-header">
        <h3>Post</h3>
        <button class="modal-close" id="closeDetailModal">&times;</button>
      </div>
      <div id="postDetailContent"></div>
    </div>
  </div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- JS Files -->
  <script type="module" src="js/pages/hub.js"></script>
  
  <script>
    // Legacy functions for inline handlers
    window.closeCreatePostModal = function() {
      document.getElementById('createPostModal').classList.remove('active');
    };
    
    window.removeImage = function() {
      const preview = document.getElementById('imagePreview');
      const previewImg = document.getElementById('previewImg');
      const fileInput = document.getElementById('postImage');
      preview.style.display = 'none';
      previewImg.src = '';
      fileInput.value = '';
    };
    
    window.submitPost = function() {
      const event = new CustomEvent('submitPost', {
        detail: {
          title: document.getElementById('postTitle').value,
          type: document.getElementById('postType').value,
          description: document.getElementById('postDescription').value,
          imageFile: document.getElementById('postImage').files[0]
        }
      });
      window.dispatchEvent(event);
    };
    
    // Post type selector
    document.addEventListener('DOMContentLoaded', function() {
      const typeOptions = document.querySelectorAll('.type-option');
      typeOptions.forEach(opt => {
        opt.addEventListener('click', function() {
          typeOptions.forEach(o => o.classList.remove('active'));
          this.classList.add('active');
          document.getElementById('postType').value = this.dataset.type;
        });
      });
      
      // Image upload preview
      const imageInput = document.getElementById('postImage');
      if (imageInput) {
        imageInput.addEventListener('change', function(e) {
          const preview = document.getElementById('imagePreview');
          const previewImg = document.getElementById('previewImg');
          if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
              previewImg.src = e.target.result;
              preview.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
          }
        });
      }
      
      // Create post trigger
      const createTrigger = document.getElementById('createPostTriggerBtn');
      const createInput = document.getElementById('createPostInput');
      if (createTrigger) {
        createTrigger.addEventListener('click', () => {
          document.getElementById('createPostModal').classList.add('active');
        });
      }
      if (createInput) {
        createInput.addEventListener('click', () => {
          document.getElementById('createPostModal').classList.add('active');
        });
      }
    });
  </script>
</body>
</html>
