<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hub – Community & Updates | Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Join the Gliimu Community. Read insights, watch student projects, attend events, and support the next generation of creatives.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/hub.css">
</head>
<body>

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Hub Section -->
  <section class="hub-section">
    <div class="container">
      
      <!-- Hero -->
      <div class="hub-hero">
        <h1>Community Hub</h1>
        <p>Discover stories, insights, and opportunities from the Gliimu community.</p>
        <div class="stats-bar">
          <div class="stat-item">
            <span class="stat-number" id="statPosts">0</span>
            <span class="stat-label">Posts</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="statLikes">0</span>
            <span class="stat-label">Likes</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="statPending">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
      </div>
      
      <!-- BANNER AD SECTION (Sponsored) -->
      <div id="bannerAd" class="banner-ad-container hidden monetization-section"></div>
      
      <!-- Main Layout with Sidebar -->
      <div class="hub-layout">
        <!-- Main Content Area -->
        <div class="main-content">
          <!-- Search Bar -->
          <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search posts, events, or insights...">
          </div>
          
          <!-- Filter Bar -->
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="event">Events</button>
            <button class="filter-btn" data-filter="insight">Insights</button>
            <button class="filter-btn" data-filter="video">Videos</button>
            <button class="filter-btn" data-filter="support">Support</button>
          </div>
          
          <!-- Posts Grid (Masonry) -->
          <div class="masonry-grid" id="postsContainer">
            <!-- Posts will be loaded here dynamically -->
            <div class="empty-state">
              <i class="fas fa-spinner fa-spin"></i>
              <h3>Loading posts...</h3>
            </div>
          </div>
        </div>
        
        <!-- Sidebar Content (Ads & Monetization) -->
        <div class="sidebar-content">
          <!-- Sponsored Video Section -->
          <div id="sponsoredVideo" class="sponsored-video hidden"></div>
          
          <!-- Sidebar Ads Container -->
          <div id="sidebarAds" class="sidebar-ads hidden"></div>
          
          <!-- Affiliate Links Section -->
          <div id="affiliateLinks" class="affiliate-section hidden"></div>
        </div>
      </div>
      
    </div>
  </section>

  <!-- Create Post Button -->
  <button class="create-post-btn" id="createPostBtn">
    <i class="fas fa-plus"></i>
  </button>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- Create Post Modal -->
  <div class="modal-overlay" id="createPostModal">
    <div class="generic-modal modal-large">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3 style="margin: 0;">Share with the Community</h3>
        <button id="closeModalBtn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted);">&times;</button>
      </div>
      
      <form id="postForm">
        <div class="form-group">
          <label>Post Type *</label>
          <select id="postType" required>
            <option value="insight">💡 Insight / Article</option>
            <option value="video">🎬 Video / Project</option>
            <option value="event">📅 Event / Workshop</option>
            <option value="support">❤️ Support / Fundraiser</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="postTitle" placeholder="Enter a catchy title..." required>
        </div>
        
        <div class="form-group">
          <label>Description *</label>
          <textarea id="postDescription" rows="4" placeholder="Share your story, insights, or details..." required></textarea>
        </div>
        
        <div class="form-group">
          <label>Image / Thumbnail</label>
          <input type="file" id="postImage" accept="image/*">
          <div class="image-preview" id="imagePreview" style="display: none;">
            <img id="previewImg" src="" alt="Preview">
          </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
          <button type="button" class="btn-secondary" onclick="closeCreatePostModal()" style="padding: 10px 24px; border-radius: 30px;">Cancel</button>
          <button type="button" class="btn-primary" onclick="submitPost()" style="padding: 10px 24px; border-radius: 30px;">Submit for Review</button>
        </div>
      </form>
    </div>
  </div>

  <!-- JS Files -->
  <script type="module" src="js/pages/hub.js"></script>
  
  <!-- Legacy fallback functions -->
  <script>
    // Legacy support for inline handlers
    window.openCreatePostModal = function() {
      const modal = document.getElementById('createPostModal');
      if (modal) modal.classList.add('active');
    };
    
    window.closeCreatePostModal = function() {
      const modal = document.getElementById('createPostModal');
      if (modal) modal.classList.remove('active');
    };
    
    window.previewImage = function(input) {
      const preview = document.getElementById('imagePreview');
      const previewImg = document.getElementById('previewImg');
      
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          previewImg.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      }
    };
    
    window.submitPost = function() {
      // This is handled by the module
      const event = new CustomEvent('submitPost', {
        detail: {
          title: document.getElementById('postTitle').value,
          type: document.getElementById('postType').value,
          description: document.getElementById('postDescription').value,
          imageFile: document.getElementById('postImage').files[0]
        }
      });
      window.dispatchEvent(event);
    };
  </script>
</body>
</html>
