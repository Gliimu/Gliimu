<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hub | Gliimu Creative Feed</title>
  <meta name="description" content="Discover creative content from the Gliimu community - short videos, design insights, and creative inspiration">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/hub.css">
</head>
<body>

  <div class="feed-app">
    
    <!-- Header - Minimal -->
    <div class="feed-header">
      <div class="header-left">
        <i class="fas fa-fire" style="color: #fe2c55;"></i>
        <h1>Creative Feed</h1>
      </div>
      <div class="header-right">
        <button class="create-short-btn" id="createPostBtn">
          <i class="fas fa-plus"></i>
        </button>
        <button class="search-btn" id="searchBtn">
          <i class="fas fa-search"></i>
        </button>
      </div>
    </div>

    <!-- Search Bar (Hidden by default) -->
    <div class="search-container" id="searchContainer" style="display: none;">
      <div class="search-input-wrapper">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search creators, content, or topics...">
        <button id="closeSearchBtn"><i class="fas fa-times"></i></button>
      </div>
    </div>

    <!-- Feed Tabs -->
    <div class="feed-tabs">
      <button class="tab-btn active" data-tab="for-you">
        <i class="fas fa-fire"></i> For You
      </button>
      <button class="tab-btn" data-tab="following">
        <i class="fas fa-user-plus"></i> Following
      </button>
      <button class="tab-btn" data-tab="trending">
        <i class="fas fa-chart-line"></i> Trending
      </button>
    </div>

    <!-- Category Chips -->
    <div class="category-chips">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="video">
        <i class="fas fa-video"></i> Shorts
      </button>
      <button class="chip" data-filter="insight">
        <i class="fas fa-lightbulb"></i> Insights
      </button>
      <button class="chip" data-filter="design">
        <i class="fas fa-palette"></i> Design
      </button>
      <button class="chip" data-filter="project">
        <i class="fas fa-code"></i> Projects
      </button>
    </div>

    <!-- Feed Container - Vertical Scroll -->
    <div class="feed-container" id="feedContainer">
      <div class="loading-feed">
        <div class="loading-spinner"></div>
        <p>Loading creative content...</p>
      </div>
    </div>

    <!-- Create Post Modal -->
    <div class="modal-overlay" id="createPostModal">
      <div class="modal-content modal-create">
        <div class="modal-header">
          <h3>Create New Content</h3>
          <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        
        <form id="postForm">
          <div class="form-group">
            <label>Content Type</label>
            <div class="type-buttons">
              <button type="button" class="type-btn active" data-type="insight">
                <i class="fas fa-lightbulb"></i> Insight
              </button>
              <button type="button" class="type-btn" data-type="video">
                <i class="fas fa-video"></i> Short
              </button>
              <button type="button" class="type-btn" data-type="design">
                <i class="fas fa-palette"></i> Design
              </button>
              <button type="button" class="type-btn" data-type="project">
                <i class="fas fa-code"></i> Project
              </button>
            </div>
            <input type="hidden" id="postType" value="insight">
          </div>
          
          <div class="form-group">
            <input type="text" id="postTitle" placeholder="Caption / Title..." class="caption-input" required>
          </div>
          
          <div class="form-group">
            <textarea id="postDescription" rows="3" placeholder="Tell your story or share insights..."></textarea>
          </div>
          
          <div class="form-group">
            <label class="upload-btn">
              <i class="fas fa-image"></i> Add Image or Thumbnail
              <input type="file" id="postImage" accept="image/*" style="display: none;">
            </label>
            <div class="image-preview" id="imagePreview" style="display: none;">
              <img id="previewImg" src="" alt="Preview">
              <button type="button" class="remove-preview" onclick="removeImage()">
                <i class="fas fa-times-circle"></i>
              </button>
            </div>
          </div>
          
          <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="closeCreatePostModal()">Cancel</button>
            <button type="button" class="btn-publish" onclick="submitPost()">
              <i class="fas fa-paper-plane"></i> Publish
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Post Detail Modal -->
    <div class="modal-overlay" id="postDetailModal">
      <div class="modal-content modal-detail">
        <button class="detail-close" id="closeDetailModal">
          <i class="fas fa-times"></i>
        </button>
        <div id="postDetailContent"></div>
      </div>
    </div>

  </div>

  <!-- JS File -->
  <script type="module" src="js/pages/hub.js"></script>
  
  <script>
    window.closeCreatePostModal = function() {
      document.getElementById('createPostModal').classList.remove('active');
    };
    
    window.removeImage = function() {
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('previewImg').src = '';
      document.getElementById('postImage').value = '';
    };
    
    window.submitPost = function() {
      const event = new CustomEvent('submitPost', {
        detail: {
          title: document.getElementById('postTitle').value,
          type: document.getElementById('postType').value,
          description: document.getElementById('postDescription').value,
          imageFile: document.getElementById('postImage').files[0]
        }
      });
      window.dispatchEvent(event);
    };
    
    // Type selector
    document.addEventListener('DOMContentLoaded', function() {
      const typeBtns = document.querySelectorAll('.type-btn');
      typeBtns.forEach(btn => {
        btn.addEventListener('click', function() {
          typeBtns.forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          document.getElementById('postType').value = this.dataset.type;
        });
      });
      
      // Image preview
      const imageInput = document.getElementById('postImage');
      if (imageInput) {
        imageInput.addEventListener('change', function(e) {
          const preview = document.getElementById('imagePreview');
          const previewImg = document.getElementById('previewImg');
          if (this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
              previewImg.src = e.target.result;
              preview.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
          }
        });
      }
      
      // Create post button
      const createBtn = document.getElementById('createPostBtn');
      if (createBtn) {
        createBtn.addEventListener('click', () => {
          document.getElementById('createPostModal').classList.add('active');
        });
      }
      
      // Search button
      const searchBtn = document.getElementById('searchBtn');
      const searchContainer = document.getElementById('searchContainer');
      const closeSearchBtn = document.getElementById('closeSearchBtn');
      
      if (searchBtn) {
        searchBtn.addEventListener('click', () => {
          searchContainer.style.display = searchContainer.style.display === 'none' ? 'block' : 'none';
          if (searchContainer.style.display === 'block') {
            document.getElementById('searchInput').focus();
          }
        });
      }
      
      if (closeSearchBtn) {
        closeSearchBtn.addEventListener('click', () => {
          searchContainer.style.display = 'none';
          document.getElementById('searchInput').value = '';
        });
      }
    });
  </script>
</body>
</html>
