<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FAQs – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find answers to frequently asked questions about admissions, tuition, learning structure, and accreditation at Gliimu Institute of Media Technologies.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/faq.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- Global Header -->
  <div id="header-placeholder"></div>

  <!-- FAQ Main Content -->
  <main class="faq-main">
    <div class="faq-container">
      
      <!-- Hero Section -->
      <div class="faq-hero">
        <h1>Frequently Asked Questions</h1>
        <p>Find answers to common questions about admissions, tuition, and more.</p>
      </div>
      
      <!-- Search Bar -->
      <div class="faq-search-wrapper">
        <div class="faq-search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="faqSearchInput" placeholder="Search for answers...">
        </div>
      </div>
      
      <!-- Results Count -->
      <div class="faq-results-count" id="faqResultsCount"></div>
      
      <!-- Categories Navigation -->
      <div class="faq-categories-nav" id="faqCategoriesNav">
        <!-- Categories will be loaded by JS -->
      </div>
      
      <!-- FAQ Accordion Container -->
      <div class="faq-accordion-container" id="faqAccordionContainer">
        <div class="faq-loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading FAQs...</p>
        </div>
      </div>
      
      <!-- Still Have Questions -->
      <div class="faq-contact-section">
        <h3>Still have questions?</h3>
        <p>Can't find the answer you're looking for? We're here to help.</p>
        <a href="contact.html" class="faq-contact-btn">
          <i class="fas fa-envelope"></i> Contact Us
        </a>
      </div>
      
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- JS Files -->
  <script src="js/pages/header.js"></script>
  <script src="js/pages/faq.js"></script>

  <!-- Load Partials -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Load header
      fetch('partials/header.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Header error:', err));
      
      // Load footer
      fetch('partials/footer.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('footer-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Footer error:', err));
      
      // Load login modal
      fetch('partials/login-modal.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('login-modal-placeholder').innerHTML = html;
        })
        .catch(err => console.error('Modal error:', err));
    });
  </script>
</body>
</html>
