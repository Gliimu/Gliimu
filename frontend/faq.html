<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQs – Gliimu Institute | Frequently Asked Questions</title>
  <meta name="description" content="Find answers to frequently asked questions about admissions, tuition, learning structure, and accreditation at Gliimu Institute of Media Technologies.">
  
  <link rel="icon" type="image/png" href="icons/logo.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/faq.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <!-- FAQ Main Content - No Header/Footer -->
  <main class="faq-main">
    <div class="faq-container">
      
      <!-- Hero Section -->
      <div class="faq-hero">
        <div class="hero-icon">
          <i class="fas fa-question-circle"></i>
        </div>
        <h1>Frequently Asked Questions</h1>
        <p>Find answers to common questions about admissions, tuition, and more.</p>
      </div>
      
      <!-- Search Bar -->
      <div class="faq-search-wrapper">
        <div class="faq-search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="faqSearchInput" placeholder="Search for answers...">
          <button id="clearSearchBtn" class="clear-search-btn" style="display: none;">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      
      <!-- Results Count -->
      <div class="faq-results-count" id="faqResultsCount"></div>
      
      <!-- Categories Navigation -->
      <div class="faq-categories-nav" id="faqCategoriesNav">
        <!-- Categories will be loaded by JS -->
      </div>
      
      <!-- FAQ Accordion Container -->
      <div class="faq-accordion-container" id="faqAccordionContainer">
        <div class="faq-loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading FAQs...</p>
        </div>
      </div>
      
      <!-- Still Have Questions -->
      <div class="faq-contact-section">
        <div class="contact-icon">
          <i class="fas fa-headset"></i>
        </div>
        <h3>Still have questions?</h3>
        <p>Can't find the answer you're looking for? We're here to help.</p>
        <a href="contact.html" class="faq-contact-btn">
          <i class="fas fa-envelope"></i> Contact Support
        </a>
      </div>
      
    </div>
  </main>

  <!-- Back to Top Button -->
  <button class="back-to-top" id="backToTopBtn">
    <i class="fas fa-arrow-up"></i>
  </button>

  <script type="module" src="js/pages/faq.js"></script>
</body>
</html>
