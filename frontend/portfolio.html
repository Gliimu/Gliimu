<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio | Gliimu Institute</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/portfolio.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="portfolio-page">

    <!-- Simple Header -->
    <div class="portfolio-header">
        <div class="container">
            <a href="/index" class="logo">
                <img src="/icons/logo.png" alt="Gliimu" class="logo-img">
                <span>Gliimu Institute</span>
            </a>
        </div>
    </div>

    <!-- Portfolio Content -->
    <main class="portfolio-main">
        <div class="container">
            <div id="portfolioContent">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading portfolio...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="portfolio-footer">
        <div class="container">
            <p>&copy; 2025 Gliimu Institute of Media Technologies Ltd. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="/js/pages/portfolio.js"></script>
