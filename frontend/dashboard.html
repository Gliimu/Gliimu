<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your dashboard at Gliimu Institute of Media Technologies.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/footer.css">
  <link rel="stylesheet" href="css/modal.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- Dashboard Container -->
  <div class="dashboard-container">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="index.html" class="logo">
          <img src="icons/logo.png" alt="Gliimu logo">
        </a>
      </div>
      
      <div class="user-info-sidebar">
        <img src="" alt="User Avatar" class="user-avatar-sidebar" id="userAvatarSidebar">
        <div class="user-name-sidebar" id="userNameSidebar">Loading...</div>
        <div class="user-role-sidebar" id="userRoleSidebar">Student</div>
      </div>
      
      <nav class="nav-menu" id="navMenu">
        <!-- Dynamic tabs will be inserted here -->
      </nav>
      
      <div class="nav-item logout-item" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Sign Out</span>
      </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
      <div class="top-header">
        <div style="display: flex; align-items: center; gap: 16px;">
          <button class="mobile-menu-toggle" id="mobileMenuToggle">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="header-actions">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20">
              <circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"></circle>
              <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor"></line>
              <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor"></line>
              <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor"></line>
              <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor"></line>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none"></path>
            </svg>
          </button>
        </div>
      </div>
      
      <!-- Dynamic Dashboard Content -->
      <div id="dashboard-content" class="dashboard-section active">
        <!-- Role-specific dashboard content loads here -->
      </div>
      
      <!-- Section Containers (hidden by default, shown when tab clicked) -->
      <div id="section-my-courses" class="dashboard-section"></div>
      <div id="section-wallet" class="dashboard-section"></div>
      <div id="section-library" class="dashboard-section"></div>
      <div id="section-assignments" class="dashboard-section"></div>
      <div id="section-portfolio" class="dashboard-section"></div>
      <div id="section-live-class" class="dashboard-section"></div>
      <div id="section-community" class="dashboard-section"></div>
      <div id="section-settings" class="dashboard-section"></div>
      <div id="section-my-students" class="dashboard-section"></div>
      <div id="section-submissions" class="dashboard-section"></div>
      <div id="section-create-assignment" class="dashboard-section"></div>
      <div id="section-user-management" class="dashboard-section"></div>
      <div id="section-finance" class="dashboard-section"></div>
      <div id="section-content-hub" class="dashboard-section"></div>
      <div id="section-analytics" class="dashboard-section"></div>
      <div id="section-support" class="dashboard-section"></div>
      <div id="section-directory" class="dashboard-section"></div>
      <div id="section-events" class="dashboard-section"></div>
      <div id="section-contact" class="dashboard-section"></div>
      
    </main>
  </div>

  <!-- Footer Placeholder -->
  <div id="footer-placeholder"></div>

  <!-- Login Modal Placeholder -->
  <div id="login-modal-placeholder"></div>

  <!-- JS Files -->
  <script src="js/pages/header.js"></script>
  <script src="js/pages/dashboard.js"></script>

  <!-- Load Partials -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (document.getElementById('header-placeholder')) {
        Promise.all([
          fetch('partials/header.html').then(r => r.text()),
          fetch('partials/footer.html').then(r => r.text()),
          fetch('partials/login-modal.html').then(r => r.text())
        ]).then(results => {
          document.getElementById('header-placeholder').innerHTML = results[0];
          document.getElementById('footer-placeholder').innerHTML = results[1];
          document.getElementById('login-modal-placeholder').innerHTML = results[2];
          console.log('Partials loaded');
        }).catch(err => console.error('Failed to load partials:', err));
      }
    });
  </script>
</body>
</html>
