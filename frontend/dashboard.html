<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Glimu</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- NO HEADER PLACEHOLDER - Dashboard has its own layout -->
    <!-- <div id="header-placeholder"></div> -->

    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar" id="dashboardSidebar">
            <div class="sidebar-header">
                <div class="user-avatar">
                    <img id="userAvatarImg" src="https://ui-avatars.com/api/?name=User&background=fbb040&color=fff" alt="User Avatar">
                </div>
                <div class="user-info">
                    <h4 id="userName">Loading...</h4>
                    <span class="user-role" id="userRole">Student</span>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- Dynamic navigation will be inserted here -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Dynamic Content Sections -->
            <div id="dashboardContent">
                <div class="loading-spinner" style="text-align: center; padding: 40px;">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading dashboard...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div id="viewBookModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="viewBookTitle"></h2>
                <button class="modal-close closeViewBookModal">&times;</button>
            </div>
            <div class="modal-body">
                <img id="viewBookImage" src="" alt="">
                <p id="viewBookDescription"></p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-secondary closeViewBookFooterBtn">Close</button>
                <button class="modal-btn modal-btn-primary" id="readBookBtn">Read Now</button>
            </div>
        </div>
    </div>

    <!-- No header.js script - dashboard doesn't need the global header -->
    <!-- <script src="js/pages/header.js" type="module"></script> -->
    <script src="js/pages/dashboard.js" type="module"></script>
    
    <!-- Mobile Bottom Navigation -->
<div class="mobile-bottom-nav" id="mobileBottomNav">
    <button class="mobile-nav-item" data-tab="dashboard">
        <i class="fas fa-tachometer-alt"></i>
        <span>Home</span>
    </button>
    <button class="mobile-nav-item" data-tab="question">
        <i class="fas fa-question-circle"></i>
        <span>Learn</span>
    </button>
    <button class="mobile-nav-item" data-tab="gotomenu">
        <i class="fas fa-door-open"></i>
        <span>Go To</span>
    </button>
    <button class="mobile-nav-item" data-tab="wallet">
        <i class="fas fa-wallet"></i>
        <span>Wallet</span>
    </button>
    <button class="mobile-nav-item" data-tab="settings">
        <i class="fas fa-cog"></i>
        <span>Profile</span>
    </button>
</div>
</body>
</html>
