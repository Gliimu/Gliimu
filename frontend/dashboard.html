<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard – Gliimu Institute</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your dashboard at Gliimu Institute of Media Technologies.">
  
  <link rel="icon" type="image/png" href="icons/logo2.png">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- External CSS Files -->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <!-- Theme initialization -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-mode');
    } else if (savedTheme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
      localStorage.setItem('theme', 'dark');
    }
  </script>

  <div class="dashboard-container">
    
    <!-- Top Bar (Minimal - No Header) -->
    <div class="dashboard-top-bar">
      <div class="top-bar-left">
        <a href="index.html" class="mini-logo">
          <img src="icons/logo.png" alt="Gliimu">
        </a>
        <span class="dashboard-badge">Dashboard</span>
      </div>
      <div class="top-bar-right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18">
            <circle cx="12" cy="12" r="5" stroke="currentColor" fill="none"></circle>
            <line x1="12" y1="1" x2="12" y2="3" stroke="currentColor"></line>
            <line x1="12" y1="21" x2="12" y2="23" stroke="currentColor"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor"></line>
            <line x1="1" y1="12" x2="3" y2="12" stroke="currentColor"></line>
            <line x1="21" y1="12" x2="23" y2="12" stroke="currentColor"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none"></path>
          </svg>
        </button>
        <div class="user-mini" id="userMini">
          <img src="" alt="User" id="userAvatar" class="user-avatar-mini">
          <span id="userName">User</span>
          <i class="fas fa-chevron-down"></i>
          <div class="user-dropdown" id="userDropdown">
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Dashboard Layout -->
    <div class="dashboard-layout">
      
      <!-- Sidebar (Tabs - Role Based) -->
      <aside class="dashboard-sidebar" id="dashboardSidebar">
        <nav class="sidebar-nav" id="sidebarNav">
          <!-- Tabs will be dynamically inserted based on role -->
        </nav>
      </aside>

      <!-- Main Content Area -->
      <main class="dashboard-main" id="dashboardMain">
        <div id="dashboardContent">
          <!-- Dynamic content loads here -->
          <div class="loading-screen">
            <div class="loading-spinner"></div>
            <p>Loading your dashboard...</p>
          </div>
        </div>
      </main>
      
    </div>
  </div>

  <!-- JS Files -->
  <script src="js/pages/dashboard.js"></script>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    function updateIcons() {
      const isDark = body.classList.contains('dark-mode');
      const sunIcon = themeToggle?.querySelector('.icon-sun');
      const moonIcon = themeToggle?.querySelector('.icon-moon');
      if (sunIcon && moonIcon) {
        sunIcon.style.display = isDark ? 'block' : 'none';
        moonIcon.style.display = isDark ? 'none' : 'block';
      }
    }
    updateIcons();
    themeToggle?.addEventListener('click', () => {
      body.classList.toggle('dark-mode');
      localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark' : 'light');
      updateIcons();
    });
    
    window.logout = function() {
      localStorage.removeItem('gliimu_user');
      localStorage.removeItem('gliimu_users');
      window.location.href = 'index.html';
    };
  </script>
</body>
</html>
